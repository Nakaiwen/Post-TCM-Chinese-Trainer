em": "本文使用了何種章法來增強說明效果？", "options": ["先抑後揚", "以小見大", "先總後分", "借古諷今"], "answer": 1, "neg": true}, {"year": 114, "num": 43, "category": "閱讀測驗", "passage": "（同第41題短文，明‧方孝孺〈指喻〉）", "stem": "根據本文，下列哪一個情境最能呼應「君子之所深畏」的觀點？", "options": ["政府發現地方官貪污，立即查辦防止弊端擴大", "學生考試臨時抱佛腳，等成績公佈後才悔不當初", "病人出現發燒症狀，選擇自行休息，等有空再就診", "企業面臨財務危機，但主管部門認為短期內無礙，不必採取相應措施"], "answer": 3, "neg": true}, {"year": 114, "num": 44, "category": "閱讀測驗", "passage": "（同第41題短文，明‧方孝孺〈指喻〉）", "stem": "文章最後「三折肱而成良醫」的用意為何？", "options": ["鼓勵人們多歷經挫折，才能成為賢能之人", "說明醫生因經驗豐富，能診斷病情成為良醫", "勉勵鄭君勿忘自身經驗，未來身居高位能引以為戒", "強調在位者應學習醫生的智慧，針對社會病灶加以診治"], "answer": 2, "neg": true}, {"year": 114, "num": 45, "category": "字詞釋義", "passage": "（同第41題短文，明‧方孝孺〈指喻〉）", "stem": "下列句子中，「肢體心膂無不病者」的「膂」；「今疾已成，非三月不能瘳」的「瘳」；及「吏之戕摩剝削以速其疾者亦甚矣」的「戕」，其意思分別為：", "options": ["肝膽/病篤/剝奪", "背部/病癒/傷害", "骨髓/病治/摧殘", "心智/病根/逼迫"], "answer": 1, "neg": true}, {"year": 114, "num": 46, "category": "字詞釋義", "stem": "下列選項，何者與「洗眼看輕薄，虛懷任屈伸」的「洗眼」語義相同？（甲）洗眼看舊書，怡然忘宇內（乙）且為公歌汴河詩，洗眼坐待河清好（丙）問龍乞水歸洗眼，欲看細字銷殘年（丁）笙歌叢裡抽身出，雲水光中洗眼來", "options": ["甲丁", "乙丙", "丙丁", "甲乙"], "answer": 3, "neg": true}, {"year": 114, "num": 47, "category": "修辭文法", "stem": "古文有時因應修辭、音韻、節奏等需要，在行文往往不直接說出，而使用拆數相乘的手法來表達數量。下列選項「」，何者不屬於此種析數相乘表示法：", "options": ["阿舒已「二八」，懶惰故無匹", "六六雁行連「八九」，只等金雞消息", "「三五」之夜，明月半牆，桂影斑駁", "蓋予所至，比好遊者尚不能「十一」"], "answer": 3, "neg": true}, {"year": 114, "num": 48, "category": "國學常識", "passage": "甘草是中醫臨床時常應用的藥品之一。甘草性平，味甘。甘是指一種甜的味道，所以甘的字形與嘴巴有關。甘的甲骨文是意謂人的嘴裡含著食物，表示品嘗食物的美味，小篆承甲骨文字形。", "stem": "根據題目所附甲骨文、小篆圖及文字說明，所以「甘」在「六書」上應屬於：", "options": ["象形", "指事", "形聲", "會意"], "answer": 3, "neg": true}, {"year": 114, "num": 49, "category": "國學常識", "stem": "下列詞語的典源，皆和音樂有關，何者意涵明顯與其他選項不同？", "options": ["高山流水", "流魚出聽，六馬仰秣", "下里巴人", "舞幽壑之潛蛟，泣孤舟之嫠婦"], "answer": 2, "neg": true}, {"year": 114, "num": 50, "category": "字詞釋義", "passage": "我想我是碰見了／最強的靈感／在詩裡，你是全部街燈／雨季，消逝的金烏，／小晴朗夜的月暈──你是／它們的父親……", "src": "節錄楊佳嫻〈鍛鍊〉", "stem": "文中「金烏」是何種事物的代稱？", "options": ["太陽", "月亮", "星星", "烏鴉"], "answer": 0, "neg": true}, {"year": 115, "num": 1, "ca "凌晨1至3點"], "answer": 2, "neg": true}, {"year": 115, "num": 12, "category": "國學常識", "stem": "古人常用當令的植物作為「月分」的別稱，如農曆九月菊花逐漸開花，故又稱「菊月」。下列何者是「農曆三月」的別稱？", "options": ["杏月", "桐月", "梅月", "荷月"], "answer": 1, "neg": true}, {"year": 115, "num": 13, "category": "字詞釋義", "stem": "下列各組詞語「」中的字，所指顏色相同的是：", "options": ["「玄」裳縞衣／朱轓「皂」蓋", "「鶴」髮童顏／雙頰「緋」紅", "「蒼」龍星座／「赭」衣塞路", "貽我「彤」管／「紫」氣東來"], "answer": 0, "neg": true}, {"year": 115, "num": 14, "category": "詞語成語", "stem": "「我們既已竭誠論交，就該□□□□，開誠布公」，缺空內最適宜填入的成語是：", "options": ["菽水承歡", "秤不離錘", "推心置腹", "嚶鳴求友"], "answer": 2, "neg": true}, {"year": 115, "num": 15, "category": "閱讀測驗", "passage": "說話並不是一件容易事。天天說話，不見得就會說話；許多人說了一輩子話，沒有說好過幾句話。所謂「辯士的舌鋒」、「三寸不爛之舌」等贊詞，正是物稀為貴的證據；文人們講究「吐屬」，也是同樣的道理。我們並不想做辯士、說客、文人，但是人生不外言動，除了言就只有動，所謂人情世故，有一半是在說話裡。《尚書》裡說：「惟口，出好，興戎」，一句話的影響，有時是你料想不到的，歷史和小說有的是例子。", "src": "朱自清〈說話〉", "stem": "上文中「惟口，出好，興戎」的意思，與下列何者最接近？", "options": ["病從口入，禍從口出", "安危相易，禍福相生", "水能載舟，亦能覆舟", "沉默是金，說話是銀"], "answer": 2, "neg": true}, {"year": 115, "num": 16, "category": "閱讀測驗", "passage": "磨難有如一種鍛鍊，一方面消耗了大量體能，一方面卻又強身健骨。對待磨難有兩種態度。一種是主動迎接，一種是被動承受。\n主動迎接磨難的人，在忍受磨難的痛苦時，內心多是坦然的，磨難使他好像刀劍愈見鋒芒；被動承受磨難的人，在為磨難所煎熬時，內心多充滿惶惑，磨難使他仿佛卵石愈見圓滑。\n就人生而言，總是從平坦中獲得的教益少，從磨難中獲得的教益多；從平坦中獲得的教益淺，從磨難中獲得的教益深。因此，若想做一個出類拔萃的人，不妨多經歷些磨難。", "src": "趙燮〈磨難〉", "stem": "依據上文，下列何者可用來概括全文旨意？", "options": ["以退為進，因勢利導", "刀要石磨，人要事磨", "一暴十寒，持之以恆", "允執厥中，兩全其美"], "answer": 1, "neg": true}, {"year": 115, "num": 17, "category": "詩詞鑑賞", "passage": "投我以木瓜，報之以瓊琚。匪報也，永以為好也。\n投我以木桃，報之以瓊瑶。匪報也，永以為好也。\n投我以木李，報之以瓊玖。匪報也，永以為好也。", "src": "《詩經‧衛風‧木瓜》", "stem": "依據上詩，可用以形容詩中男女二人情感的是：", "options": ["兩瞽相扶", "兩小無猜", "兩頭白面", "兩情相悅"], "answer": 3, "neg": true}, {"year": 115, "num": 18, "category": "詩詞鑑賞", "passage": "桌上靜靜地躺著一個黑體英文字／glove／我用它來抵抗手的寒冷／她放在桌上的那雙黑皮手套／遮住了第一個字母／正好讓愛完全流露出來／／ love／沒有音標／我們只能用沉默讀它／她拿起桌上那雙手套／讓愛隱藏／靜靜戴在我寒冷的手上／讓愛完全在手套裡隱藏", "src": "渡也〈手套與愛〉", "stem": "這是一首新詩。對於本詩詮釋不正確的是：", "options": ["作者所表達的情意是熱烈奔放的", "透過手套默默地傳遞了愛的訊息", "整首作品表現了一種寧靜的氛圍", "末句表示愛雖不可見但確實存在"], "answer": 0, "neg": true}, {"year": 115, "num": 19, "category": "閱讀測驗", "passage": "透早就出門，天色漸漸光，受苦無人問，行到田中央。行到田中央，為著顧三頓，顧三頓，不驚田水冷霜霜。\n炎天赤日頭，悽慘日中逗，有時踏水車，有時著挲草。希望好日後，每日巡田頭，巡田頭，不驚嘴乾汗那流。\n日頭那落山，工作才有散，有時全身汗，忍著寒和熱。希望好年冬，稻仔快快大，快快大，阮的生活就快活。", "src": "陳達儒《農村曲》", "stem": "上文是台灣民謠《農村曲》的歌詞。從歌詞看，最能表現早期傳統農村的哪一種精神？", "options": ["勤勞節儉", "刻苦耐勞", "樸實憨厚", "樂天知命"], "answer": 1, "neg": true}, {"year": 115, "num": 20, "category": "閱讀測驗", "passage": "一般說來，提供知識和訊息的書籍，只能讓我們獲得「知性的喜悅」；但多數的人更渴望從閱讀中獲得「心靈的悸動」。要想獲得這種「感動」，我們也許必須到傾訴個人情感、揭櫫人類理想與充滿想像力的小說、傳記、隨筆及哲學著作中去尋找。\n愛迪生為了幫忙家計，十二歲時就到火車上，扛著比身體還大的販賣箱，邊走邊叫賣報紙、水果和點心，隨著火車四處流浪。有一天，他讀到雨果的小說《孤星淚》，不禁感動得熱淚盈眶。因為他覺得自己就像書中那些可憐的孩子。\n雨果的《孤星淚》，不僅是他慘綠少年歲月中的最大慰藉，同時也淨化了他受創與悲憤的心靈。有很長一段時間，他的同伴都因此而戲稱他為「維克多‧雨果‧愛迪生」。", "src": "王溢嘉〈讓心靈悸動的閱讀〉", "stem": "依據上文，作者認為愛迪生讀《孤星淚》後心靈得到淨化，其主因為何？", "options": ["書中孩子的遭遇，激發愛迪生的創造潛能", "愛迪生從此迷途知返，找到了奮鬥的目標", "讓愛迪生感同身受，撫慰了他受創的心靈", "文學書籍以抒情為主，本就容易感動讀者"], "answer": 2, "neg": true}, {"year": 115, "num": 21, "category": "閱讀測驗", "passage": "（同第20題短文）一般說來，提供知識和訊息的書籍，只能讓我們獲得「知性的喜悅」；但多數的人更渴望從閱讀中獲得「心靈的悸動」……（王溢嘉〈讓心靈悸動的閱讀〉）", "stem": "依據本文，下列比較不能讓人閱讀後產生心靈悸動的書籍是：", "options": ["姬旦《周髀算經》", "李汝珍《鏡花緣》", "司馬遷《史記‧列傳》", "林語堂《生活的藝術》"], "answer": 0, "neg": true}, {"year": 115, "num": 22, "category": "國學常識", "passage": "風飄飄，雨瀟瀟，便做陳摶也睡不著。懊惱傷懷抱，撲簌簌淚點兒拋。秋蟬兒噪罷寒蛩兒叫，淅零零細雨灑芭蕉。", "stem": "從體制格式、遣詞造句的風格判斷，這首作品應是：", "options": ["漢賦", "唐詩", "宋詞", "元曲"], "answer": 3, "neg": true}, {"year": 115, "num": 23, "category": "詩詞鑑賞", "passage": "風飄飄，雨瀟瀟，便做陳摶也睡不著。懊惱傷懷抱，撲簌簌淚點兒拋。秋蟬兒噪罷寒蛩兒叫，淅零零細雨灑芭蕉。", "stem": "從本作品的主題、節令、氛圍綜觀之，與下列何者最相似？", "options": ["春眠不覺曉，處處聞啼鳥；夜來風雨聲，花落知多少", "和氣吹綠野，梅雨灑芳田；新流添舊澗，宿霧足朝煙", "輕陰閣小雨，深院晝慵開；坐看蒼苔色，欲上人衣來", "永夜不可度，蛩吟秋雨滴；寂寞想章台，始歎雲泥隔"], "answer": 3, "neg": true}, {"year": 115, "num": 24, "category": "閱讀測驗", "passage": "維鍼艾方藥者，已病之具也，非良醫不能以愈人。材能德行者，治國之器也，非明君不能以立功。醫無鍼藥，可作為求買，以行術伎，不須必自有也。君無材德，可選任明輔，不待必躬能也。由是察焉，則材能德行，國之鍼藥也，其得立功效，乃在君輔。傳曰：「得十良馬，不如得一伯樂；得十利劍，不如得一歐冶。」多得善物，不如少得能知物；知物者之致善珍，珍益廣，非特止於十也。", "src": "《桓子新論》", "stem": "依據上文，下列敘述正確的是：", "options": ["同時具備材能與德行的醫師，纔可以被稱為良醫", "鍼艾方藥是治病的工具，材德之士是治國的工具", "即使沒有鍼艾方藥的協助，良醫仍可以 const YISHOU_QUESTIONS = [{"school":"義守醫","year":110,"num":1,"category":"綜合","stem":"下列選項引號中的詞義，何者兩兩相同？","options":["江南金錫不為用，西蜀「丹青」不為采/時窮節乃見，一一垂「丹青」","其隟也，則施施而行，「漫漫」而遊/故園東望路「漫漫」，雙袖龍鍾淚不乾","吾諸兒「碌碌」，他日繼吾志事，惟此生耳/此等「碌碌」小人，何足掛齒","特來尊處求賜一方醫治，萬望「慨然」/北顧黃河之奔流，「慨然」想見古之豪傑"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":2,"category":"綜合","stem":"下列成語的應用，何者最正確？","options":["關山夕照是恆春著名的美景，凝視著「日薄西山」，紅霞滿天，果然美不勝收","豪雨過後，土石流讓武陵農場變得滿目瘡痍，「水落石出」，更令人怵目驚心","皓月長空，月光映照在海面上，一片「浮光躍金」，讓翻滾的波濤更得顯壯闊","疫苗的研發非常不易，必須遵守嚴謹的科學程序，「管窺蠡測」以達精準無誤"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":3,"category":"綜合","stem":"《浮生六記》是清朝沈復自傳式的散文，記其一生所經歷、所體悟，原有六卷。今拈書中所載：「心目間，常要一塵不染。晨入園林，種植蔬果，芟草，灌花，蒔藥。歸來入室，閉目定神。時讀快書，怡悅神氣；時吟好詩，暢發幽情。臨古帖，撫古琴，倦即止。知己聚談，勿及時事，勿及權勢，勿臧否人物，勿爭辯是非。」請依內容判斷所屬應該是六記中的哪一記？","options":["閒情記趣","養生記道","坎坷記愁","閨房記樂"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":4,"category":"綜合","stem":"韓非與司馬遷皆曾對「俠士」發表過觀點：《韓非子‧五蠹》：「儒以文亂法，俠以武犯禁，而人主兼禮之，此所以亂也。夫離法者罪，而諸先生以文學取；犯禁者誅，而群俠以私劍養。」《史記.游俠列傳》：「今游俠，其行雖不軌於正義，然其言必信，其行必果，已諾必誠，不愛其軀，赴士之厄困。既已存亡生死矣，而不矜其能，羞伐其德，蓋亦有足多者焉。」下列選項的論述何者最正確？","options":["韓非認為俠士憑藉武力擾亂社會，儒家卻稱賞其義，對社會的敗壞產生推波助瀾的作用","司馬遷認為俠士雖然違犯社會常軌，但他們以生命貫徹信念為價值，亦足以為他們立傳","韓非與司馬遷認為俠士不守國家的法律制度，但皆肯定其為社會除暴安良，能功成身退","韓非認為儒者與俠士都是無益社會的蠹蟲，司馬遷卻認為俠士伸張正義，值得作為典範"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":5,"category":"綜合","stem":"「精衛銜微木，將以填滄海。刑天舞干戚，猛志固常在。同物既無慮，化去不復悔。徒設在昔心，良晨詎可待？」這是陶淵明讀了某部經典後、有感而發的詩作；請依本詩內容判斷，陶公所讀應為哪部經典？","options":["莊子","山海經","黃帝內經","博物志"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":6,"category":"綜合","stem":"老子說：「出生入死。生之徒十有三，死之徒十有三，人之生，動之死地，亦十有三。夫何故？以其生生之厚。蓋聞善攝生者，陸行不遇兕虎，入軍不被兵甲。兕無所投其角，虎無所措其爪，兵無所容其刃，夫何故？以其無死地。」所謂「生生之厚」，下列何者最接近此意？","options":["五色令人目盲，五音令人耳聾，五味令人口爽","寵辱若驚，貴大患若身","塞其兌，閉其門；挫其銳，解其紛；和其光，同其塵","大道廢，有仁義；智慧出，有大偽；六親不和，有孝慈"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":7,"category":"綜合","stem":"「紹興燈景，為海內所夸者無他，竹賤、燈賤、燭賤。賤，故家家可為之；賤，故家家以不能燈為恥。故自莊逵以至窮檐同巷，無為燈、無不棚者。」（張岱《陶庵夢憶》）下列敘述何者最正確？","options":["張岱認為紹興燈景能聞名遐邇，主因製作成本低廉","因燈燭賤價平凡，故紹興的富貴人家恥於懸掛花燈","張岱不喜歡紹興燈景，主因價廉導致品質低劣庸俗","紹興人喜歡張燈結彩以競富，所以不需要搭建燈棚"],"answer":0,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":8,"category":"綜合","stem":"謝公（安）問王子敬（獻之）：「君書何如君家尊？」答曰：「固當不同。」公曰：「外人論殊不爾。」王曰：「外人那得知？」下列敘述何者最正確？","options":["謝安認為：王獻之的書法比不上父親王羲之","王獻之認為：自己的書法勝過父親王羲之","謝安藉外界的評論，嘲諷王獻之比不上父親","王獻之妙答不僅化解尷尬，也調侃了謝安"],"answer":3,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":9,"category":"綜合","stem":"「蓋儒者所爭，尤在名實，名實已明，而天下之理得矣。今君實所以見教者，以為侵官、生事、征利、拒諫，以致天下怨謗也。某則以謂：受命於人主，議法度而修之於朝廷，以授之於有司，不為侵官；舉先王之政，以興利除弊，不為生事；為天下理財，不為征利；辟邪說，難壬人，不為拒諫。至於怨誹之多，則固前知其如此也。」（王安石〈答司馬諫議書〉）下列何者最符合作者王安石的立場與態度？","options":["變法因侵官、生事、征利、拒諫，導致民怨沸騰","變法實由皇帝主導，法令制度也是依從皇命而行","作者坦然接受司馬光的批評，並表示會深自檢討","面對改革引發的爭議與誹謗，作者早已預料到了"],"answer":3,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":10,"category":"綜合","stem":"景公問於晏子曰：「治國何患？」晏子對曰：「患夫社鼠」公曰：「何謂也？」對曰：「夫社，束木而塗之，鼠因往託焉，熏之則恐燒其木，灌之則恐敗其塗，此鼠所以不可得殺者，以社故也。」（《晏子春秋》）請問下列何者最接近本文的喻旨？","options":["社廟是民間信仰的基礎，不應該放縱鼠患為虐","社鼠如朝中的奸佞之臣，國君應當慎防且遠離","為非作歹之人猶如社鼠，應嚴加緝拿以維治安","若鼠患成疫則危害重大，治國當從開言路著手"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":11,"category":"綜合","stem":"下表為台灣中央氣象局現行的風級標準，請依據表格中資訊，判斷下列選項何者最正確？級名稱陸地與海面情形數0靜，煙直上；海面如鏡。無風炊煙可表示風向，風標不動；海面有鱗狀波紋，波峰無泡沫。1軟風2輕風風拂面，樹葉有聲，普通風標轉動；微波明顯，波峰光滑未破裂。3微風樹葉及小枝搖動，旌旗招展；小波，波峰開始破裂，泡沫如珠，波峰偶泛白沫。4和風塵沙飛揚，紙片飛舞，小樹幹搖動；小波漸高，波峰白沫漸多。5清風有葉之小樹搖擺，內陸水面有小波；中浪漸高，波峰泛白沫，偶起浪花。6大樹枝搖動，電線呼呼有聲，舉傘困難；大浪形成，白沫範圍增大，漸起浪花。強風全樹搖動，迎風步行有阻力；海面湧突，浪花白沫沿風成條吹起。7疾風8大風小枝吹折，逆風前進困難；巨浪漸升，波峰破裂，浪花明顯成條沿風吹起。9烈風煙突屋瓦等將被吹損；猛浪驚濤，海面漸呈汹湧，浪花白沫增濃，減低能見度。10暴風陸上不常見，見則拔樹倒屋或有損毀；猛浪翻騰波峰高聳，浪花白沫堆集，能見度減低。","options":["樹葉有聲，旌旗隨風招展，海面泡沫如珠，是三級的輕風","大浪形成浪花，行人撐傘困難，全樹搖動，是六級的強風","浪花白沫會成條吹起，行人逆風前進不易，是八級的大風","海上捲起翻天巨浪拔樹倒屋，能見度很低，是十級的暴風"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":12,"category":"綜合","stem":"下列選項引號中的字義，何者兩兩相同？","options":["未嘗不「臨」文嗟悼，不能喻之於懷/釃酒「臨」江，橫槊賦詩","中歲頗好「道」，晚家南山陲/「道」狹草木長，夕露沾我衣","三歲貫「女」，莫我肯顧/窈窕淑「女」，君子好逑","君子「疾」沒世而明不稱焉/寡人有「疾」，寡人好色"],"answer":0,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":13,"category":"綜合","stem":"下列何者不是《三國志》作者陳壽認為諸葛亮不斷用兵的原因？","options":["力抗曹魏、東吳，欲進而一統中原","蜀漢兵力薄弱，必須採用奇襲謀略","為蜀漢開疆拓土，鞏固三國鼎力的實力","諸葛亮認為自己死後，蜀漢將後繼無人"],"answer":2,"neg":false,"passage":"當此之時，亮之素志，進欲龍驤虎視，包括四海，退欲跨陵邊疆，震蕩宇內。又自以為無身之日，則未有能蹈涉中原、抗衡上國者，是以用兵不戢，屢耀其武。然亮才，於治戎為長，奇謀為短；理民之幹，優於將略。而所與對敵，或值人傑，加眾寡不侔，攻守異體，故雖連年動眾，未能有克。昔蕭何薦韓信，管仲舉王子城父，皆忖己之長，未能兼有故也。亮之器能政理，抑亦管、蕭之亞匹也，而時之名將無城父、韓信，故使功業陵遲，大義不及邪？蓋天命有歸，不可以智力爭也。（《三國志.諸葛亮傳》）","src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":14,"category":"綜合","stem":"下列何者是陳壽認為諸葛亮未能竟其功、終究失敗的主因？","options":["諸葛亮擅長謀略，卻不擅長帶兵打仗","諸葛亮擅長內政，蜀漢卻乏帶兵打仗的名將","與諸葛亮對壘的敵手，智謀皆優於他","諸葛亮政治、軍事才能，比不上蕭何、韓信"],"answer":1,"neg":false,"passage":"當此之時，亮之素志，進欲龍驤虎視，包括四海，退欲跨陵邊疆，震蕩宇內。又自以為無身之日，則未有能蹈涉中原、抗衡上國者，是以用兵不戢，屢耀其武。然亮才，於治戎為長，奇謀為短；理民之幹，優於將略。而所與對敵，或值人傑，加眾寡不侔，攻守異體，故雖連年動眾，未能有克。昔蕭何薦韓信，管仲舉王子城父，皆忖己之長，未能兼有故也。亮之器能政理，抑亦管、蕭之亞匹也，而時之名將無城父、韓信，故使功業陵遲，大義不及邪？蓋天命有歸，不可以智力爭也。（《三國志.諸葛亮傳》）","src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":15,"category":"綜合","stem":"下列敘述何者最正確？","options":["作者認為參、苓、姜、桂都是珍貴藥材，對各種疑難雜症極具療效","作者主張中醫應該精細分工，醫師負責診脈、辨證，藥師負責用藥","扁鵲診病只有「望」、「聞」、「問」，不「切」脈，被視為神醫","作者認為若只懂病症、脈狀，卻不擅長開藥方，依舊不能算好醫師"],"answer":3,"neg":false,"passage":"郁離子曰：「治天下者其猶醫乎。醫切脈以知證，審證以為方。證有陰陽虛實，脈有浮沉細大，而方有汗下、通便、補瀉、針灼、湯劑之法，參、苓、姜、桂、麻黃、芒硝之藥，隨其人之病而施焉，當則生，不當則死矣。是故知證知脈而不善為方，非醫也，雖有扁鵲之識，徒嘵嘵而無用；不知證不知脈，道聽途說以為方，而語人日我能醫，是賊天下者也。故治亂證也，紀綱脈也，道德、政刑方與法也，人才藥也。夏之政尚忠，殷承其敝而救之以質；殷之政尚質，周承其敝而救之以文，秦用酷刑、苛法以箝天下，天下苦之，而漢承之以寬大，守之以寧壹。其方與證對，其用藥也無舛，天下之病有不瘳者鮮矣。（《郁離子‧喻治》）","src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":16,"category":"綜合","stem":"下列敘述何者最不符合本文的觀點？","options":["作者認為治病與治天下的道理可以相互啟發","良醫良相，所以治天下必先懂得治病的醫理","秦朝用苛法治理天下，因此漢代採寬和對治","藥方與病症相和，用藥正確，病症容易治癒"],"answer":1,"neg":false,"passage":"郁離子曰：「治天下者其猶醫乎。醫切脈以知證，審證以為方。證有陰陽虛實，脈有浮沉細大，而方有汗下、通便、補瀉、針灼、湯劑之法，參、苓、姜、桂、麻黃、芒硝之藥，隨其人之病而施焉，當則生，不當則死矣。是故知證知脈而不善為方，非醫也，雖有扁鵲之識，徒嘵嘵而無用；不知證不知脈，道聽途說以為方，而語人日我能醫，是賊天下者也。故治亂證也，紀綱脈也，道德、政刑方與法也，人才藥也。夏之政尚忠，殷承其敝而救之以質；殷之政尚質，周承其敝而救之以文，秦用酷刑、苛法以箝天下，天下苦之，而漢承之以寬大，守之以寧壹。其方與證對，其用藥也 s":["崔生患有口吃病，說話含糊籠統","老者幽默風趣，提醒崔生的發音","老翁笑崔生的口音，如伯勞鳥鳴","崔生老實待人，老翁則虛懷若谷"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":26,"category":"綜合","stem":"《玉芝堂談薈》：「余見諸書談物理者，彙識之。淮北多獸，江南多禽，湖廣多魚，雲南多花。.........蓼虫不知苦，糞蛆不知臭。吳牛喘月，蜀犬吠日。」根據文中所述，下列選項何者最正確？","options":["「淮北多獸，江南多禽，湖廣多魚，雲南多花」是視覺摹寫","「蓼虫不知苦，糞蛆不知臭」側重嗅覺摹寫，諷刺品格低劣","「吳牛喘月」指看到曾受其害的類似事物，而過分驚懼害怕","「蜀犬吠日」猶如狗吠火車，遇到平常之物竟然想一較高下"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":27,"category":"綜合","stem":"「騷客嚼餘無蠟味，美人吐棄有香脂。殘紅落地花同溷，灰劫消磨敗葉時。」詩中所述為何物？","options":["枸杞子","番紅花","山楂片","檳榔粕"],"answer":3,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":28,"category":"綜合","stem":"清.朱樟〈蠻賈行〉：「只今射利專鹽鐵，鑿井穿山官不知；貧兒衣食於奔走，剖腹藏寶甯非癡。」下列選項引號中的成語，何者最貼近「剖腹藏寶」？","options":["張主任挪用公款，「隻手遮天」，終於被移送法辦","阿李只管眼前小利，又不識抬舉，只有「匹夫之勇」","有些人為了賺錢而賠上健康，真是「因小失大」啊","他看似弱不禁風，竟然是「深藏不露」的柔道教練"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":29,"category":"綜合","stem":"王恭從會稽還，王大看之。見其坐六尺簟，因語恭：「卿東來，故應有此物，可以一領及我。」恭無言。大去後，即舉所坐者送之。既無餘席，便坐薦上。後大聞之甚驚，曰：「吾本謂卿多，故求耳。」對曰：「丈人不悉恭，恭作人無長物。」（《世說新語.德行》）「恭作人無長物」言下之意為何？","options":["王恭為人很簡樸","王恭文常獲褒獎","王恭做人頗謙虛","王恭已無懈可擊"],"answer":0,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":30,"category":"綜合","stem":"齊人有女，二人求之，東家子醜而富，西家子好而貧。父母疑不能決，問其女：「定所欲適，難指斥言者，偏袒令我知之。」女便兩袒，怪問其故，云：「欲東家食，西家宿。」（《藝文類聚》）下列選項何者最接近故事的寓意？","options":["痴人說夢","嫌貧愛富","貪得無厭","嫁雞隨雞"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":31,"category":"綜合","stem":"下列選項引號中的字義，何者兩兩相同？","options":["入則「比」周而蔽惡於君/為之駕，「比」門下之車客","「向」之所欣，俯仰之間，已為陳跡/尋「向」所誌，遂迷不復得路","微管仲，吾其「被」髮左衽矣/寡人不祥，「被」於宗廟之祟","寄雁傳書「謝」不能/使君「謝」羅敷"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":32,"category":"綜合","stem":"下面選項何者沒有錯別字？","options":["我方想推動復方中藥濃縮治劑進軍大陸市場，此類屬於規劃中的第四種交流","有關中藥之安全性，將針對品質、重金屬與農藥殘留，強化管理及成分查核","揅擬中藥管理相關辦法，建立完整藥材品質撿驗機製與管理規範將更顯重要","中醫藥的發揚，除掌握固有文化優勢外，仍須借鏡國際植物醫藥之管理溉況"],"answer":1,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":33,"category":"綜合","stem":"下列選項關於書信的指稱，何者不正確？","options":["雙鯉","鴿足","魚雁","尺素"],"answer":1,"neg":true,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":34,"category":"綜合","stem":"官與臟腑的對應何者最正確？","options":["目者，脾之官也","舌者，心之官也","口唇者，腎之官也","耳者，肝之官也"],"answer":2,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":110,"num":35,"category":"綜合","stem":"《論語》：「侍於君子有三愆：言未及之而言謂之□，言及之而不言謂之□，未見顏色而言謂之□。」空格中應填入的字依序為何？","options":["隱／躁／瞽","躁／瞽／隱","瞽／隱／躁","躁／隱／瞽"],"answer":3,"neg":false,"src":"義守醫 110 年"},{"school":"義守醫","year":111,"num":1,"category":"綜合","stem":"對古醫書的描述下列何者有誤？","options":["《傷寒雜病論》為東漢張仲景所著，是中醫理論聯繫實際的臨床著作。在《四庫全書》中列為子部醫家類。","《幼幼新書》為宋代兒科醫療專書，是劉昉有感於小兒之疾苦，於荊湖南路安撫使任職期間，取錄收訪聖賢方論與聞人家傳關於兒科之論述。","《神農本草經》，簡稱《本經》，是現存最早的中藥學專著，原書早已佚失。南朝陶弘景為此書作注，編定《本草經集注》。","《本草綱目》撰成於明代萬曆年間，作者為李時珍，乃依吳儀洛《本草從新》為底本編寫而成。"],"answer":3,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":2,"category":"綜合","stem":"下列選項中的對聯，何者是稱頌岳飛？","options":["草堂傳後世，詩聖著千秋。","千秋冤案莫須有，百戰忠魂歸去來。","獨留正氣參天地，永剩丹心照古今。","青龍偃盡千秋月，赤兔追餘萬里風。"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":3,"category":"綜合","stem":"以下部首的敘述，何者有誤？","options":["「骨頭」的「骨」字於字典中應查「月」部","「什麼」的「麼」字於字典中應查「麻」部","「鼻子」的「鼻」字於字典中應查「鼻」部","「齋戒」的「齋」字於字典中應查「齊」部"],"answer":0,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":4,"category":"綜合","stem":"古人鑒賞詩歌，有「無理而妙」之評。「無理」乃指違反一般生活經驗與思維邏輯。所謂「妙」，則指通過這種「悖謬常情」的描寫，讀者反而得到一種「別有滋味」的美感樂趣。下列語句，何者未具有此種「無理而妙」的別趣？","options":["嫁得瞿塘賈，朝朝誤妾期。早知潮有信，嫁與弄潮兒。（李益〈江南曲〉）","挑兮達兮，在城闕兮。一日不見，如三月兮。（《詩經.鄭風.子衿》）","淚眼問花花不語，亂紅飛過秋千去。（歐陽脩〈蝶戀花〉）","才始送春歸，又送君歸去。若到江南趕上春，千萬和春住。（王觀〈卜算子〉）"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":5,"category":"綜合","stem":"下列有關台灣俗諺的說明，何者有誤？","options":["古井水雞/意同於井底之蛙","天頂天公，地下母舅公/強調母舅公地位很重要","一個童乩，一個桌頭/比喻全員到齊","大人爬起，囡仔佔椅/比喻孩子沒禮貌"],"answer":2,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":6,"category":"綜合","stem":"「偏義複詞」是指由兩個意義不同的字組成的複詞，但只取其中一字的意思作為詞義。下列「」中詞語，何者不是「偏義複詞」？","options":["ㄧ笑泯「恩仇」。","此誠危急「存亡」之秋。","月黑雁飛高，單于夜「遁逃」。","商人重利輕離別，「去來」江口守空船。行負責。"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":7,"category":"綜合","stem":"下列對聯的上下聯排列方式何者有誤？","options":["上聯：一堂和煦變成春下聯：四季平安原是福","上聯：天增歲月人增壽下聯：春滿乾坤福滿堂","上聯：虎步奔騰開勝景下聯：春風浩蕩展鴻圖","上聯：三春淑氣盈門室下聯：萬里祥光滿斗文"],"answer":0,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":8,"category":"綜合","stem":"大明於假日陪同國外友人到台北著名的行天宮參觀，在廟方人員協助下抽了一支籤，是〈關聖帝君百首靈籤〉第69籤。籤文如下：「捨舟遵路總相宜。慎勿嬉遊逐貴兒。一夜樽前兄與弟。明朝仇敵又相隨。」以下是大明為友人籤詩所作的解釋，何者不恰當？","options":["「捨舟遵路總相宜」意謂行舟有風濤之險，不如以陸路為安。","「慎勿嬉遊逐貴兒」指富貴豪門子弟看似聲勢可倚，實則多華少實，勿被蒙蔽。","「一夜樽前兄與弟，明朝仇敵又相隨」指今晚你和貴友把酒言歡，殊不知樂極生悲，隔天仇家必來尋仇。","此籤意旨是：凡事應腳踏實地，交友更要謹慎，不要攀緣權貴損友，才是全身遠害之道。"],"answer":2,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":9,"category":"綜合","stem":"清《四庫全書》將書籍分為經、史、子、集四部，依下列十篇文章之出處，分類歸檔正確的是：甲、〈項羽本紀〉乙、〈關雎〉丙、〈中庸〉丁、〈行行重行行〉戊、〈醉翁亭記〉己、〈兼愛〉庚、〈道應訓〉辛、〈離騷〉壬、〈徐无鬼〉癸、〈孔子世家〉","options":["經部：乙、丙、癸","子部：己、庚、壬","史部：甲、庚、辛","集部：乙、丁、戊"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":10,"category":"綜合","stem":"「昨夜因看《蜀志》，笑曹操孫權劉備。用盡機關，徒勞心力，只得三分天地。屈指細尋思，爭如共、劉伶一醉？人世都無百歲。少痴騃、老成尪悴。只有中間，些子少年，忍把浮名牽繫？一品與千金，問白髮、如何迴避？」（范仲淹〈剔銀燈.與歐陽公席上分題〉）依上文意旨，下列各項解讀，何者正確？","options":["上片強調與其像曹、孫、劉用盡機關爭奪部分的天下，不如學劉伶任誕飲酒更為灑脫自在。","下片主要強調時光匆逝，英雄豪傑更要想辦法迴避白髮，追求長壽康泰。","「少痴騃、老成尪悴。只有中間，些子少年，忍把浮名牽繫？」意謂人生的黃金年代是中年時期，應該要把握時間建功立業，莫等閒白了少年頭。","這篇是以「詞」的體裁寫「讀史之感」，就北宋詞壇而言，此寫法極普遍。"],"answer":0,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":11,"category":"綜合","stem":"「子夏之晉，過衛，有讀史記者曰：『晉師三豕涉河。』子夏曰：『非也，是己亥也。夫己與三相近，豕與亥相似。』至於晉而問之，則曰：『晉師己亥涉河也。』」有關該段文字之解讀，說明正確的選項是:","options":["晉國軍隊自三豕之地渡河，然經子夏考證應是從己亥處出發。","「三豕渡河」是指將內容誤謬加以改正的意思。","該則故事可以成語「張冠李戴」來總結說明。","子夏根據文字的形似及時間的合理性，大膽推測「三豕」應為「己亥」。行負責。"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":12,"category":"綜合","stem":"（甲）周邦彥〈蘇幕遮〉：「燎沉香，消溽暑。鳥雀呼晴，侵曉窺檐語。葉上初陽乾宿雨，水面清圓，一一風荷舉。」（乙）晏殊〈訴衷情〉：「芙蓉金菊斗馨香，天氣欲重陽。遠村秋色如畫，紅樹間疏黃。」（丙）杜牧〈山行〉：「遠上寒山石徑斜，白雲生處有人家。停車坐愛楓林晚，霜葉紅於二月花。」（丁）歐陽脩〈醉翁亭記〉：「環滁皆山也。其西南諸峰，林壑尤美。望之蔚然而深秀者，琅邪也。山行六七里，漸聞水聲潺潺，而瀉出於兩峰之間者，釀泉也。峰回路轉，有亭翼然，臨於泉上者，醉翁亭也。」（戊）柳永〈望海潮.東南形勝〉：「煙柳畫橋，風簾翠幕，參差十萬人家。雲樹繞隄沙。怒濤捲霜雪，天塹無涯。」以上文學作品符合由近而遠之寫景以呈現空間移轉的選項是:","options":["甲丙戊","甲乙丙","乙丙丁","甲乙戊"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":13,"category":"綜合","stem":"（甲）「春秋」多佳日，登高賦新詩。（陶淵明〈移居〉）（乙）痛自嚴君見背，兩易「春秋」。（夏完淳〈獄中上母書〉）（丙）「春秋」匪解，享祀不忒。（《詩經.魯頌.閟宮》）（丁）胸中自有涇渭，皮裡自具「春秋」。（和邦額〈隨錄崔秀才〉）（戊）於是「春秋」改節，四時迭代。（張衡〈東京賦〉）以上「」內之春秋其詞義相同的選項是:","options":["甲丙","乙丙","丙戊","乙丁"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":14,"category":"綜合","stem":"（甲）妾髮初□□，折花門前劇。郎騎竹馬來，遶床弄青梅。（乙）《李師師外傳》：「寅以菽漿代乳乳之，得不死，在□□未嘗啼。」（丙）曹操〈對酒歌〉：「人□□，皆得以壽終，恩澤廣及草木昆蟲。」（丁）孟稱舜《桃花人面》第五齣：「吾女□□知書，未適人。」請依據文意判斷□□內應填入的年齡指稱詞，並依長至幼排序，正確的選項是:","options":["乙丁甲丙","丙丁甲乙","丙甲丁乙","乙甲丁丙"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":15,"category":"綜合","stem":"下列各組詞語，哪一組完全沒有錯字？","options":["俯首稱臣/三餐不濟/懸梁刺骨","老生長談/迫不及待/固步自封","莫明其妙/未竟之志/落漠寡歡","草菅人命/如法炮製/姍姍來遲"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":16,"category":"綜合","stem":"在語言學的文獻裡，量詞有多種不同分類的方法，其中有一分類為「名量詞」，定義是「根據量詞所計量的事物做分類，當量詞具有計量名詞的功能時，即稱之。名量詞若是做主要語名詞的補語而形成「複合詞」，則「名詞」+「量詞」之間就無法再插入其他詞彙。例如：「船隻」、「車輛」等等。下列選項中的「複合詞」屬於此一歸類者有:","options":["個人、花朵、馬匹、國家","花朵、地板、瓦塊、紙張","牲口、書本、紙張、馬匹","電扇、紙張、個人、匹夫"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":17,"category":"綜合","stem":"以下詞語，何者前後安排依序由輕到重、由少到多？","options":["越旬/一秩/一稔","長跪/再拜/稽首","寢疾/大病/病瘳","吹灰之力/蚍蜉之力/舉手之勞行負責。"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":18,"category":"綜合","stem":"「連綿詞」是合兩個音節而成的衍聲複詞，兩個字合在一起只代表一個意義，不能加以分析，如「匍匐」、「慫恿」。下列選項，何者不使用連綿詞？","options":["《詩經.周南.關雎》：「參差荇菜，左右流之。」","《莊子.讓王》：「逍遙於天地之閒而心意自得。吾何以天下為哉！」","《儒林外史.第一一回》：「嗅窗前寒梅數點，且任我俛仰以嬉；攀月中仙桂一枝，久讓人婆娑而舞。」","《三國演義.第三十六回》：「如書到日，可念劬勞之恩，星夜前來，以全孝道。」"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":19,"category":"綜合","stem":"古人的「名」與「字」是有關係、關聯的：有的是同義互訓，有的是反義相對，有的則是相關聯想或原名變化。例如：班固字「孟堅」是同義互訓；韓愈字「退之」則是反義相對以求補平衡。（甲）屈平，字原（乙）曾點，字子皙（丙）諸葛亮，字孔明（丁）杜甫，字子美（戊）朱熹，字元晦（己）陶潛，字淵明以上哪些符合「同義互訓」的「名」與「字」，正確的選項是:","options":["甲乙丙","甲丙丁","乙丁己","乙丁戊"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":20,"category":"綜合","stem":"（甲）彈箏搏髀，而歌呼嗚嗚快耳者，真秦之聲也。（李斯〈諫逐客書〉）（乙）隴底悲笳引，隴頭鳴北風。一輪霜月落，萬里塞天空。（王貞白〈胡笳曲〉）（丙）李郎相從一妹，懸然如磬。（杜光庭〈虬髯客傳〉）（丁）莊子則方箕踞，鼓盆而歌。（莊子〈至樂〉）（戊）黃河遠上白雲間，一片孤城萬仞山。羌笛何須怨楊柳，春風不度玉門關。（王之渙〈涼州詞〉）（己）坎其擊缶，宛丘之道。無冬無夏，值其鷺翿。（《詩經.陳風.宛丘》）以上文句中共提到幾種樂器？","options":["四","五","六","七"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":21,"category":"綜合","stem":"下列文字描寫社會中各種職業身分，請問哪一個選項的對應有誤？","options":["勤勞的水上捕手，大海田畝的耕者，把大半生的心血都溶入了海洋——水手","天亮之後入坑，天黑之前出坑；你，是這個世界上少數與太陽背道而馳的人。多少年來，黑，幾乎是你生活中的唯一顏色——礦工","自此之後，你便生活在磚磚瓦瓦間，生活在水泥與機具間——建築工人","一如往昔，俯首案頭，筆尖不斷流淌出款款深情，如涓涓流水，在源遠流長的廣域，點點滴滴灌溉著每一寸土地——作家"],"answer":0,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":22,"category":"綜合","stem":"（甲）大快朵「頤」：鼻子下面腮頰部分（丙）目「眥」盡裂：眼睛（戊）飲水曲「肱」：胳膊（乙）疾首蹙「頞」：眉毛（丁）「頷」下之珠：下巴（己）不「脛」而走：大腿以上「」內之字皆為人類面貌肢體上的稱說，解釋正確的選項是:","options":["甲乙丙","乙丙丁","甲丁戊","乙戊己"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":23,"category":"綜合","stem":"「小王身體『殗殜』，尋來『郎中』。郎中為之按脈，開了方藥，施以『湯劑』。幾日後，小王『病革』，備禮謝郎中。」上引文句『』內的詞語，何者使用有誤？","options":["殗殜","郎中","湯劑","病革行負責。"],"answer":3,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":24,"category":"綜合","stem":"「連詞」也稱「聯詞」、「聯繫詞」或「連接詞」，是連接兩個以上的詞、語、句、段等的詞。其中有一類為因果連詞，用以連接兩個以上有因果關係的句子，可細分為表原因、表結果和因果兼表的連詞。例如：我必有罪，「故」天以此罷我也。（《呂氏春秋.制樂》）就是一個表結果的連詞。下列「因」字同為此類連詞的選項是:","options":["「因」摸地上刑械，作投擊勢。史噤不敢發聲，趨而出。（方苞〈左忠毅公軼事〉）","太倉之粟陳陳相「因」，充溢露積於外，至腐敗不可食。（《史記.平準書》）","殷「因」於夏禮，所損益，可知也。（《論語.為政》）","宗弼乃「因」老鸛河故道開三十里通秦淮，一日一夜而成。（《金史.宗弼傳》）"],"answer":0,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":25,"category":"綜合","stem":"臺灣發生朱一貴之亂時，藍鼎元曾對福建提督施世驃獻策：「賊皆烏合，不足憂，惟脅從至三十萬人，請檄示止殲渠魁，餘勿問。則人人有生之樂，無死之心，可不血刃平也。」此策重點為何？","options":["以絕對優勢兵力擊垮賊寇。","只擒賊首，放過附從人民。","策反賊寇，使他們從內部瓦解。","誘之以利，使賊寇倒戈。"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":26,"category":"綜合","stem":"下列□□□□皆是以動物為喻的成語，請依序選出正確的成語：「□□□□，為學初成；□□□□，弄巧反拙。美惡不稱，謂之□□□□；貪圖不足，謂之蛇欲吞象。禍去禍又至，曰□□□□，□□□□；除凶不畏凶，曰不入虎穴，焉得虎子。」","options":["蜻蜓點水/狐假虎威/勞燕分飛/千里之堤，潰於蟻穴","畫虎類犬/刻鵠類鶩/噤若寒蟬/螳螂捕蟬，黃雀在後","刻鵠類鶩/畫虎類犬/狗尾續貂/前門拒虎，後門進狼","牛刀割雞/畫虎類犬/城狐社鼠/一犬吠形，百犬吠聲"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":27,"category":"綜合","stem":"朱自清曾說：「中國人很早就講究說話。（甲），（乙），（丙）是我們的三部說話的經典。一是外交辭令，一是縱橫家言，一是清談。」（甲）、（乙）、（丙）依序應為:","options":["《呂氏春秋》/《淮南子》/《易經》","《左傳》/《國策》/《世說》","《史記》/《國策》/《老子》","《左傳》/《國策》/《莊子》"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":28,"category":"綜合","stem":"下列選項中缺空處何者不宜填入柳、柳條或柳樹？","options":["花寒懶發鳥慵啼，信馬閒行到日西。何處未春先有思，□□無力魏王堤。","黃師塔前江水東，春光懶困倚微風。□□一簇開無主，可愛深紅愛淺紅。","□□青青江水平，聞郎江上踏歌聲。東邊日出西邊雨，道是無晴還有晴。","誰家玉笛暗飛聲，散入春風滿洛城。此夜曲中聞折□，何人不起故園情。"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":29,"category":"綜合","stem":"「天下大勢，分久必合，合久必分，我就這樣進入了中國的文學殿堂裡。語言文字是懷舊的九曲橋，通不到史記的殿堂，也會通到曹操的銅雀臺邊，通到一○八條好漢的刀光劍影中，接著在雪夜裡一同和謝道韞較量白雪紛紛何所似，然後再到勾欄去聆聽白妞說書。」根據上段文字述及的人名或提示，請判斷共出現哪些古典小說？（甲）《三國演義》（乙）《紅樓夢》（丙）《水滸傳》（丁）《世說新語》（戊）《儒林外史》（己）《老殘遊記》（庚）《西遊記》","options":["乙丙丁庚","甲丙戊己","乙丁戊庚","甲丙丁己行負責。"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":30,"category":"綜合","stem":"下列各組表示年齡的詞語，何者前後相同？","options":["已屆「不惑」/「而立」之年","「懸車」致仕/「古稀」之年","「期頤」之年/「志學」之年","「束髮」讀書/未逾「髫齔」"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":31,"category":"綜合","stem":"下列有關「東、西、南、北」方位詞的說明，何者有誤？","options":["古時主位在東，賓位在西，故稱主人為「東道主」，又稱「東家」。","「北」指方位，所以「追亡逐北」是指追逐北方敗逃的敵軍。","古代君主之位坐北朝南，故以「南面」為君主的代稱，「北面」則為臣子的代稱。","老師所坐的席位因位於西，故亦稱「西席」。"],"answer":1,"neg":true,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":32,"category":"綜合","stem":"利用想像力，將過去、未來，或無法親眼目睹的事物，憑藉文字的描述呈現在讀者面前，稱為示現修辭法。示現修辭法可分為追述示現、預言示現、懸想示現三種。下列選項，何者為追述示現？","options":["方其破荊州，下江陵，順流而東也，舳艫千里，旌旗蔽空，釃酒臨江，橫槊賦詩，固一世之雄也。","早晚下三巴，預將書報家，相迎不道遠，直至長風沙。","死去原知萬事空，但悲不見九州同。王師北定中原日，家祭毋忘告乃翁。","今夜鄜州月，閨中只獨看。遙憐小兒女，未解憶長安。香霧雲鬟溼，清輝玉臂寒。何時倚虛幌，雙照淚痕乾。"],"answer":0,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":33,"category":"綜合","stem":"下列文句「」中的字組，何者詞性關係與「有點黏，又不會太黏」的兩「黏」字相同？","options":["「賊」仁者謂之「賊」，賊義者謂之殘。","「信」言不美，美言不「信」。","「誠」者，天之道也；「誠」之者，人之道也。","既東「封」鄭，又欲肆其西「封」。"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":34,"category":"綜合","stem":"讀書人本當立志兼善天下，若因時運不濟，困居田園，胸中自然難掩憂憤。下列選項，對「隱」仍有不平、無奈之情的是？","options":["貧賤不可苟免，富貴不可苟取。上順時命，乘道御和；下守虛澹，修己推分。","山中習靜觀朝槿，松下清齋折露葵。野老與人爭席罷，海鷗何事更相疑。","寂寂竟何待？朝朝空自歸。欲尋芳草去，惜與故人違。當路誰相假？知音世所稀。祇應守索寞，還掩故園扉。","蘭葉春葳蕤，桂華秋皎潔。欣欣此生意，自爾為佳節。誰知林棲者，聞風坐相悅。草木有本心，何求美人折。"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":35,"category":"綜合","stem":"","options":["助人為快樂之本","幸福來自於他人","利己比利他更幸福","幸福是人類的永恆追求行負責。"],"answer":2,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":36,"category":"綜合","stem":"請閱讀以下書信：陳校長振遠□□：本校於中華民國110年7月31日（星期六）舉行第10任新卸任校長交接典禮，承蒙高軒親臨指導並惠贈花籃，倍增光采。隆情厚誼，師生銘感，謹致謝忱。耑此，敬請□□義大國際高級中學校長李志成□□中華民國110年8月1日據其相關寫作之規範，依序填入適當的用語，正確的選項是:","options":["台鑒/勛安/敬啟","鈞鑒/台安/拜啟","道鑒/鐸安/敬上","如晤/道安/謹上"],"answer":1,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":37,"category":"綜合","stem":"依據下文，「__________」處最適合填入的選項是：「詞」原是文人填給歌女演唱以娛賓遣興的「代擬之作」。在酒筵歌席間，歌女唱著：「玉爐香，紅蠟淚，偏照畫堂秋思。眉翠薄，鬢雲殘，夜長衾枕寒」、「香閣掩，眉斂，月將沉。爭忍不相尋？怨孤衾。換我心，為你心，始知相憶深」，滿溢香軟風格。《人間詞話》言：「詞至李後主而眼界始大，感慨遂深，遂變伶工之詞而為士大夫之詞。」指出李後主亡國後，將個人心中的苦痛透過「詞」來抒發，將「詞」由原本娛賓遣興的功用，轉變為文人「以詞言志」的新里程碑，提高了「詞」的文學地位，如「四十年來家國，三千里地山河。鳳閣龍樓連霄漢，玉樹瓊枝作煙蘿，幾曾識干戈？」、「__________」可為代表。（李維恩〈詞的風格轉變〉）","options":["曉妝初過，沉檀輕注些兒個。向人微露丁香顆，一曲清歌，暫引櫻桃破。","晚妝初了明肌雪，春殿嬪娥魚貫列。鳳簫吹斷水雲間，重按霓裳歌遍徹。","花明月黯飛輕霧，今宵好向郎邊去。剗襪步香階，手提金縷鞋。","人生愁恨何能免，銷魂獨我情何限。故國夢重歸，覺來雙淚垂。"],"answer":3,"neg":false,"src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":38,"category":"綜合","stem":"下列選項「」中的詞語解釋正確的是:","options":["未嘗識「書具」：古典圖書。","「賓客」其父：當作賓客接待。","「環謁」于邑人：四處交朋友。","仲永之「通悟」：通盤了悟。行負責。"],"answer":1,"neg":false,"passage":"金溪民方仲永，世隸耕。仲永生五年，未嘗識書具，忽啼求之。父異焉，借旁近與之，即書詩四句，並自為其名。其詩以養父母、收族為意，傳一鄉秀才觀之。自是指物作詩立就，其文理皆有可觀者。邑人奇之，稍稍賓客其父，或以錢幣乞之。父利其然也，日扳仲永環謁于邑人，不使學。余聞之也久。明道中，從先人還家，于舅家見之，十二三矣。令作詩，不能稱前時之聞。又七年，還自揚州，復到舅家問焉。曰：「泯然眾人矣。」王子曰：仲永之通悟，受之天也。其受之天也，賢于材人遠矣。卒之為眾人，則其受于人者不至也。彼其受之天也，如此其賢也，不受之人，且為眾人；今夫不受之天，固眾人，又不受之人，得為眾人而已耶？（王安石〈傷仲永〉）","src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":39,"category":"綜合","stem":"「自是指物作詩立就，其文理皆有可觀者」意謂方仲永:","options":["善於寫物，描摹細緻。","天資聰穎，才思敏捷。","無師自通，為文不假他人。","用功勤勉，文采斐然。"],"answer":2,"neg":false,"passage":"金溪民方仲永，世隸耕。仲永生五年，未嘗識書具，忽啼求之。父異焉，借旁近與之，即書詩四句，並自為其名。其詩以養父母、收族為意，傳一鄉秀才觀之。自是指物作詩立就，其文理皆有可觀者。邑人奇之，稍稍賓客其父，或以錢幣乞之。父利其然也，日扳仲永環謁于邑人，不使學。余聞之也久。明道中，從先人還家，于舅家見之，十二三矣。令作詩，不能稱前時之聞。又七年，還自揚州，復到舅家問焉。曰：「泯然眾人矣。」王子曰：仲永之通悟，受之天也。其受之天也，賢于材人遠矣。卒之為眾人，則其受于人者不至也。彼其受之天也，如此其賢也，不受之人，且為眾人；今夫不受之天，固眾人，又不受之人，得為眾人而已耶？（王安石〈傷仲永〉）","src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":40,"category":"綜合","stem":"「彼其受之天也，如此其賢也，不受之人，且為眾人；今夫不受之天，固眾人，又不受之人，得為眾人而已耶」此段文字意旨乃說明:","options":["學而不思則罔，思而不學則殆。","學然後知不足，教然後知困。","困而不學，終於不知，斯為下爾。","豎子不足與謀，難成大事。"],"answer":1,"neg":false,"passage":"金溪民方仲永，世隸耕。仲永生五年，未嘗識書具，忽啼求之。父異焉，借旁近與之，即書詩四句，並自為其名。其詩以養父母、收族為意，傳一鄉秀才觀之。自是指物作詩立就，其文理皆有可觀者。邑人奇之，稍稍賓客其父，或以錢幣乞之。父利其然也，日扳仲永環謁于邑人，不使學。余聞之也久。明道中，從先人還家，于舅家見之，十二三矣。令作詩，不能稱前時之聞。又七年，還自揚州，復到舅家問焉。曰：「泯然眾人矣。」王子曰：仲永之通悟，受之天也。其受之天也，賢于材人遠矣。卒之為眾人，則其受于人者不至也。彼其受之天也，如此其賢也，不受之人，且為眾人；今夫不受之天，固眾人，又不受之人，得為眾人而已耶？（王安石〈傷仲永〉）","src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":41,"category":"綜合","stem":"下列說明何者有誤？","options":["屠呦呦經長期獨立研究，用中國傳統技術開發出青蒿素、雙氫青蒿素，成為抗瘧的最有效藥劑。","東晉葛洪的《肘後備急方》已把青蒿當作治療瘧疾的藥物。","「青蒿素是中醫藥獻給世界的一份禮物」這句話說明屠呦呦沒有獨享得獎的榮耀，更歸功於中國傳統醫藥的博大精深，（千餘年前的葛洪就已為她指出研究方向），才有今日的成就與貢獻。","「青蒿一握，以水二升漬，絞取汁，盡服之」。意謂：用一把青蒿葉，放入二升水中浸泡，然後把青蒿的汁液榨取出來，一次喝完。"],"answer":0,"neg":true,"passage":"中國著名女藥學家屠呦呦女士成為2015年諾貝爾醫學獎的得主之一，獲獎時已是85歲。屠女士長期致力於運用西方科學發掘中藥活性成分，以研製開發新藥。她帶領團隊創制的新型抗瘧藥——青蒿素和雙氫青蒿素，如今已成為治療瘧疾的第一線藥物，挽救了數百萬計最貧困地區的兒童的生命。她在瑞典領獎致詞時說道：「青蒿素是中醫藥獻給世界的一份禮物」。註：葛洪《肘後備急方.卷三.治寒熱諸瘧方第十六》：蒿一握，以水二升漬，絞取汁，盡服之。","src":"義守醫 111 年"},{"school":"義守醫","year":111,"num":42,"category":"綜合","stem":"屠呦呦女士沒得獎前，被稱為「三無學者」：無博士學位、無海外留學背景，更無中國兩院的院士頭銜，但她依然不改初心，鑽研不輟，直到40多年後才得到全世界的認可。這種精神，與下列哪一項意涵不相近？","options":["亦余心之所善兮，雖九死其猶未悔。（《離騷》）","誰無暴風勁雨時，守得雲開見月明。（《水滸傳》）","憑誰問：廉頗老矣，尚能飯否？（辛棄疾〈永遇樂.京口北固亭懷古〉）","天行健，君子以自強不息。（《易經.乾卦.象辭》）"],"answer":2,"neg":false,"passage":"中國著 至，五穀豐收","春天宜修潔神位，祈禱免除不順，以正陽為宗；修整橋樑溝渠等通好於四方，則甘雨乃降","用甲，乙的日子來發布五項政令，五項政令若是都按時節頒行，春雨就會到來"],"answer":1,"neg":true,"src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":8,"category":"綜合","stem":"下列各組詞語中，完全沒有錯字的選項是:","options":["鳶飛戾天/言語譏諷/詰屈聱牙","獨占獒頭/四望皎然/嘘里炊煙","龍張鳳姿/豁然開朗/慧質蘭心","虎假虎威/估名釣譽/草菅人命"],"answer":0,"neg":false,"src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":9,"category":"綜合","stem":"下列描述合於甲文的選項是:","options":["作者與徒眾宴遊的路徑依序是先上高山，後入深林，再溯溪回","作者遊西山後，猛然察覺永州山水之奇特，乃絕無僅有","作者遊西山後，方知自己並未遍覽永州奇特之山水","作者一心探訪幽泉怪石，無遠弗屆"],"answer":2,"neg":false,"passage":"（甲）自余為僇人，居是州，恆惴慄。其隟也，則施施而行，漫漫而遊。日與其徒上高山，入深林，窮迴溪，幽泉怪石，無遠不到。到則披草而坐，傾壺而醉，醉則更相枕以臥，臥而夢。意有所極，夢亦同趣。覺而起，起而歸。以為凡是州之山水有異態者，皆我有也，而未始知西山之怪特。（柳宗元〈始得西山宴遊記〉）（乙）至於負者歌於途，行者休於樹，前者呼，後者應，傴僂提攜，往來而不絕者，滁人游也。臨溪而漁，溪深而魚肥。釀泉為酒，泉香而酒洌；山餚野蔌，雜然而前陳者，太守宴也。宴酣之樂，非絲非竹，射者中，弈者勝，觥籌交錯，起坐而喧譁者，眾賓歡也。蒼顏白髮，頹然乎其間者，太守醉也。已而夕陽在山，人影散亂，太守歸而賓客從也。樹林陰翳，鳴聲上下，遊人去而禽鳥樂也。然而禽鳥知山林之樂，而不知人之樂；人知從太守游而樂，而不知太守之樂其樂也。醉能同其樂，醒能述以文者，太守也。太守謂誰？廬陵歐陽脩也。（歐陽脩〈醉翁亭記〉）（丙）夫天地者，萬物之逆旅也；光陰者，百代之過客也。而浮生若夢，為歡幾何？古人秉燭夜游，良有以也。況陽春召我以煙景，大塊假我以文章。會桃花之芳園，序天倫之樂事。群季俊秀，皆為惠連；吾人詠歌，獨慚康樂。幽賞未已，高談轉清。開瓊筵以坐花，飛羽觴而醉月。不有佳詠，何伸雅懷？如詩不成，罰依金谷酒數。（李白〈春夜宴桃李園序〉）","src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":10,"category":"綜合","stem":"下列描述合於乙文的選項是:","options":["藉滁人游而太守宴而眾賓歡及禽鳥樂來呈現物我同樂之境","強調太守無心政治，卻喜與民眾同遊山水","「太守醉能同其樂，醒能述以文者」點出太守之平生懷抱","可見滁州物產豐厚，能使百姓快樂致富"],"answer":0,"neg":false,"passage":"（甲）自余為僇人，居是州，恆惴慄。其隟也，則施施而行，漫漫而遊。日與其徒上高山，入深林，窮迴溪，幽泉怪石，無遠不到。到則披草而坐，傾壺而醉，醉則更相枕以臥，臥而夢。意有所極，夢亦同趣。覺而起，起而歸。以為凡是州之山水有異態者，皆我有也，而未始知西山之怪特。（柳宗元〈始得西山宴遊記〉）（乙）至於負者歌於途，行者休於樹，前者呼，後者應，傴僂提攜，往來而不絕者，滁人游也。臨溪而漁，溪深而魚肥。釀泉為酒，泉香而酒洌；山餚野蔌，雜然而前陳者，太守宴也。宴酣之樂，非絲非竹，射者中，弈者勝，觥籌交錯，起坐而喧譁者，眾賓歡也。蒼顏白髮，頹然乎其間者，太守醉也。已而夕陽在山，人影散亂，太守歸而賓客從也。樹林陰翳，鳴聲上下，遊人去而禽鳥樂也。然而禽鳥知山林之樂，而不知人之樂；人知從太守游而樂，而不知太守之樂其樂也。醉能同其樂，醒能述以文者，太守也。太守謂誰？廬陵歐陽脩也。（歐陽脩〈醉翁亭記〉）（丙）夫天地者，萬物之逆旅也；光陰者，百代之過客也。而浮生若夢，為歡幾何？古人秉燭夜游，良有以也。況陽春召我以煙景，大塊假我以文章。會桃花之芳園，序天倫之樂事。群季俊秀，皆為惠連；吾人詠歌，獨慚康樂。幽賞未已，高談轉清。開瓊筵以坐花，飛羽觴而醉月。不有佳詠，何伸雅懷？如詩不成，罰依金谷酒數。（李白〈春夜宴桃李園序〉）","src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":11,"category":"綜合","stem":"下列選項中的修辭說明何者不是譬喻？","options ,"生死/法事","記憶/相識"],"answer":0,"neg":false,"src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":38,"category":"綜合","stem":"依據（甲）文，下列文句說明何者錯誤？","options":["「男有分，女有歸」意謂大同世界講求男女各司其職，兩性平權的社會","「貨惡其棄於地也，不必藏於己」意謂大同世界是利己利人，資源充分應用與共享的社會","「不獨親其親，不獨子其子」意謂大同世界是一種人人相親相愛，推己及人的美善社會","大同世界可以「外戶而不閉」，是因「謀閉而不興，盜竊亂賊而不作」"],"answer":0,"neg":true,"passage":"（甲）《禮記.禮運大同》大道之行也，與三代之英，丘未之逮也，而有志焉。大道之行也，天下為公，選賢與能，講信修睦。故人不獨親其親，不獨子其子，使老有所終，壯有所用，幼有所長，矜、寡、孤、獨、廢、疾者皆有所養，男有分，女有歸。貨惡其棄於地也，不必藏於己；力惡其不出於身也，不必為己。是故謀閉而不興，盜竊亂賊而不作，故外戶而不閉。是謂「大同」。（乙）金聖歎《不亦快哉》（節選）其一：夏七月，赤日停天，亦無風，亦無雲；前後庭赫然如洪爐，無一鳥敢來飛。汗出遍身，縱橫成渠。置飯於前，不可得喫。呼簟欲臥地上，則地濕如膏，蒼蠅又來緣頸附鼻，驅之不去。正莫可如何，忽然大黑車軸，疾澍澎湃之聲，如數百萬金鼓。簷溜浩於瀑布。身汗頓收，地燥如掃，蒼蠅盡去，飯便得吃。不亦快哉！其二：十年別友，抵暮忽至。開門一揖畢，不及問其船來陸來，並不及命其坐床坐榻，便自疾趨入內，卑辭叩內子：「君豈有鬥酒如東坡婦乎？」內子欣然拔金簪相付。計之可作三日供也。不亦快哉！其三：空齋獨坐，正思夜來床頭鼠耗可惱，不知其戛戛者是損我何器，嗤嗤者是裂我何書。中心回惑，其理莫措，忽見一狻貓，注目搖尾，似有所瞷。歛聲屏息，少復待之，則疾趨如風，唧然一聲。而此物竟去矣。不亦快哉！","src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":39,"category":"綜合","stem":"依據（乙）文，下列敘述何者正確？","options":["其一記盛夏時節，一場滂沱大雨，頓感涼爽，暑氣全消，非常快活","其二記久逢知己，與內子、友人開懷共飲，快意非常","其三記長夜不能入眠，乃觀家中貓鼠追逐嬉戲，非常愜意","此三記皆為作者生活寫照，但凡高興處即語「不亦快哉」，可見其人獨特之性情"],"answer":3,"neg":false,"passage":"（甲）《禮記.禮運大同》大道之行也，與三代之英，丘未之逮也，而有志焉。大道之行也，天下為公，選賢與能，講信修睦。故人不獨親其親，不獨子其子，使老有所終，壯有所用，幼有所長，矜、寡、孤、獨、廢、疾者皆有所養，男有分，女有歸。貨惡其棄於地也，不必藏於己；力惡其不出於身也，不必為己。是故謀閉而不興，盜竊亂賊而不作，故外戶而不閉。是謂「大同」。（乙）金聖歎《不亦快哉》（節選）其一：夏七月，赤日停天，亦無風，亦無雲；前後庭赫然如洪爐，無一鳥敢來飛。汗出遍身，縱橫成渠。置飯於前，不可得喫。呼簟欲臥地上，則地濕如膏，蒼蠅又來緣頸附鼻，驅之不去。正莫可如何，忽然大黑車軸，疾澍澎湃之聲，如數百萬金鼓。簷溜浩於瀑布。身汗頓收，地燥如掃，蒼蠅盡去，飯便得吃。不亦快哉！其二：十年別友，抵暮忽至。開門一揖畢，不及問其船來陸來，並不及命其坐床坐榻，便自疾趨入內，卑辭叩內子：「君豈有鬥酒如東坡婦乎？」內子欣然拔金簪相付。計之可作三日供也。不亦快哉！其三：空齋獨坐，正思夜來床頭鼠耗可惱，不知其戛戛者是損我何器，嗤嗤者是裂我何書。中心回惑，其理莫措，忽見一狻貓，注目搖尾，似有所瞷。歛聲屏息，少復待之，則疾趨如風，唧然一聲。而此物竟去矣。不亦快哉！","src":"義守醫 112 年"},{"school":"義守醫","year":112,"num":40,"category":"綜合","stem":"依據（甲）（乙）二文，下列何者敘述錯誤？","options":["大同世界涵括層面包含社會、經濟、福利、及群己關係","甲乙二文的寫作背景同樣都是為打造快樂世界，一是由己推人，一是為家國社會","大同篇代表著對未來社會的美好憧憬，人人友愛互助，家家安居樂業","乙文作者於行文中走筆詼諧，痛快的意象富含深遠，大有宣導沉滯、發越清明之感"],"answer":1,"neg":true,"passage":"（甲）《禮記.禮運大同》大道之行也，與三代之英，丘未之逮也，而有志焉。大道之行也，天下為公，選賢與能，講信修睦。故人不獨親其親，不獨子其子，使老有所終，壯有所用，幼 絕壁下。大石側立千尺，如猛獸奇鬼，森然欲搏人；而山上栖鶻聞人聲，亦驚起，磔磔雲霄間。又有若老人欬且笑於山谷中者，或曰：『此鸛鶴也。』余方心動，欲還，而大聲發於水上，噌吰如鐘鼓不絕，舟人大恐。徐而察之，則山下皆石穴罅，不知其淺深；微波入焉，涵澹澎湃而為此也。」（蘇軾〈石鐘山記〉）下列選項，何者是作者當晚的乘船經驗？","options":["船稍近岸，就遭遇到猛獸鬼怪的攻擊。","船上的老人不斷咳嗽大笑，令人恐懼。","水波流入岩洞縫隙，激盪出各種聲音。","作者與船客都受到了驚嚇，提前返航。"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":21,"category":"綜合","stem":"呂柟〈西鄰五子〉：「西鄰之人有五子焉。一子樸，一子敏，一子矇，一子僂，一子跛。乃使樸者□，敏者□，矇者□，僂者績，跛者紡，五子者皆不患於衣食焉。」請問下列選項中，哪一個應最近於西鄰對兒子的工作安排？","options":["工/農/蠶","農/賈/卜","農/浣/桑","商/俠/卜"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":22,"category":"綜合","stem":"「有疑□□□詩篇篇有酒，吾觀其意不在酒，亦寄酒為迹者也。其文章不羣，辭彩精拔，跌宕昭彰，獨超衆類，抑揚爽朗，莫之與京。橫素波而傍流，干青雲而直上。語時事則指而可想，論懷抱則曠而且真。加以貞志不休，安道苦節，不以躬耕為恥，不以無財為病，自非大賢篤志，與道汙隆，孰能如此乎？余素愛其文，不能釋手。」請問空格中的人物指誰？","options":["曹孟德","蘇子瞻","陶元亮","李太白"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":23,"category":"綜合","stem":"袁枚〈隨園食單〉：「味要濃厚，不可油膩；味要清鮮，不可淡薄。此疑似之間，□□□□，□□□□。濃厚者，取精多而糟粕去之謂也；若徒貪肥膩，不如專食豬油矣。清鮮者，真味出而俗塵無之謂也；若徒貪淡薄，則不如飲水矣。」根據文意，空缺處應填入哪一個選項？","options":["虛者實之，實者虛之。","食之無味，棄之可惜。","差之毫釐，失以千里。","魚目混珠，濫竽充數。"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":24,"category":"綜合","stem":"王國維《人間詞話》：「客觀之詩人，不可不多閱世。閱世愈深，則材料愈豐富，愈變化，《水滸傳》、《紅樓夢》之作者是也。主觀之詩人，不必多閱世。閱世愈淺，則性情愈眞，□□□是也。」請依創作風格判斷，□□□所指是哪一位文學家？","options":["杜子美","李後主","曹雪芹","王摩詰"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":25,"category":"綜合","stem":"余光中〈食客之歌〉：「如果菜單╱夢幻╱像□□╱那麼帳單╱清醒╱像□□╱而小費呢╱吝嗇╱像□□╱食物中毒╱嘔吧╱像□□。」以上缺空處依序填入，最符合的是下列哪一個選項？","options":["稿費/批評/詩歌/散文","批評/詩歌/散文/稿費","詩歌/散文/稿費/批評","散文/稿費/批評/詩歌"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":26,"category":"綜合","stem":"「得意賢士不可不舉，不得意賢士不可不舉，尚欲祖述堯舜禹湯之道，將不可以不尚賢。夫尚賢者，政之本也。」請依內容判斷，前文應出自先秦諸子的哪一家？","options":["儒家","法家","墨家","道家"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":27,"category":"綜合","stem":"「蕭牆列戟究何因，滿眼郊原草不春。豈有同仇關切齒？並無小忿亦亡身。揮戈舞盾賊攻賊，吮血吞心人食人。自愧未能為解脫，空將兩淚哭斯民。」（陳肇興〈感事〉）根據本詩之描述，下列何者應為作者所感懷的事件？","options":["饑荒之苦","瘟疫肆虐","械鬥亂事","列強侵略"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":28,"category":"綜合","stem":"小白是個善用時間的高手，以下為其某日行程：「一更/散步」、「申時/訪友」、「未時/練字」、「日出/讀書」、「午時/小睡」。若以二十四小時制來標示時間的話，這些活動依序是:","options":["小睡、練字、訪友、散步、讀書書","讀書、練字、訪友、小睡、散步","讀書、小睡、練字、訪友、散步","練字、訪友、散步、讀書、小睡"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":29,"category":"綜合","stem":"下列關於文化知識的敘述，正確的選項是:","options":["古人禮容之恭敬，由輕而重依序是「箕踞、稽首、再拜、跽」。","「垂髫」與「總髮」皆是指老年","古書中常見忌言凶險死亡之事，而以其他詞語來替代表達，如「慈父見背」。","「失怙」是指母親過世，「失恃」是指父親過世。"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":30,"category":"綜合","stem":"在人際的互動中，常出現「同溫層」效應，看法相似的人容易彼此認同、串連，在相對封閉的環境中，形塑出只有彼此認同的觀念就是社會普遍的共識，若有觀念不同者就是異己。以下文句，何者描述的現象符合同溫層效應:","options":["暮春三月，江南草長，雜花生樹，群鶯亂飛。見故國之旗鼓，感平生於疇日，撫弦登陴，豈不愴悢。","孟子稱：「人之患，在好為人師。」由魏、晉氏以下，人益不事師。今之世，不聞有師；有，輒譁笑之，以為狂人。","鳳山之民狡而狠，嘉義、彰化之民富而悍，淡水之民渙，噶瑪蘭之民貧。惟臺灣府郡幅員短狹，艋舺通商，戶多殷實，其民稍為純良易治。","世之都三公位，享萬鍾祿，其邸第之雄，車輿之飾，聲色之多，妻孥之富，止乎一己；而族之人，不得其門而入者，豈少哉。"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":31,"category":"綜合","stem":"「婚姻無媒妁，女已長，父母使居別室中，少年求偶者皆來，吹鼻簫，彈口琴，得女子和之，即入與亂，亂畢自去；久之，女擇所愛者乃與挽手。挽手者，以明私許之意也。明日，女告其父母，召挽手少年至，鑿上齶門牙旁二齒授女，女亦鑿二齒付男，期某日就婦室婚，終身依婦以處。」（郁永河《裨海紀遊》）關於這段婚俗記載的說明，下列何者有誤？","options":["婚前有開放的男女關係","鼻蕭口琴是決定婚姻的信物","婚後男子住在女子家裡","女子有選擇男子的權利"],"answer":2,"neg":true,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":32,"category":"綜合","stem":"《荀子‧性惡》言：「人之性惡，其善者偽也。今人之性，生而有好利焉，順是，故爭奪生而辭讓亡焉；生而有疾惡焉，順是，故殘賊生而忠信亡焉；生而有耳目之欲，有好聲色焉，順是，故淫亂生而禮義文理亡焉。然則從人之性，順人之情，必出於爭奪，合於犯分亂理，而歸於暴。」下列有關這段話的解釋，何者正確？","options":["荀子主張人性本惡，沒有改造的可能。","人性為惡，所以好人都是偽裝出來的。","有慾望不是問題，放縱慾望才是問題。","人們一定可以避免產生好利疾惡之心。"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":33,"category":"綜合","stem":"「孔子御坐於魯哀公，哀公賜之桃與黍，哀公請用。仲尼先飯黍而後啗桃，左右皆揜口而笑，哀公曰：『黍者，非飯之也，以雪桃也。』仲尼對曰：『丘知之矣。夫黍者五穀之長也，祭先王為上盛。果蓏有六，而桃為下，祭先王不得入廟。丘之聞也，君子以賤雪貴，不聞以貴雪賤。今以五穀之長雪果蓏之下，是從上雪下也，丘以為妨義，故不敢以先於宗廟之盛也。』」（《韓非子.外儲說.左下》）根據前文，下列選項敘述正確的是:","options":["眾人因孔子吃相難看所以揜口而笑。","孔子先飯黍而後啗桃，乃因注重養生之道。","「黍者，非飯之也，以雪桃也」，其中「雪」字為形容詞。","孔子注重上下貴賤之別"],"answer":3,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":34,"category":"綜合","stem":"下列與「杏」相關的詞彙，何者敘述錯誤？","options":["「杏花村」一詞，因杜牧〈清明〉：「借問酒家何處有？牧童遙指杏花村」詩句，後世遂常用為賣酒處的代稱。","今日言「春滿杏林」之「杏林」指醫界。傳說因董奉隱居廬山，為人治病不收錢，僅要求患者植杏樹，久之，乃蔚然成林。","「杏月」一詞，因杏樹於農曆十二月大雪後開花、結實，故常借稱「歲暮」。","「杏壇」相傳為孔子授業講學之地，後泛指授徒講學的所在。"],"answer":2,"neg":true,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":35,"category":"綜合","stem":"許多古人在年少時常胸懷大志，但後來歷經幾番人生挫敗後，心境便有所改變，壯志不復當年。下列選項，何者表現出這樣的心境轉變？","options":["猛志逸四海，騫翮思遠翥。荏苒歲月頹，此心稍已去。","欲取鳴琴彈，恨無知音賞。感此懷故人，中宵勞夢想。","青海長雲暗雪山，孤城遙望玉門關。黃沙百戰穿金甲，不破樓蘭終不還。","聖代無隱者，英靈盡來歸。遂令東山客，不得顧採薇。"],"answer":0,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":36,"category":"綜合","stem":"閱讀以下現代詩，並判斷其歌詠的主題為何？「這才是美麗的選舉/不罵對手不斬雞頭/要比就比各自的本色/把路人引誘過來的/不是紅苞，是紅葩/你最生動的競選演說/是一路燒過去/滿樹的火花/千萬拜美的信徒/選你豪放的形象/來激發南方的大港」","options":["雞冠花","火鶴","木棉","聖誕紅"],"answer":2,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":37,"category":"綜合","stem":"「文學教人惜物，敬物，存謙卑之心，貼近萬物，以同理同情之態度平視萬物，以赤子之忱友愛萬物，以手足之誼領會萬物的啟迪和闡釋。萬物原是我們精采絕倫的朋友，我們的生命每日因它們而富厚，而多彩，而充滿故事與象徵。」若要為上列敘述舉一段文字為例，何者最適合？","options":["尤其是銀杏樹葉。看它自早春吐出小把扇形黃綠幼葉，到夏至時翠葉長柄的飄搖扇葉，以至秋來鉻黃的冥紙顏色。銀杏葉在說明什麼呢？一個生命歷程的起承轉合。","第一次遇到這樣左右搖擺的航道！有人驚魂甫定、有人感謝上天，只有機員機長面不改色，我則摔得昏昏沉沉還被「心律不整」提出抗議，勉強靜下來看山、看建築、看人。","考古這一行，沒有真學問，就會騙人。你說那是商代的銅鼎，人家說是漢朝的，你就要說出依據來服人。","正倉院是日本皇室所有的一種特殊寶庫，相傳約在天平勝寶三年即已有之。它與東大寺在歷史上有極密切的關係。"],"answer":0,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":38,"category":"綜合","stem":"閱讀以下科普小短文，並選出說明最適當的選項：荷蘭的心理期刊發表了一份研究：人們在規劃旅行時，比實際出遊時還快樂。因為人們在期待旅行的過程中，會更積極去規劃旅遊藍圖，並陶醉在對未來美好的想像裡。而且現實有時不如預期，會使人們覺得期待旅更幸福。這可能跟大腦多巴胺的分泌有關。多巴胺是一種神經傳導物質，為大腦傳遞興奮、快樂等信息。科學家曾做過一樣實驗中，他們發現猴子在等待人類給予香蕉時，多巴胺濃度會迅速上升，等牠們真的拿到食物，多巴胺反而驟減。","options":["從文中可以完整了解「多巴胺」的運作方式及應用方法。","文中從生理因素分析為何期待的過程比實際體驗還讓人快樂。","作者以猴子為例，說明「人們規劃行程」與「猴子想拿香蕉」二者心理機制的不同。","本文旨在鼓勵人應多注意規劃行程的快樂，少在意現實中的不順。"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":39,"category":"綜合","stem":"吳承恩《西遊記》中，唐僧等人發現拿到無字經書，重上雷音寺時，佛祖的說詞如下：「向時眾比丘聖僧下山，曾將此經在舍衛國趙長者家與他誦了一遍，保他家生者安全，亡者超脫，只討得他三斗三升米粒黃金回來。我還說他們忒賣賤了，教後代兒孫沒錢使用。你如今空手來取，是以傳了白本。」作者藉由這段話，想要表達何種意涵？","options":["只要有心便能到達成功的彼岸","無字經書價值更高於一般經書","一切有為法如夢幻泡影","佛界與人界一樣講求利益交換"],"answer":3,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":40,"category":"綜合","stem":"以下文意，與下列哪一句話意思相近？「我覺得有所不知，比知道許多答案，而答案可能全錯的有意思多了。我知道很多近似的答案、可能正確的信念，我對不同的事物有著不同程度的見解，但我不對任何事情有著絕對確定的看法。」","options":["不忮不求，何用不臧。","君子之於天下，無適也，無莫也，義之與比。","見賢思齊焉，見不賢而內自省也。","雖小道，必有可觀者焉；致遠恐泥，是以君子不為也。"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":41,"category":"綜合","stem":"「徐渭，字文長，為山陰諸生，聲名藉甚。薛公蕙校越時，奇其才，有國士之目；然數『奇』，屢試輒蹶。」此處『奇』的讀音及意義為何？","options":["ㄑㄧˊ/特別、不尋常","ㄐㄧ/單數","ㄑㄧˊ/出人意表","ㄐㄧ/不順利、乖舛"],"answer":3,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":42,"category":"綜合","stem":"根據下引詩歌內容所指，甲乙丙丁的症狀依次是：","options":["過敏／感冒／頭昏／抽筋","感冒／頭昏／抽筋／過敏","頭昏／抽筋／過敏／感冒","抽筋／過敏／感冒／頭昏"],"answer":0,"neg":false,"passage":"（甲）針對特殊品種／難以言喻的制約反應／藥物無法治療／距離可以痊癒（乙）模糊影像入侵／耳膜不自主拒絕共鳴／冷熱在腦部對抗／意識無條件投降（丙）虛擬的意志沒有重心／構詞傾覆現實／像一群迷途候鳥的飛行／理想速度歸零（丁）浮淺的肌肉糾結／錯亂意志無法聯結／行走時空縫隙／總是這樣的無預警偷襲","src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":43,"category":"綜合","stem":"閱讀以下二段引文，並根據甲文關於「夢」的說明，判斷乙詞中李煜之「夢」的解讀，何者適當？（甲）心理學家榮格認為「夢」可使人們整合自我。「整合」指「夢」對於一個人在其生命中，所遭遇的各種事件、懷有的各種想法，以及各種不同層次的意識；皆提供了一種補足，讓人們有機會遇見另一個無法親身體會到的自己。因此，依據榮格的觀點，人們須以自身所處的環境、事件、思想、情感、直覺等，來探究夢裡的事物，並將這些事物視為一種引發人們聯想的象徵。人們也可藉此思考，這些「夢」意在補足自我意識中那些被忽略或不願見到的事物，以及這些象徵與補足有什麼意義。（改寫自莊博安〈想要解夢？先看心理學家榮格怎麼分析夢〉）（乙）簾外雨潺潺，春意闌珊，羅衾不耐五更寒。夢裡不知身是客，一晌貪歡。獨自莫憑欄，無限江山，別時容易見時難。流水落花春去也，天上人間。（李煜〈浪淘沙〉）","options":["李煜夢到的愉快情景，屬於他在睡眠時，大腦隨機整合拼湊出的超現實影像，且難以分析。","李煜的「夢」紓解了他潛意識中的鬱結，透過夢見愉快的情景彌補了現實中的不足。","李煜之「夢」的潛在象徵意義，在於他對過往重文藝而輕江山的自責，期盼能有所補償。","「夢裡不知身是客」一語，反映李煜潛意識中比起當國君，更想當普通人。"],"answer":1,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":44,"category":"綜合","stem":"下列文句所使用的修辭，前後不同的選項是:","options":["君子不近，庶人不服。/戰城南，死郭北。","蟬噪林逾靜，鳥鳴山更幽。/舊時王謝堂前燕，飛入尋常百姓家。","檣櫓灰飛煙滅/棄黔首以資敵國","天時不如地利，地利不如人和。/正經界，籌軍防，興土宜，勵教育。"],"answer":3,"neg":false,"src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":45,"category":"綜合","stem":"依據文意，敘述正確的選項是:","options":["田寮因為人煙稀少、寸草不生，所以又稱月球小鎮。","田寮一帶住戶普遍罹患憂鬱症，居民自縊死亡的比率極高。","田寮當地的居民會種植蜜棗、芒果、番石榴、火龍果等水果。","作者在田寮開設診所，長期為當地百姓治病，因而見證了小鎮的苦盡甘來。"],"answer":2,"neg":false,"passage":"月球小鎮不全然寸草不生。老人遞給我幾顆初熟的蜜棗，笑笑說，他家種的，下個月會更甜。我咬一口，鮮綠裹著嫩白，甘潤清涼，是冬季裡淡淡的滿足。芒果，番石榴，蜂蜜，火龍果，田寮也有自己恬淡的食材，劃分節氣時令。再次到田寮是今年七月。大崗山山腳下，龍眼樹正結實纍纍。這回，我抱出一箱死亡診斷書，分析死因，解構田寮故事。翻著一張張死診，人生最粗略的大綱，陽光飽滿的土地上，偶爾遇見死因欄寫著自縊。我知道，小鎮仍有悲傷，裹著泥，不願言說。救護車依舊準時下午出發，儘管今夏酷熱，有時為了一戶偏遠住民，得特地每月延駛，僅為下個月的藥。（黃信恩〈救護車，在月球小鎮〉）","src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":46,"category":"綜合","stem":"關於本文的寫作手法，敘述不當的選項是:","options":["列舉在地的物產，說明月球小鎮並非荒蕪之地。","寫居民遞送自己栽種的水果，表達當地人的淳樸善良。","以「死因欄寫著自縊」，象徵部分居民仍有不為人知的心理壓力。","「小鎮仍有悲傷，裹著泥」，藉擬人法控訴田寮地區長期遭受汙染的困境。"],"answer":3,"neg":false,"passage":"月球小鎮不全然寸草不生。老人遞給我幾顆初熟的蜜棗，笑笑說，他家種的，下個月會更甜。我咬一口，鮮綠裹著嫩白，甘潤清涼，是冬季裡淡淡的滿足。芒果，番石榴，蜂蜜，火龍果，田寮也有自己恬淡的食材，劃分節氣時令。再次到田寮是今年七月。大崗山山腳下，龍眼樹正結實纍纍。這回，我抱出一箱死亡診斷書，分析死因，解構田寮故事。翻著一張張死診，人生最粗略的大綱，陽光飽滿的土地上，偶爾遇見死因欄寫著自縊。我知道，小鎮仍有悲傷，裹著泥，不願言說。救護車依舊準時下午出發，儘管今夏酷熱，有時為了一戶偏遠住民，得特地每月延駛，僅為下個月的藥。（黃信恩〈救護車，在月球小鎮〉）","src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":47,"category":"綜合","stem":"依據文意，選出敘述正確的選項:","options":["母親雖然眼瞎，但仍十分努力，終於考取了機車駕照。","母親在取得駕照前，就已在村裡騎摩托車代步。","取得駕照後第一次騎車時，母親就在十字路口被警察攔下。","母親取得駕照最大的目的是要回大內探望外婆。"],"answer":1,"neg":false,"passage":"母親五十歲終於考取摩托車駕照那天，我走在黃昏車陣東海別墅同她通話道賀，聽她說眼都快瞎了，還邊顧車檯邊寫練習題，紅藍白色系路標與交警擺手示左示右圖如何折磨她：「歸庄頭，大概我分數尚高吧。」我慶幸母親無照駕駛小鄉村長達三十年的紀錄可以了結，但想到來日她活動路線將出庄腳四界趴趴走，我還是開心不太起來，再說她前些年出了次車禍，理由是她車速給放太慢，綠燈過到路中央紅燈就亮了。聽到她駕照到手，我心底還是怕怕的。她焦急拿駕照，一心出遠門，不想十字路口倉皇張望：「有警察仔沒？」多少是那些年行動不便的外婆單人住西庄，家離惠安宮早市仔還一段路，老託鄰居買什，也讓女兒們難做人。從大內出發到西庄車程唯需二十分鐘，無駕照的母親卻無膽騎出夫家門，唯能早晚電話確認外婆食穿起居，反覆提醒—「落雨天毋通去院仔。」、「手橐仔代工趕煞沒？」、「彼摳人甘有寫批轉來討錢？」念國小的我當然知道，若能日日返西庄看外婆，母親鐵定會安心許多。（楊富閔〈機車母親〉）","src":"義守醫 113 年"},{"school":"義守醫","year":113,"num":48,"category":"綜合","stem":"關於本文的寫作手法，敘述錯誤的選項是:","options":["多處使用閩南語詞彙","在敘事中穿插母親的言談","同時使用母親與兒子兩種敘事角度來書寫","敘事時亦融入作者自己的心情"],"answer":1,"neg":true,"passage":"母親五十歲終於考取摩托車駕照那天，我走在黃昏車陣東海別墅同她通話道賀，聽她說眼都快瞎了，還邊顧車檯邊寫練習題，紅藍白色系路標與交警擺手示左示右圖如何折磨她：「歸庄頭，大 14,"num":40,"category":"綜合","stem":"關於上文寫作技巧的敘述，正確的選項是:","options":["用「歷史是個小姑娘，任人打扮」諷刺強權者杜撰歷史","用「歷史也許像氣象預報」說明史實高深莫測，難以掌握","開頭引用陳寅恪與胡適的意見，逐一加以否定，再提出新解","末句「這現象不多」暗示史家發現新證據以改寫歷史的可能性不高"],"answer":3,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":41,"category":"綜合","stem":"「人總是要鬥的，總是要鉤心鬥角的和人爭逐的。」句中「鉤心鬥角」比喻刻意經營，競鬥心機，但其原意是指形容宮室的建築結構精緻巧妙。下列「」中的詞語，何者是使用詞語的原意？","options":["他的人生陷入低潮，不知何時才能「柳暗花明」","校慶在即，每個班級都「如火如荼」地準備著","他作風強勢，決意「大刀闊斧」地改革","傳說佛祖講經說法時感動天神，於是「天花亂墜」"],"answer":3,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":42,"category":"綜合","stem":"文末出處（楊南郡〈鳥居龍藏〉），畫線處最適切的選項是:","options":["跨國旅行者者","走遍臺灣百岳的登山專家","學術探險家","擁有國際聲望的人類學者"],"answer":1,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":43,"category":"綜合","stem":"依據文意，關於鳥居龍藏對待多元文化的態度，最不適合用來描述的選項是:","options":["認可差異","入境隨俗","關懷弱勢","欣賞接納"],"answer":2,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":44,"category":"綜合","stem":"下表改寫自2018新北市新住民文學獎簡章，依據表中的資訊進行下列推論，最適當的判斷是：下列推論，最適當的判斷是：臺灣的新住民，包括透過跨國婚姻及其他原因取得本國國籍及身分證的人口超過65萬人、來自東南亞的移工將近50萬人、新移民二代也已達30萬人。新北市政府為鼓勵活動宗旨新住民透過文學及攝影等創作形式，記錄下「新北經驗」，藉以增進多元文化交流、互相學習及融合。徵件資格曾經或正在新北市工作、求學、生活之新住民及其子女。（每類別限投一篇）散文（中文）組：字數1,000~2,000字為宜。繁體、簡體不拘。散文（非中文）組：字數1,000~2,000字為宜。以日文、印尼文、柬埔寨文、英文、類別與作品字數泰文、菲律賓文、越南文、韓文書寫為限。影像短文組：照片1張及字數100~200字的文字說明。語言不限。三類組分別各錄取首獎1名、優等2名、佳作3名。由承辦單位聘請專家學者組成評審作品審查委員會進行初、複審（決審），若評審認為作品未達水準，得決議獎項從缺或增減錄取名額。","options":["我能用中文和越南文寫作流暢散文，可惜每人只能投一篇，我尚未決定要參加哪一類","我是來自中國的觀光客，打算用簡體字寫一篇關於淡水的遊記，可以參加散文（中文）組的比賽","我來自柬埔寨，負笈新北市的大學，不具備中華民國國籍，打算用我的母語寫一篇散文，參加（非中文）組的比賽","我寫一則關於故鄉印尼外祖母的短文，附上和她的合照，參加影像短文組，可惜我不會中文，會被退件"],"answer":2,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":45,"category":"綜合","stem":"","options":["本詩旨在凸顯都市人的冷漠","本詩表現對自由的渴望","本詩以第三人稱描寫孤獨","本詩認為孤獨呈現的樣貌是多變的"],"answer":0,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":46,"category":"綜合","stem":"「明年八月，熹宗疾甲，召王入，受遺命。丁巳，即皇帝位，乙，以明年為丙。九月甲申，追諡生母賢妃曰孝純皇后。丁亥，停刑。庚寅，冊妃周氏為皇后。」（《明史》）上列是一段史書文字，若依文意及史書體例推斷，敘述正確的選項是:","options":["「甲」應是國君的身體狀況，或為「已癒」","「乙」應是新君即位後的措施，或為「大赦天下」","「丙」應是新君即位後的年號，或為「莊烈帝元年」","從記錄的內容來看，這段文字最可能見於史書中的「列傳」"],"answer":1,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":47,"category":"綜合","stem":"當代文人繆鉞對於唐詩和宋詩有不同的評價：「唐詩之美在甲，故豐腴；宋詩之美在乙，故瘦勁。......譬諸遊山水，唐詩則如丙，意氣浩然；宋詩則如丁，情境冷峭。唐詩之弊如膚廓平滑，宋詩之弊為生澀枯淡。」上文需填入的內容，哪一個選項最適切:","options":["「甲」：氣骨","「乙」：情辭","「丙」：踏雪尋梅","「丁」：曲澗尋幽"],"answer":3,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":48,"category":"綜合","stem":"「美醜」、「得失」、「優劣」常是出於主觀判斷，並無絕對的標準。下列何者「無法表達」此一體認？","options":["魚，我所欲也；熊掌，亦我所欲也；二者不可得兼，舍魚而取熊掌者也","以差觀之，因其所大而大之，則萬物莫不大；因其所小而小之，則萬物莫不小","自其變者而觀之，則天地曾不能以一瞬；自其不變者而觀之，則物與我皆無盡也","士生於世，使其中不自得，將何往而非病？使其中坦然，不以物傷性，將何適而非快"],"answer":0,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":49,"category":"綜合","stem":"下列有關季節的描寫，敘述正確的選項是:","options":["「花褪殘紅青杏小，燕子飛時、棉吹又少，天涯何處無芳草」是寫秋天的景致","「葉上初陽乾宿雨，水面清圓，一一風荷舉」是寫春天的景致","「莫道不消魂，簾捲西風，人比黃花瘦」是寫夏天的景致","「荷盡已無擎雨蓋，菊殘猶有傲霜枝。一年好景君須記，最是橙黃橘綠時」是寫秋冬之交的景致"],"answer":3,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":114,"num":50,"category":"綜合","stem":"下列兩視窗為「內海」與其友人「瀨戶」的對話，試根據對話推測他們各自的想法，並選出他們最有可能的行動：動:","options":["瀨戶因為這兩次的經驗，從此不再觀賞內海推薦的電影","瀨戶善於洞察機先，不需看完電影便能掌握故事的精髓","內海根據上述經驗，未來推薦電影給瀨戶時可能會多加考慮","內海不在乎瀨戶對電影的好惡，只推薦自己喜歡的給他"],"answer":2,"neg":false,"src":"義守醫 114 年"},{"school":"義守醫","year":115,"num":1,"category":"綜合","stem":"古代遇到某節氣時，朝廷會舉辦祭典，祭拜青帝，宮女以彩帛剪成花鳥樹枝形狀，百姓會吃生菜、蘿蔔等食物。請問這個節氣應該是？","options":["白露","小滿","穀雨","立春"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":2,"category":"綜合","stem":"《世說新語》：「殷仲堪既為荊州，值水儉，食常五碗盤，外無餘肴，飯粒脫落盤席間，輒拾以啖之。雖欲率物，亦緣其性真素。」根據本文，下列敘述何者正確？","options":["「水儉」指水災收成不佳","殷仲堪身體已出現病癥","「率物」指依循萬物之道","殷仲堪具有「看菜吃飯」的智慧"],"answer":0,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":3,"category":"綜合","stem":"根據臺灣的詞典歸部，下列何字的部首是正確的？","options":["鼻：自部","黑：火部","奘：大部","隸：木部"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":4,"category":"綜合","stem":"民國39年歲次庚寅，請問民國27年歲次應該是？","options":["辛巳","戊寅","己卯","丁丑"],"answer":1,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":5,"category":"綜合","stem":"有一祠堂的門對是「武城世第承三省，沂水淵源流九洲」，請問最有可能是哪一姓氏之祠堂？","options":["季","顏","曾","孔"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":6,"category":"綜合","stem":"《備急千金要方》：「凡乳母者，其血氣為乳汁也。五情善惡，悉是血氣所生也。其乳兒者，皆宜慎於喜怒。夫乳母形色所宜，其候甚多，不可求備。但取不胡臭，癭瘻、氣嗽、瘑、疥、癡、癃、白秃、癧瘍、瀋唇、耳聾、齆鼻、瘨癇，無此等疾者，便可飲兒也。師見其故炙瘢，便知其先疾之源也。」根據本文所言，下列說明何者有誤？","options":["醫書認為乳汁的來源是血氣","擔任乳母不能有感官的殘疾","醫生應以火針法治乳母舊病","情緒波動會影響乳汁的品質"],"answer":1,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":7,"category":"綜合","stem":"《後漢書》：「極南之人，雕題交趾，其俗男女同川而浴。其西有啖人國，生首子輒解而食之，謂之宜弟。味旨，則以遺其君，君喜而賞其父。娶妻妾美，皆讓其兄，烏滸人是也。」根據本文，下列說明何者正確？","options":["「雕題」指在額頭刺青","為了弟弟前途而分食自己的小孩","換妻之俗源自於烏滸人","因為價值觀錯亂而導致蠻夷的落後"],"answer":0,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":8,"category":"綜合","stem":"《晉書》：「弘有幹略政事之才，少家洛陽，與武帝同居永安里，又同年，共研席。」此文的「同年」是何意？","options":["同天生日","住處相近","同窗之友","年齡相同"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":9,"category":"綜合","stem":"古人的名和字之間往往有關連，如彭龜年，字子壽。下列選項何者名、字關係同於彭龜年？","options":["張飛，字翼德","杜牧，字牧之","朱熹，字元晦","嚴光，字子陵"],"answer":0,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":10,"category":"綜合","stem":"街上有四人聊天，甲說自己正值知命，乙說自己及笄，丙說處於舞勺之年，丁則已經耳順。請從大到小排列四人的年紀。","options":["丙丁乙甲","甲丙丁乙","丁甲乙丙","甲乙丁丙"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":11,"category":"綜合","stem":"下列各組成語空缺的字，讀音兩兩相同的選項是？","options":["望其□背/不□為謀","永矢弗□╱椿□並茂","附□風雅/蜂□而上","改□易轍╱口若□河"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":12,"category":"綜合","stem":"我國十二月令各有別稱，多以植物、季節、習俗或地支為名。例如：農曆九月菊花盛開，所以稱其為「菊月」。下列有關農曆月份別稱的說明，何者不正確？","options":["農曆ㄧ月：端乃開頭之意，故一年之始為「端月」","農曆五月：端午節在五月，家家戶戶於門楣掛上菖蒲避邪，所以稱為「蒲月」","農曆七月：由於天氣相當炎熱，適逢荷花盛開，故稱為「荷月」","農曆十二月：「臘」是古代的一種祭祀，在歲末舉行，所以稱作「臘月」"],"answer":2,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":13,"category":"綜合","stem":"（甲）王衍不與敳交，敳卿之不置。衍曰：「君不得為爾。」敳曰：「卿自君我，我自卿卿。我自用我家法，卿自用卿家法。」（乙）安豐曰：「婦人卿婿，於禮為不敬，後勿復爾。」婦曰：「親卿愛卿，是以卿卿；我不卿卿，誰當卿卿？」（丙）意映卿卿如晤：吾今以此書與汝永別矣！下列關於以上三段文字之說明，何者正確？","options":["各段裡作為名詞使用的「卿」字，全是指稱妻子","「誰當卿卿」與「意映卿卿如晤」二者所謂的「卿卿」係指愛妻","「我自卿卿」與「我不卿卿」二句中的「卿卿」二字同作動詞使用","「親卿愛卿，是以卿卿；我不卿卿，誰當卿卿？」句中「卿」字作動詞使用有三個"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":14,"category":"綜合","stem":"漢字的部首具有表意的功能，例如：「水」部的字多與液態狀概念有關，下列各組相同部首文字意義的敘述，何者不正確？","options":["「忙」、「忘」皆與喪失之意有關","「灸」、「炙」皆與燒灼之意有關","「紛」、「紊」皆與擾亂之意有關","「祖」、「禱」皆與祭神之意有關"],"answer":0,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":15,"category":"綜合","stem":"日本俳句(Haiku)是世界最短的詩體之一，俳聖松尾芭蕉的名句「古池や蛙とびこむ水の音」譯為中文之意是「閑寂古池旁，青蛙跳進水中央，撲通一聲響」。此係一種「以動寫靜」的手法，呈現空寂之美。下列何者採用相同寫作手法？","options":["蟬噪林逾靜，鳥鳴山更幽","明月隱高樹，長河沒曉天","竹喧歸浣女，蓮動下漁舟","星垂平野闊，月湧大江流"],"answer":0,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":16,"category":"綜合","stem":"下列有關「氣」的敘述，何者有誤？","options":["可指自然界陰晴、冷暖的現象，如：「八方各異氣，千里殊風雨」（曹植〈泰山梁甫行〉〉）","可指人之才情氣質所顯現的文章風格，如：「文以氣為主，氣之清濁有體，不可力強而致」（曹丕《典論‧論文》）","可指人展現於外的性格或態度，如：「故深折其少年剛銳之氣，使之忍小忿而就大謀」（蘇軾〈留侯論〉）","可指溫度冷熱的變化，如：「朝暉夕陰，氣象萬千」（范仲淹〈岳陽樓記〉）"],"answer":3,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":17,"category":"綜合","stem":"（甲）□嘴八舌（乙）九流□家（丙）陶潛□柳（丁）退避□舍（戊）□拜之交（己）□馬仰秣（庚）莫衷□是（辛）□八年華以上□內應填入的數字加總後是多少？","options":["四十一","四十二","四十三","四十四"],"answer":1,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":18,"category":"綜合","stem":"若以義守大學學士後中醫學系的學生身分撰寫一封正式書信給校長，下列有關受信人的封文寫法，何者正確？","options":["古源光校長台啟","古校長道啟","古源光先生大啟","古校長源光鈞啟源光"],"answer":1,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":19,"category":"綜合","stem":"（甲）功同良相（乙）甲第宏開（丙）祕傳金匱（丁）輸巧婁明（戊）功著杏林（己）春華秋實（庚）壼範永存（辛）痌瘝在抱以上題辭適用於醫院開業者有哪些？","options":["甲乙戊己","丙戊庚辛","乙戊己庚","甲丙戊辛"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":20,"category":"綜合","stem":"（甲）八「秩」晉六嵩壽（應用文柬帖）（乙）遭紛濁而遷逝兮，漫逾「紀」以迄今（王粲〈登樓賦〉）（丙）遂以十「稔」之間，撰成臺灣通史（連橫〈臺灣通史序〉）（丁）如有王者，必「世」而後仁（《論語‧子路》）（戊）始發之時，終日可愈；三日，越「旬」可愈（方孝孺〈指喻〉）上述「」內之文字所表示的時間，請由短至長排列，下列何者正確？","options":["乙戊丙甲丁","戊丙甲乙丁","甲丙戊丁乙","丙戊乙丁甲"],"answer":1,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":21,"category":"綜合","stem":"華人常在喜慶年節的場合宴請賓客，把酒言歡。下列關於古代飲酒文化的敘述，何者正確？（甲）「杜康」、「綠螘」、「三酉」及「金波」皆為酒的代稱（乙）「青帘」、「橘井」、「屠酤」及「旗亭」是酒家的標誌，或是酒家的代稱（丙）「屠蘇」、「蒲觴」及「桂漿」係指於傳統年節或特定節慶中所飲用的酒水（丁）「飛羽觴而醉月」、「洗盞更酌」、「沛公奉卮酒為壽」句中的觴、盞、卮皆為酒杯（戊）「缾之罄矣維罍之恥」、「倩何人與問，雷鳴瓦釜，甚黃鍾啞」句中的罄、罍、瓦釜與黃鍾皆為酒器","options":["甲乙丁","乙丙戊","乙丁戊","甲丙丁"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":22,"category":"綜合","stem":"下列文句所指稱的對象，何者敘述不正確？","options":["〈過秦論〉：「然秦以區區之地，致萬乘之權，招八州而朝同列，百有餘年矣，然後以六合爲家，崤函爲宮；一夫作難而七廟隳，身死人手，為天下笑者何也？」――「一夫」係指陳涉","虬髯曰：「計李郎之程，某日方到。到之明日，可與一妹同詣某坊曲小宅相訪。」――「一妹」係指李靖之妹","張良入謝，曰：「沛公不勝桮杓，不能辭。謹使臣良奉白璧一雙，再拜獻大王足下；玉斗一雙，再拜奉大將軍足下」――「大將軍」係指范增","余自束髮讀書軒中，一日，大母過余曰：「吾兒，久不見若影，何竟日默默在此，大類女郎也？」――「吾兒」係指歸有光"],"answer":1,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":23,"category":"綜合","stem":"請重組下列詩歌的次序：「發現蛇目蝶的偷懶方法，是不斷地走，當他們被驚起時，用你的雙眼作為追蹤雷達，（甲）因為他們往往和樹木談妥了契約（乙）如一位入定的禪者（丙）千萬不要輕易眨眼（丁）這使得他們多數時間冷靜、專注（戊）植物們已將顏色借予他們塗裝在翅腹上在某個陰黯處望著一株草沉思。」","options":["丙甲戊丁乙","甲丁丙乙戊","丁丙乙甲戊","乙丁甲戊丙"],"answer":0,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":24,"category":"綜合","stem":"下列文句「」內詞語何者具有死亡之意？（甲）因人之力而敝之，不仁。失其「所與」，不知（乙）臣以險釁，夙遭閔凶。生孩六月，慈父「見背」（丙）謂百年己分，可長共相保，何圖數年之間，「零落」略盡，言之傷心（丁）驩接狎以離別兮，宵寤夢之芒芒，忽「遷化」而不反兮，魄放逸以飛揚（戊）向之所欣，俛仰之間，以爲陳迹，猶不能不以之興懷；況修短「隨化」，終期於盡","options":["甲乙戊","丙丁戊","乙丙丁","甲乙丁"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":25,"category":"綜合","stem":"《穀梁傳・僖公二年》：「宮之奇之為人也，達心而懦，又少長於君。達心則其言略，懦則不能彊諫。」下列關於「達心而懦」的解釋，何者正確？","options":["心性豁達，卻優柔寡斷","心地良善，卻太過懦弱","深諳人性，但怯於應對","通達事理，但個性懦弱"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":26,"category":"綜合","stem":"日月陰陽兩均天，玄鳥不辭桃花寒。從來今日豎雞仔，川上良人放紙鳶。（唐劉長卿）以下關於此詩的說明，何者有誤？","options":["首句指出此為二十四節氣中的「春分」","「玄鳥」為烏鴉","「豎雞仔」即立雞蛋","整首詩描繪出天地人三者融合的意境"],"answer":1,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":27,"category":"綜合","stem":"下列敘述，何者不正確？","options":["《春秋》為「編年史」之祖","《左傳》為《春秋》內傳，《國語》為《春秋》外傳","《漢書》是斷代史之祖","《水經注》是中國第一部記述河道水系的專書"],"answer":3,"neg":true,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":28,"category":"綜合","stem":"下列作品與作者的配對，何者正確？","options":["〈鵩鳥賦〉：司馬相如","〈阿房宮賦〉：賈誼","〈文賦〉：陸機","〈上林賦〉：揚雄"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":29,"category":"綜合","stem":"（甲）《鐵雲藏龜》是甲骨文專書（乙）《尚書》是最早「記事」的史書（丙）有保存古代科技文明的書是《夢溪筆談》（丁）最早的詩文總集是《昭明文選》以上何者正確？","options":["甲乙丙","乙丙丁","甲丙丁","甲乙丙丁"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":30,"category":"綜合","stem":"下列「為」字之意義，有幾種解釋？（甲）能以禮讓「為」國乎？（《論語‧里仁》）（乙）雖多，亦奚以「為」？（《論語‧子路》）（丙）余既「為」此志，後五年，吾妻來歸。（歸有光〈項脊軒志〉）（丁）背筐，手長鑱，「為」除不潔者。（方苞〈左忠毅公逸事〉）（戊）夫子「為」衛君乎？（《論語‧述而》）","options":["二種","三種","四種","五種"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":31,"category":"綜合","stem":"下列姓氏的注音，何組完全正確？","options":["華：ㄏㄨㄚˋ/瞿：ㄓㄞˊ/單：ㄕㄢˋ","解：ㄒㄧㄝˋ/蓋：ㄍㄜˇ/尉：ㄩˋ","燕：ㄧㄢ/任：ㄖㄣˋ/溥：ㄅㄨˇ","罕：ㄏㄢˇ/裴：ㄈㄟˇ/闕：ㄑㄩㄝ"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":32,"category":"綜合","stem":"「滿朝生地不見熟地，半邊白芷盡是防風。既無遠志空長大黃，全憑厚朴混一生。」是古代民間流傳的以藥名諧音、雙關來諷刺時政與官場官僚的詩詞，請問其中提及幾種藥名？","options":["5種","6種","7種","8種"],"answer":2,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":33,"category":"綜合","stem":"（甲）人不「閒」於其父母昆弟之言（《論語‧先進》）（乙）肉食者鄙之，又何「閒」焉（《左傳‧曹劌論戰》）（丙）彼節者有「閒」，而刀刃者無厚（《莊子‧養生主》）（丁）「閒」邪存其誠（《易經‧乾卦‧文言》）（戊）子疾病，子路使門人為臣。病「閒」，曰：「久矣哉，由之行詐也。詐也。......與其死於臣之手，毋寧死於二三子之手乎！」（《論語‧子罕》）上述各項「閒」字的字義共有幾種？","options":["二種","三種","四種","五種"],"answer":3,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":34,"category":"綜合","stem":"（甲）不是花中偏愛□，此花開盡更無花（乙）竹外□□三兩枝，春江水暖鴨先知（丙）一聲啼鳥，一番夜雨，一陣東風。□□吹盡，佳人何在？門掩殘紅（丁）疏影橫斜水清淺，暗香浮動月黃昏（戊）莫道不銷魂，簾捲西風，人比□□瘦上述五首有關花的詩詞，其中不包括哪一種花？","options":["桃花","杏花","菊花","梅花"],"answer":1,"neg":false,"src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":35,"category":"綜合","stem":"「其方與證對，其用藥也無舛，天下之病有不瘳者鮮矣」，句中的「瘳」字與下列「」內之字意何者最相近？","options":["君不度而賀大國之襲，於己也何「瘳」","虜滋新謀，土失舊封，伊頃迄今，有加無「瘳」","其主道離人理，處狂惑之位處而不悟，身必有「瘳」","而阿針背入一二寸，巨闕胸臟針下五六寸，而病輒皆「瘳」"],"answer":3,"neg":false,"passage":"郁離子曰：「治天下者其猶醫乎！醫切脈以知證，審證以為方。證有陰陽虛實，脈有浮沉細大，而方有汗下、通便、補瀉、針灼、湯劑之法，參、苓、薑、桂、麻黃、芒硝之藥，隨其人之病而施焉，當則生，不當則死矣。是故知證知脈而不善為方，非醫也，雖有扁鵲之識，徒嘵嘵而無用；不知證不知脈，道聽途說以為方，而語人曰我能醫，是賊天下者也。故治亂證也，紀綱脈也，道德、政刑方與法也，人才藥也。夏之政尚忠，殷承其敝而救之以質；殷之政尚質，周承其敝而救之以文；秦用酷刑、苛法以箝天下，天下苦之，而漢承之以寬大，守之以寧壹。其方與證對，其用藥也無舛，天下之病有不瘳者鮮矣。」（《郁離子・喻治》）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":36,"category":"綜合","stem":"有關本文內容，下列敘述何者不正確？","options":["治國如醫病，其理相通","知證知脈即為良醫","人才如同藥材，治國選用恰當的人才至關重要","「證有陰陽虛實、脈有浮沉細大」比喻國家有其時局與弊病，不能一概而論"],"answer":1,"neg":true,"passage":"郁離子曰：「治天下者其猶醫乎！醫切脈以知證，審證以為方。證有陰陽虛實，脈有浮沉細大，而方有汗下、通便、補瀉、針灼、湯劑之法，參、苓、薑、桂、麻黃、芒硝之藥，隨其人之病而施焉，當則生，不當則死矣。是故知證知脈而不善為方，非醫也，雖有扁鵲之識，徒嘵嘵而無用；不知證不知脈，道聽途說以為方，而語人曰我能醫，是賊天下者也。故治亂證也，紀綱脈也，道德、政刑方與法也，人才藥也。夏之政尚忠，殷承其敝而救之以質；殷之政尚質，周承其敝而救之以文；秦用酷刑、苛法以箝天下，天下苦之，而漢承之以寬大，守之以寧壹。其方與證對，其用藥也無舛，天下之病有不瘳者鮮矣。」（《郁離子・喻治》）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":37,"category":"綜合","stem":"根據上文的內容主題，下列敘述何者不正確？","options":["「其目偶愈」的神蹟是來自天意","對造神運動的警示","反對盲目從眾的迷信","傳言的放大效應"],"answer":0,"neg":true,"passage":"南頓人張助者，耕白田，有一李栽，應在耕次，助惜之，欲持歸，乃掘取之，未得即去，以濕土封其根，以置空桑中，遂忘取之。助後作遠職不在，後其里中人，見桑中忽生李，謂之神。有病目痛者，蔭息此桑下，因視之，言李君能令我目愈者，謝以一豚。其目偶愈，便殺豚祭之。傳者過差，便言此樹能令盲者得見。遠近翕然，同來請福，常車馬填溢，酒肉滂沱，如此數年。張助罷職來還，見之，乃曰：「此是我昔所置李栽耳，何有神乎？」乃斫去便止也。（葛洪《抱朴子‧內篇‧道意》）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":38,"category":"綜合","stem":"根據上文的內容，下列詞語解釋何者不正確？","options":["白田：已開墾的田地","傳者過差：傳話的人扭曲了事實","應在耕次：在耕作的範圍內","翕然：聚集起來的樣子"],"answer":0,"neg":true,"passage":"南頓人張助者，耕白田，有一李栽，應在耕次，助惜之，欲持歸，乃掘取之，未得即去，以濕土封其根，以置空桑中，遂忘取之。助後作遠職不在，後其里中人，見桑中忽生李，謂之神。有病目痛者，蔭息此桑下，因視之，言李君能令我目愈者，謝以一豚。其目偶愈，便殺豚祭之。傳者過差，便言此樹能令盲者得見。遠近翕然，同來請福，常車馬填溢，酒肉滂沱，如此數年。張助罷職來還，見之，乃曰：「此是我昔所置李栽耳，何有神乎？」乃斫去便止也。（葛洪《抱朴子‧內篇‧道意》）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":39,"category":"綜合","stem":"本文首段開宗明義撰述主旨，下列說明，何者正確？","options":["弄巧不如守拙","鈍僕謀生不易","人應趨吉避凶","主人寬厚大度"],"answer":0,"neg":false,"passage":"石公曰：「天下之狡於趨避者，兔也，而獵者得之。烏賊魚吐墨以自蔽，乃為殺身之梯，巧何用哉？夫藏身之計，雀不如燕；謀生之術，鸛不如鳩，古記之矣。作〈拙效傳〉。」家有四鈍僕：一名冬，一名東，一名戚，一名奎。冬即余僕也。掀鼻削面，藍眼虬鬚，色若綉鐵。嘗從余武昌，偶令過鄰生處，歸失道，往返數十回，見他僕過者，亦不問。時年已四十餘。余偶出，見其淒涼四顧，如欲哭者，呼之，大喜過望。性嗜酒，一日家方煮醪，冬乞得一盞，適有他役，即忘之案上，為一婢子竊飲盡。煮酒者憐之，與酒如前。冬傴僂突間，為薪焰所著，一烘而過，鬚眉幾火。家人大笑，仍與他酒一瓶。冬甚喜，挈瓶沸湯中，俟暖即飲，偶為湯所濺，失手墮瓶，竟不得一口，瞠目而出。嘗令開門，門樞稍緊，極力一推，身隨門辟，頭顱觸地，足過頂上，舉家大笑。今年隨至燕邸，與諸門隸嬉遊半載，問其姓名，一無所知。（袁宏道〈拙效傳〉）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":40,"category":"綜合","stem":"本文透過描述家僕冬所發生事件以呈現其人物性格。有關家僕冬的遭遇，下列說明何者正確？","options":["脾氣躁急而總是怏怏不悅","健忘到記不住自己的姓名","迷路卻不懂得向他人詢問","喜歡飲酒且經常爛醉如泥"],"answer":1,"neg":false,"passage":"石公曰：「天下之狡於趨避者，兔也，而獵者得之。烏賊魚吐墨以自蔽，乃為殺身之梯，巧何用哉？夫藏身之計，雀不如燕；謀生之術，鸛不如鳩，古記之矣。作〈拙效傳〉。」家有四鈍僕：一名冬，一名東，一名戚，一名奎。冬即余僕也。掀鼻削面，藍眼虬鬚，色若綉鐵。嘗從余武昌，偶令過鄰生處，歸失道，往返數十回，見他僕過者，亦不問。時年已四十餘。余偶出，見其淒涼四顧，如欲哭者，呼之，大喜過望。性嗜酒，一日家方煮醪，冬乞得一盞，適有他役，即忘之案上，為一婢子竊飲盡。煮酒者憐之，與酒如前。冬傴僂突間，為薪焰所著，一烘而過，鬚眉幾火。家人大笑，仍與他酒一瓶。冬甚喜，挈瓶沸湯中，俟暖即飲，偶為湯所濺，失手墮瓶，竟不得一口，瞠目而出。嘗令開門，門樞稍緊，極力一推，身隨門辟，頭顱觸地，足過頂上，舉家大笑。今年隨至燕邸，與諸門隸嬉遊半載，問其姓名，一無所知。（袁宏道〈拙效傳〉）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":41,"category":"綜合","stem":"下列對秦王與唐且二人形象的描述，何者最適當？","options":["秦王唯利是圖╱唐且前倨後恭","秦王色厲內荏╱唐且膽識過人","秦王居功自恃╱唐且盛氣凌人","秦王恃才矜己╱唐且威武不屈"],"answer":2,"neg":false,"passage":"秦王以五百里地易鄢陵，鄢陵君辭而不受，使唐且謝秦王。秦王曰：「秦破韓滅魏，鄢陵君獨以五十里地存者，吾豈畏其威哉？吾多其義耳。今寡人以十倍之地易之，鄢陵君辭而不受，是輕寡人也。」唐且避席對曰：「非如此也，夫不以利害為趣者鄢陵也。夫鄢陵君受地於先君而守之，雖復千里不得當，豈獨五百里哉？」秦王忿然作色，怒曰：「公亦曾見天子之怒乎？」唐且曰：「王臣未曾見也。」秦王曰：「天子一怒，伏尸百萬，流血千里。」唐且曰：「大王亦嘗見夫布衣韋帶之士怒乎？」秦王曰：「布衣韋帶之士怒也，解冠徒跣以頸顙地耳，何難知者。」唐且曰：「此乃匹夫愚人之怒耳，非布衣韋帶之士怒也。夫專諸刺王僚，彗星襲月，奔星晝出；要離刺王子慶忌，蒼隼擊於臺上；聶政刺韓王之季父，白虹貫日。此三人皆夫布衣韋帶之士怒矣，與臣將四。士含怒未發，鋟厲於天。士無怒即已，一怒伏尸二人，流血五步。」即案匕首起視秦王曰：「今將是矣！」秦王變色長跪曰：「先生就坐，寡人喻矣。秦破韓滅魏，鄢陵獨以五十里地存者，徒用先生之故耳。」（劉向《說苑・奉使》）","src":"義守醫 115 年"},{"school":"義守醫","year":115,"num":42,"category":"綜合","stem":"秦王以「天子之怒」恫嚇唐且，唐且則提出「布衣韋帶之士怒也」予以反擊。下列有關二人對話的內容說明，何者不正確？","options":["以「二人」、「五步」對比秦王所提的「百萬」、「千里」，為秦王預留退路","舉專諸、要離與聶政之例，強調平民不畏強權之怒，其氣勢磅礡，不亞於天子之怒","「含怒未發，鋟厲於天」意謂勇士發怒的威力能上感於天，甚至能引發天地異象","以「士無怒即已，一怒伏尸二人，流血五步」之語暗示自己不惜性命，可與秦王同歸於盡"],"answer":0,"neg":true,"passage":"秦王以五百里地易鄢陵，鄢陵君辭而不受，使唐且謝秦王。秦王曰：「秦破韓滅魏，鄢陵君獨以五十里地存者，吾豈畏其威哉？吾多其義耳。今寡人以十倍之地易之，鄢陵君辭而不受，是輕寡人也。」唐且避席對曰：「非如此也，夫不以利害為趣者鄢陵也。夫鄢陵君受地於先君而守之，雖復千里不得當，豈獨五百里哉？」秦王忿然作色，怒曰：「公亦曾見天子之怒乎？」唐且曰：「王臣未曾見也。」秦王曰：「天子一怒，伏尸百萬，流血千里。」唐且曰：「大王亦嘗見夫布衣韋帶之士怒乎？」秦王曰：「布 /* ================= storage ================= */
const LS_PROG='hzgw_progress_v1';
const LS_BANK='hzgw_bank_extra_v1';
const LS_DAYS='hzgw_days_v1';
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
let progress=load(LS_PROG,{});      // key "Y-N" -> {seen,correct,wrong,box,last}
let extraBank=load(LS_BANK,[]);
let days=load(LS_DAYS,[]);          // ['2026-06-09', ...]

/* 校別（學校來源）：中國醫、義守醫。舊資料未標 school 者視為中國醫 */
function qschool(q){return q.school||'中國醫'}
const LS_SCHOOL='hzgw_school_v1';
let curSchool=load(LS_SCHOOL,'中國醫');

/* merge built-in（中國醫 + 義守醫）+ extra bank (extra overrides by key) */
function bank(){
  const map={};
  QUESTIONS.forEach(q=>map[qkey(q)]=q);
  (typeof YISHOU_QUESTIONS!=='undefined'?YISHOU_QUESTIONS:[]).forEach(q=>map[qkey(q)]=q);
  extraBank.forEach(q=>map[qkey(q)]=q);
  return Object.values(map);
}
/* 目前所選校別的題庫 */
function curBank(){return bank().filter(q=>qschool(q)===curSchool)}
/* 進度 key 含校別；中國醫沿用舊格式 "Y-N" 以保留既有進度 */
function qkey(q){return (qschool(q)==='義守醫'?'YS-':'')+q.year+'-'+q.num}
function years(){return [...new Set(curBank().map(q=>q.year))].sort((a,b)=>b-a)}
function cats(){return [...new Set(curBank().map(q=>q.category))]}

/* ================= session ================= */
let session=null; // {list, idx, answers:[]}
let view='home';
let sel={years:[], cats:[]};

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function markDay(){const t=todayStr();if(!days.includes(t)){days.push(t);save(LS_DAYS,days)}refreshStreak()}
function streakCount(){
  if(!days.length)return 0;
  const set=new Set(days);let c=0;const d=new Date();
  for(;;){const s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(set.has(s)){c++;d.setDate(d.getDate()-1)}else{if(c===0&&s===todayStr()){d.setDate(d.getDate()-1);continue}break}}
  return c;
}
function refreshStreak(){const n=streakCount();document.getElementById('streakTxt').textContent=n>0?(n+' 天'):'今天還沒練'}

/* pick daily set: due-for-review wrong ones first, then unseen, then random */
function pickDaily(n){
  const all=curBank();
  const dueWrong=[],unseen=[],rest=[];
  all.forEach(q=>{const p=progress[qkey(q)];
    if(p&&p.last==='wrong')dueWrong.push(q);
    else if(!p||!p.seen)unseen.push(q);
    else rest.push(q);});
  shuffle(dueWrong);shuffle(unseen);shuffle(rest);
  return dueWrong.concat(unseen,rest).slice(0,n);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function startSession(list,opts){
  if(!list.length){alert('這個範圍目前沒有題目');return}
  session={list:shuffle(list.slice()),idx:0,answers:new Array(list.length).fill(null),mode:(opts&&opts.mode)||'practice'};
  renderQuestion();
}

/* ================= render ================= */
const app=document.getElementById('app');
function setView(v){view=v;session=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  ({home:renderHome,year:renderYear,cat:renderCat,wrong:renderWrong,stats:renderStats}[v])();}
document.getElementById('tabs').addEventListener('click',e=>{if(e.target.dataset.v)setView(e.target.dataset.v)});

/* 校別切換條：中國醫 / 義守醫 */
function schoolBar(){
  const list=[['中國醫','中國醫藥大學'],['義守醫','義守大學']];
  return `<div class="schoolbar">${list.map(([s,full])=>{
    const n=bank().filter(q=>qschool(q)===s).length;
    return `<button class="sbtn ${curSchool===s?'on':''}" onclick="setSchool('${s}')" title="${full}">${s}<span class="sc">${n}</span></button>`;
  }).join('')}</div>`;
}
function setSchool(s){
  if(curSchool===s)return;
  curSchool=s;save(LS_SCHOOL,s);sel={years:[],cats:[]};
  ({home:renderHome,year:renderYear,cat:renderCat,wrong:renderWrong,stats:renderStats}[view]||renderHome)();
}

function renderHome(){
  const total=curBank().length;
  const seen=Object.values(progress).filter(p=>p.seen).length;
  const wrongN=Object.values(progress).filter(p=>p.last==='wrong').length;
  app.innerHTML=`
  <div class="card start">
    <h2>今日一練</h2>
    ${schoolBar()}
    <p class="sub">每天抽一組題，答錯的會優先在往後幾天再出現，幫你把它記牢。目前練習：<b>${curSchool}</b>歷屆試題。</p>
    <div class="statgrid" style="margin-bottom:6px">
      <div class="statbox"><b>${total}</b><span>題庫總題數</span></div>
      <div class="statbox"><b>${seen}</b><span>已練習過</span></div>
      <div class="statbox"><b>${wrongN}</b><span>待複習錯題</span></div>
      <div class="statbox"><b>${streakCount()}</b><span>連續練習天數</span></div>
    </div>
    <div class="label">這次要練幾題？</div>
    <div class="row" id="dailyN">
      ${[10,15,20,30].map((n,i)=>`<button class="chip ${i===0?'sel':''}" data-n="${n}">${n} 題</button>`).join('')}
    </div>
    <button class="bigbtn" onclick="startDaily()">開始今日練習</button>
    ${wrongN>0?`<button class="bigbtn ghost" onclick="setView('wrong')">先複習 ${wrongN} 題錯題</button>`:''}
  </div>`;
  app.querySelector('#dailyN').addEventListener('click',e=>{if(e.target.dataset.n){
    app.querySelectorAll('#dailyN .chip').forEach(c=>c.classList.remove('sel'));e.target.classList.add('sel')}});
}
let dailyN=10;
function startDaily(){const c=app.querySelector('#dailyN .sel');dailyN=c?+c.dataset.n:10;
  startSession(pickDaily(dailyN),{mode:'daily'});}

function renderYear(){
  sel.years=sel.years.length?sel.years:[];
  app.innerHTML=`
  <div class="card start">
    <h2>年度練習</h2>
    ${schoolBar()}
    <p class="sub">${curSchool==='義守醫'
      ? '義守大學學士後中醫學系歷屆國文（110〜115 學年度）。四選一、答錯每題倒扣 0.5 分。110 年含作文，故選擇題為 35 題。'
      : '中國醫藥大學歷屆國文（105〜115 學年度）。111 年起為「四選一、答錯倒扣」；105〜109 年為舊制五選一、不倒扣。'}</p>
    <div class="label">選擇年度（學年度）</div>
    <div class="row" id="ySel">
      ${years().map(y=>{const n=curBank().filter(q=>q.year===y).length;
        const tag=(curSchool==='中國醫'&&y<=109)?'（五選一）':'';
        return `<button class="chip ${sel.years.includes(y)?'sel':''}" data-y="${y}">${y} 年 · ${n}題${tag}</button>`}).join('')}
    </div>
    <button class="bigbtn" onclick="startYear()">開始練習所選年度</button>
  </div>`;
  app.querySelector('#ySel').addEventListener('click',e=>{const y=+e.target.dataset.y;if(!y)return;
    e.target.classList.toggle('sel');
    if(sel.years.includes(y))sel.years=sel.years.filter(x=>x!==y);else sel.years.push(y);});
}
function startYear(){const list=curBank().filter(q=>sel.years.includes(q.year));
  if(!list.length){alert('請先選擇至少一個年度');return}startSession(list,{mode:'practice'});}

function renderCat(){
  app.innerHTML=`
  <div class="card start">
    <h2>分類練習</h2>
    ${schoolBar()}
    <p class="sub">針對弱項集中練。選一類或多類一起練。${curSchool==='義守醫'?'（義守醫題目暫統一歸為「綜合」分類）':''}</p>
    <div class="label">選擇題型分類</div>
    <div class="row" id="cSel">
      ${cats().map(c=>{const n=curBank().filter(q=>q.category===c).length;
        return `<button class="chip ${sel.cats.includes(c)?'sel':''}" data-c="${c}">${c} · ${n}</button>`}).join('')}
    </div>
    <button class="bigbtn" onclick="startCat()">開始練習所選分類</button>
  </div>`;
  app.querySelector('#cSel').addEventListener('click',e=>{const c=e.target.dataset.c;if(!c)return;
    e.target.classList.toggle('sel');
    if(sel.cats.includes(c))sel.cats=sel.cats.filter(x=>x!==c);else sel.cats.push(c);});
}
function startCat(){const list=curBank().filter(q=>sel.cats.includes(q.category));
  if(!list.length){alert('請先選擇至少一個分類');return}startSession(list,{mode:'practice'});}

function renderWrong(){
  const wrong=curBank().filter(q=>{const p=progress[qkey(q)];return p&&p.last==='wrong'});
  if(!wrong.length){app.innerHTML=`<div class="card"><div class="empty">目前沒有待複習的錯題。<br>答錯的題目會出現在這裡，直到你再答對為止。</div></div>`;return}
  app.innerHTML=`
  <div class="card start">
    <h2>錯題複習</h2>
    <p class="sub">這裡是你答錯、還沒再答對的 ${wrong.length} 題。答對一次就會從清單移除。</p>
    <button class="bigbtn" onclick='startSession(${JSON.stringify(wrong.map(qkey))}.map(k=>curBank().find(q=>qkey(q)===k)),{mode:"review"})'>開始複習錯題</button>
  </div>`;
}

function renderQuestion(){
  const q=session.list[session.idx];
  const ansLetters=['A','B','C','D','E'];
  const given=session.answers[session.idx]; // null or chosen index
  const pct=Math.round(session.idx/session.list.length*100);
  app.innerHTML=`
  <div class="card">
    <div class="progressbar"><i style="width:${pct}%"></i></div>
    <div class="qmeta">
      <span class="pill">${session.idx+1} / ${session.list.length}</span>
      <span class="pill school">${qschool(q)}</span>
      <span class="pill">${q.year} 年 · 第 ${q.num} 題</span>
      <span class="pill cat">${q.category}</span>
      ${q.neg?'<span class="pill" style="color:var(--ink-faint)">答錯倒扣</span>':''}
    </div>
    ${q.passage?`<div class="passage">${esc(q.passage)}${q.src?`<span class="src">${esc(q.src)}</span>`:''}</div>`:''}
    <p class="stem">${esc(q.stem)}</p>
    <div class="opts" id="opts">
      ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${ansLetters[i]}</span><span>${esc(o)}</span></button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="qnav" id="qnav" style="display:none">
      <button class="btn-quiet" onclick="prevQ()" ${session.idx===0?'disabled style="opacity:.4"':''}>上一題</button>
      <button class="btn-primary" onclick="nextQ()">${session.idx===session.list.length-1?'看結果':'下一題'}</button>
    </div>
  </div>`;
  const opts=app.querySelector('#opts');
  if(given!==null){revealAnswer(given);} else {
    opts.addEventListener('click',e=>{const b=e.target.closest('.opt');if(!b)return;answer(+b.dataset.i)});
  }
}
function answer(i){
  const q=session.list[session.idx];
  session.answers[session.idx]=i;
  const correct=(i===q.answer);
  const p=progress[qkey(q)]||{seen:0,correct:0,wrong:0,box:1};
  p.seen=(p.seen||0)+1;
  if(correct){p.correct=(p.correct||0)+1;p.last='correct';p.box=Math.min((p.box||1)+1,5)}
  else{p.wrong=(p.wrong||0)+1;p.last='wrong';p.box=1}
  progress[qkey(q)]=p;save(LS_PROG,progress);
  revealAnswer(i);
}
function revealAnswer(i){
  const q=session.list[session.idx];const correct=(i===q.answer);
  const ansLetters=['A','B','C','D','E'];
  app.querySelectorAll('.opt').forEach(b=>{const bi=+b.dataset.i;b.classList.add('disabled');
    if(bi===q.answer)b.classList.add('correct');
    if(bi===i&&!correct)b.classList.add('wrong');});
  const fb=app.querySelector('#fb');fb.className='feedback show '+(correct?'ok':'no');
  fb.innerHTML=(correct?'<b>答對了</b>':`<b>答錯了</b>　正解是 <b>${ansLetters[q.answer]}</b>`)+
    (q.explanation?`<div class="exp">${esc(q.explanation)}</div>`:'');
  app.querySelector('#qnav').style.display='flex';
}
function prevQ(){if(session.idx>0){session.idx--;renderQuestion()}}
function nextQ(){if(session.idx<session.list.length-1){session.idx++;renderQuestion()}else finishSession()}

function finishSession(){
  if(session.mode==='daily'||session.mode==='review')markDay();
  let right=0,wrong=0,blank=0,score=0;
  session.list.forEach((q,k)=>{const a=session.answers[k];
    if(a===null){blank++}
    else if(a===q.answer){right++;score+=2}
    else{wrong++;if(q.neg)score-=0.7}});
  score=Math.round(score*10)/10;
  const acc=right+wrong>0?Math.round(right/(right+wrong)*100):0;
  const stampWord=acc>=80?'佳':acc>=60?'進':'勤';
  app.innerHTML=`
  <div class="card result">
    <div class="label">本次成績</div>
    <div class="score">${score} 分</div>
    <div class="stamp">${stampWord}<br><span style="font-size:11px">${todayStr().slice(5)}</span></div>
    <div class="stat3">
      <div><b style="color:var(--jade)">${right}</b><span>答對</span></div>
      <div><b style="color:var(--wrong)">${wrong}</b><span>答錯</span></div>
      <div><b style="color:var(--ink-faint)">${blank}</b><span>未答</span></div>
    </div>
    <p class="sub" style="color:var(--ink-soft);font-size:14px">正確率 ${acc}%　·　${session.mode==='daily'?'今天的練習完成了，明天見。':'這組練完了。'}</p>
    <button class="bigbtn" onclick="setView('home')">回首頁</button>
    <button class="bigbtn ghost" onclick="setView('wrong')">複習這次的錯題</button>
  </div>`;
  refreshStreak();
}

/* ================= stats ================= */
function renderStats(){
  const all=curBank();const seen=all.filter(q=>progress[qkey(q)]&&progress[qkey(q)].seen);
  let tc=0,tw=0;Object.values(progress).forEach(p=>{tc+=p.correct||0;tw+=p.wrong||0});
  const acc=tc+tw>0?Math.round(tc/(tc+tw)*100):0;
  const byCat={};all.forEach(q=>{const p=progress[qkey(q)];const c=q.category;
    if(!byCat[c])byCat[c]={right:0,total:0};
    if(p&&(p.correct||p.wrong)){byCat[c].right+=p.correct||0;byCat[c].total+=(p.correct||0)+(p.wrong||0)}});
  app.innerHTML=`
  <div class="card">
    <h2 style="font-family:var(--serif);font-weight:600;font-size:20px;margin:0 0 14px">學習統計</h2>
    <div class="statgrid">
      <div class="statbox"><b>${seen.length}/${all.length}</b><span>題庫覆蓋</span></div>
      <div class="statbox"><b>${acc}%</b><span>累積正確率</span></div>
      <div class="statbox"><b>${tc+tw}</b><span>累積作答次數</span></div>
      <div class="statbox"><b>${streakCount()} 天</b><span>連續練習</span></div>
    </div>
    <div class="label">各題型正確率</div>
    <div class="catbar">
      ${Object.entries(byCat).map(([c,v])=>{const pc=v.total?Math.round(v.right/v.total*100):0;
        return `<div class="crow"><span class="cname">${c}</span><span class="ctrack"><i style="width:${pc}%"></i></span><span class="cpct">${v.total?pc+'%':'—'}</span></div>`}).join('')}
    </div>
  </div>`;
}

/* ================= data modal ================= */
const modal=document.getElementById('modal');
document.getElementById('btnData').onclick=()=>modal.classList.add('show');
function closeModal(){modal.classList.remove('show')}
modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
function exportProgress(){dl('houzhong-guowen-進度-'+todayStr()+'.json',JSON.stringify({progress,days},null,2))}
function exportBank(){dl('houzhong-guowen-題庫.json',JSON.stringify(bank(),null,2))}
document.getElementById('impProg').addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
    if(d.progress){progress=d.progress;save(LS_PROG,progress)}if(d.days){days=d.days;save(LS_DAYS,days)}
    alert('進度已匯入');refreshStreak();setView('home')}catch(e){alert('檔案格式有誤')}};r.readAsText(f)});
function mergeBankFromText(){const t=document.getElementById('impBankTxt').value.trim();if(!t)return;
  try{let arr=JSON.parse(t);if(!Array.isArray(arr))arr=[arr];
    const map={};extraBank.forEach(q=>map[q.year+'-'+q.num]=q);arr.forEach(q=>map[q.year+'-'+q.num]=q);
    extraBank=Object.values(map);save(LS_BANK,extraBank);
    document.getElementById('impBankTxt').value='';alert('已合併 '+arr.length+' 題進題庫');closeModal();setView('home')}
  catch(e){alert('JSON 格式有誤：'+e.message)}}
function resetAll(){if(confirm('確定清除全部練習進度與匯入的題庫嗎？此動作無法復原。')){
  localStorage.removeItem(LS_PROG);localStorage.removeItem(LS_BANK);localStorage.removeItem(LS_DAYS);
  progress={};extraBank=[];days=[];closeModal();refreshStreak();setView('home')}}
function dl(name,txt){const b=new Blob([txt],{type:'application/json'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}

function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

/* ================= init ================= */
refreshStreak();setView('home');
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
