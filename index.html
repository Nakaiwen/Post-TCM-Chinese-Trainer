<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後中醫國文 · 每日練習器</title>
<meta name="theme-color" content="#F3EEE3">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="後中國文">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3EEE3;
  --surface:#FBF7EF;
  --surface-2:#F6EFE2;
  --ink:#2A2723;
  --ink-soft:#6E6253;
  --ink-faint:#9C8E7A;
  --accent:#B23A2F;          /* 朱砂 */
  --accent-deep:#8E2A22;
  --seal:#C24A3C;
  --jade:#5E7A53;            /* 答對 */
  --jade-bg:#E9EFE3;
  --wrong:#B23A2F;
  --wrong-bg:#F6E4DF;
  --line:#DED3C0;
  --line-soft:#EBE3D4;
  --serif:"Noto Serif TC",Georgia,"Songti TC","STSong",serif;
  --sans:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  line-height:1.7;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 96px}

/* ---------- top bar ---------- */
header{
  position:sticky;top:0;z-index:30;
  background:rgba(243,238,227,.92);
  backdrop-filter:saturate(140%) blur(8px);
  border-bottom:1px solid var(--line);
}
.bar{max-width:760px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
.mark{
  width:38px;height:38px;flex:0 0 auto;border-radius:8px;
  background:var(--accent);color:#fff;font-family:var(--serif);font-weight:700;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 1px 0 rgba(0,0,0,.12) inset;letter-spacing:-1px;
}
.brand{display:flex;flex-direction:column;line-height:1.25}
.brand b{font-family:var(--serif);font-weight:600;font-size:17px;letter-spacing:.5px}
.brand span{font-size:11.5px;color:var(--ink-faint);letter-spacing:1.5px}
.bar .grow{flex:1}
.streak{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft)}
.streak .seal{
  width:24px;height:24px;border-radius:5px;border:1.5px solid var(--seal);
  color:var(--seal);font-family:var(--serif);font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transform:rotate(-4deg);
}
.iconbtn{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);
  border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ---------- tabs ---------- */
nav.tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:none;background:none;font-family:var(--sans);font-size:14.5px;
  color:var(--ink-soft);padding:8px 13px;border-radius:18px;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--ink);color:var(--surface)}

/* ---------- generic card ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:22px;margin-top:16px;box-shadow:0 1px 2px rgba(80,60,30,.04)}

/* ---------- start panel ---------- */
.start h2{font-family:var(--serif);font-weight:600;font-size:21px;margin:0 0 4px}
.start p.sub{color:var(--ink-soft);font-size:14px;margin:0 0 18px}
.row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.chip{border:1px solid var(--line);background:var(--surface-2);border-radius:10px;
  padding:9px 14px;font-size:14px;cursor:pointer;color:var(--ink-soft);font-family:var(--sans)}
.chip.sel{border-color:var(--accent);background:#fff;color:var(--accent);font-weight:500}
.label{font-size:12.5px;color:var(--ink-faint);letter-spacing:1px;margin-top:16px}
.bigbtn{display:block;width:100%;margin-top:22px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;padding:15px;font-size:16px;font-family:var(--serif);font-weight:600;
  letter-spacing:1px;cursor:pointer;box-shadow:0 2px 0 var(--accent-deep)}
.bigbtn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--accent-deep)}
.bigbtn.ghost{background:var(--surface);color:var(--accent);border:1px solid var(--accent);
  box-shadow:none;font-size:15px;padding:13px}

/* ---------- question ---------- */
.qmeta{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-faint);
  letter-spacing:.5px;margin-bottom:14px}
.qmeta .pill{border:1px solid var(--line);border-radius:20px;padding:2px 10px}
.qmeta .cat{color:var(--accent);border-color:#E5C9C2}
.qmeta .school{color:var(--seal);border-color:var(--seal);font-weight:600}
/* 校別切換條 */
.schoolbar{display:flex;gap:8px;margin:0 0 14px}
.schoolbar .sbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  border:1px solid var(--line);background:var(--surface-2);color:var(--ink-faint);
  border-radius:12px;padding:10px 12px;font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .15s}
.schoolbar .sbtn .sc{font-size:12px;font-weight:500;opacity:.75;background:rgba(0,0,0,.05);
  border-radius:20px;padding:1px 8px}
.schoolbar .sbtn.on{background:var(--seal);border-color:var(--seal);color:#fff}
.schoolbar .sbtn.on .sc{background:rgba(255,255,255,.22);opacity:.95}
.progressbar{height:5px;background:var(--line-soft);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progressbar i{display:block;height:100%;background:var(--accent);transition:width .3s}
.passage{font-family:var(--serif);background:var(--surface-2);border:1px solid var(--line-soft);
  border-left:3px solid var(--seal);border-radius:8px;padding:14px 16px;margin-bottom:16px;
  font-size:15.5px;line-height:2;color:#3a352e;white-space:pre-wrap}
.passage .src{display:block;text-align:right;font-size:12.5px;color:var(--ink-faint);margin-top:6px;font-family:var(--sans)}
.stem{font-family:var(--serif);font-size:18px;line-height:1.9;margin:0 0 18px;font-weight:500}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);background:var(--surface);
  border-radius:11px;padding:13px 15px;cursor:pointer;font-size:15.5px;line-height:1.7;
  transition:border-color .15s,background .15s;text-align:left;font-family:var(--sans);color:var(--ink)}
.opt:hover{border-color:var(--accent)}
.opt .k{flex:0 0 auto;width:25px;height:25px;border-radius:6px;background:var(--surface-2);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:600;font-size:14px;color:var(--ink-soft)}
.opt.correct{border-color:var(--jade);background:var(--jade-bg)}
.opt.correct .k{background:var(--jade);color:#fff;border-color:var(--jade)}
.opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.opt.wrong .k{background:var(--wrong);color:#fff;border-color:var(--wrong)}
.opt.disabled{cursor:default}
.opt.disabled:hover{border-color:var(--line)}
.opt.correct.disabled:hover{border-color:var(--jade)}
.opt.wrong.disabled:hover{border-color:var(--wrong)}
.feedback{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:14.5px;line-height:1.8;display:none}
.feedback.show{display:block}
.feedback.ok{background:var(--jade-bg);border:1px solid #CBD9C0}
.feedback.no{background:var(--wrong-bg);border:1px solid #E7CABF}
.feedback b{font-family:var(--serif)}
.feedback .exp{margin-top:8px;color:var(--ink-soft);font-size:14px}
.qnav{display:flex;gap:10px;margin-top:20px}
.qnav button{flex:1;border-radius:11px;padding:13px;font-size:15px;cursor:pointer;
  font-family:var(--serif);font-weight:600;letter-spacing:1px}
.btn-primary{background:var(--accent);color:#fff;border:none;box-shadow:0 2px 0 var(--accent-deep)}
.btn-primary:active{transform:translateY(1px);box-shadow:0 1px 0 var(--accent-deep)}
.btn-quiet{background:var(--surface);color:var(--ink-soft);border:1px solid var(--line)}

/* ---------- result ---------- */
.result{text-align:center}
.result .score{font-family:var(--serif);font-size:52px;font-weight:700;color:var(--accent);line-height:1.1;margin-top:6px}
.result .stamp{margin:14px auto;width:72px;height:72px;border:2.5px solid var(--seal);border-radius:12px;
  color:var(--seal);font-family:var(--serif);font-weight:700;font-size:22px;display:flex;
  align-items:center;justify-content:center;transform:rotate(-5deg);line-height:1.2;text-align:center}
.stat3{display:flex;justify-content:center;gap:24px;margin:18px 0 4px}
.stat3 div{display:flex;flex-direction:column}
.stat3 b{font-family:var(--serif);font-size:24px}
.stat3 span{font-size:12px;color:var(--ink-faint);letter-spacing:1px}

/* ---------- stats ---------- */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.statbox{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:11px;padding:14px}
.statbox b{font-family:var(--serif);font-size:26px;display:block}
.statbox span{font-size:12.5px;color:var(--ink-faint)}
.catbar{margin-top:10px}
.catbar .crow{display:flex;align-items:center;gap:10px;font-size:13px;margin:7px 0}
.catbar .cname{flex:0 0 92px;color:var(--ink-soft)}
.catbar .ctrack{flex:1;height:8px;background:var(--line-soft);border-radius:4px;overflow:hidden}
.catbar .ctrack i{display:block;height:100%;background:var(--jade)}
.catbar .cpct{flex:0 0 56px;text-align:right;color:var(--ink-faint);font-variant-numeric:tabular-nums}

.empty{text-align:center;color:var(--ink-faint);padding:30px 10px;font-size:14.5px}
.tiny{font-size:12px;color:var(--ink-faint);margin-top:14px;line-height:1.7}
textarea{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;padding:12px;
  font-family:monospace;font-size:12px;background:var(--surface-2);resize:vertical}
.modalbg{position:fixed;inset:0;background:rgba(40,35,30,.45);z-index:50;display:none;
  align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
.modalbg.show{display:flex}
.modal{background:var(--surface);border-radius:16px;max-width:540px;width:100%;padding:24px}
.modal h3{font-family:var(--serif);margin:0 0 12px;font-size:19px}
.modal .x{float:right;cursor:pointer;color:var(--ink-faint);font-size:20px;border:none;background:none}
.note{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--ink-soft);margin:10px 0}
a.link{color:var(--accent);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="mark">醫</div>
    <div class="brand"><b>後中國文 · 每日練習</b><span>歷屆考古題</span></div>
    <div class="grow"></div>
    <div class="streak" id="streakBox" title="連續練習天數"><span class="seal">勤</span><span id="streakTxt">—</span></div>
    <button class="iconbtn" id="btnData">資料</button>
  </div>
  <div class="bar" style="padding-top:0;padding-bottom:8px">
    <nav class="tabs" id="tabs">
      <button class="tab active" data-v="home">每日練習</button>
      <button class="tab" data-v="year">年度練習</button>
      <button class="tab" data-v="cat">分類練習</button>
      <button class="tab" data-v="wrong">錯題複習</button>
      <button class="tab" data-v="stats">學習統計</button>
    </nav>
  </div>
</header>

<div class="wrap" id="app"></div>

<div class="modalbg" id="modal">
  <div class="modal">
    <button class="x" onclick="closeModal()">×</button>
    <h3>題庫與進度資料</h3>
    <div class="note">這份練習器把答題進度存在這台裝置的瀏覽器裡。換裝置或清除瀏覽器資料前，記得先「匯出進度」備份。</div>
    <button class="bigbtn ghost" onclick="exportProgress()">匯出我的練習進度（JSON）</button>
    <button class="bigbtn ghost" onclick="document.getElementById('impProg').click()">匯入練習進度</button>
    <input type="file" id="impProg" accept=".json" style="display:none">
    <div class="label">新增題庫（其他年份 / 自訂題）</div>
    <div class="note">把符合格式的題目 JSON 貼進來，按「合併進題庫」即可加題。重複題號會自動覆蓋。匯入的題庫也會存在這台裝置。</div>
    <textarea id="impBankTxt" placeholder='[{"year":110,"num":1,"category":"字音","stem":"...","options":["...","...","...","..."],"answer":0,"neg":true}]'></textarea>
    <button class="bigbtn ghost" onclick="mergeBankFromText()">合併進題庫</button>
    <button class="bigbtn ghost" onclick="exportBank()">匯出目前題庫</button>
    <button class="bigbtn ghost" style="color:var(--ink-faint);border-color:var(--line)" onclick="resetAll()">清除全部進度（不可復原）</button>
    <div class="tiny">題庫格式：每題需要 year（年度）、num（題號）、category（分類）、stem（題幹）、options（選項陣列）、answer（正解索引，0=第一個選項）。可選 passage（題組短文）、src（出處）、neg（是否答錯倒扣）、explanation（解析）。</div>
  </div>
</div>

<script>
const QUESTIONS = [{"year": 105, "num": 1, "category": "字詞釋義", "stem": "下列選項包含「東」、「西」、「南」、「北」用字，何者不是實指方位？", "options": ["西風東漸", "斗杓東指", "南面稱王", "萱萎北堂", "西出陽關"], "answer": 3, "neg": false}, {"year": 105, "num": 2, "category": "國學常識", "stem": "當我們想從電腦「唐宋古文多媒體網路系統」中以「文句檢索」的方式查詢歐陽脩〈秋聲賦〉的原文時，如果該文章已輸入電腦，可藉由下列哪一段關鍵句，才能順利找到？", "options": ["忽奔騰而澎湃，如波濤夜驚", "信義行於君子，而刑戮施於小人", "霪雨霏霏，連月不開，陰風怒號", "樹林陰翳，鳴聲上下，遊人去而禽鳥樂", "遠吞山光，平挹江瀨，幽闃遼敻，不可具狀"], "answer": 0, "neg": false}, {"year": 105, "num": 3, "category": "修辭文法", "passage": "「我一生甲、揮之不去的款款深情，全都給了妳。乙、酒紅的黃昏美景，比不上妳醉人的梨渦；丙、傾瀉的巖泉細流，比不上妳豐柔的青絲；丁、澄澈的一泓清泉，也比不過妳深邃的瞳眸。」", "stem": "請閱讀上文，並判斷畫線處的句子，何者運用不恰當？", "options": ["乙丁", "甲丙", "乙丙", "甲乙", "甲丁"], "answer": 1, "neg": false}, {"year": 105, "num": 4, "category": "修辭文法", "stem": "下列「」中詞語，何者非偏義複詞？", "options": ["忘路之「遠近」", "歸「去來」兮", "陟罰臧否，不宜「異同」", "「去來」江口空守船", "「是非」自在人心"], "answer": 4, "neg": false}, {"year": 105, "num": 5, "category": "字形", "passage": "「雨過天青，爺爺迫不急待，逕自扛起笨重的攝影裝備，尋著熟稔的小路進入樹林；迎面吹拂的涼風，飽含著各種野花的甜美香氣，還蘊藏著一鼓陽光的味道。」", "stem": "上面的短文裡，出現了哪些錯別字？", "options": ["青、逕、拂", "急、尋、鼓", "急、扛、稔", "尋、拂、鼓", "急、含、鼓"], "answer": 1, "neg": false}, {"year": 105, "num": 6, "category": "修辭文法", "stem": "在「文言文」或「詩句」裡為了使文句更為精鍊，常有省略主語的情形，以下各選項，哪一句並沒有省略主語？", "options": ["攀條折其榮", "開筵面場圃", "匹夫而為百世師", "見藐小微物，必細察其紋理", "兩看相不厭，只有靜亭山"], "answer": 2, "neg": false}, {"year": 105, "num": 7, "category": "詩詞鑑賞", "stem": "下列各詩句都是敘寫雨景，何者所描述的雨勢最小？", "options": ["渭城朝雨浥輕塵，客舍青青柳色新", "黃昏風雨打園林，殘菊飄零滿地金", "清明時節雨紛紛，路上行人欲斷魂", "三更酒醒殘燈在，臥聽蕭蕭雨打篷", "自在飛花輕似夢，無邊絲雨細如愁"], "answer": 4, "neg": false}, {"year": 105, "num": 8, "category": "國學常識", "stem": "以下有關「書信」的用語，何者正確？", "options": ["對長輩自稱為「後學」", "稱對方父子為「賢昆仲」", "信封提稱語師長可用「敬啟」", "書信末尾祝福語，對父母用「敬祝鈞安」", "信中若提及自己的尊長字體應略小偏右，若是自稱，則不必略小偏右"], "answer": 0, "neg": false}, {"year": 105, "num": 9, "category": "修辭文法", "stem": "下列五個選項中，都運用「轉品」的手法，何者與其他四組不同？", "options": ["伯牙「鼓」琴", "六馬仰「秣」", "會盟而謀「弱」秦", "不獨「親」其親", "「雪」會稽之恥"], "answer": 2, "neg": false}, {"year": 105, "num": 10, "category": "字形", "stem": "下列成語在更改後，何者由錯誤用字變成正確用字？", "options": ["走投無路→走頭無路", "自力更生→自立更生", "美輪美奐→美倫美奐", "故步自封→固步自封", "濫芋充數→濫竽充數"], "answer": 4, "neg": false}, {"year": 105, "num": 11, "category": "詞語成語", "stem": "下列各組成語，何者喻意兩兩相同？", "options": ["披星載月／月暈而風", "以蠡測海／愚不可及", "險象環生／奔車朽索", "揚揚止沸／成竹在胸", "言簡意賅／意在言外"], "answer": 2, "neg": false}, {"year": 105, "num": 12, "category": "修辭文法", "stem": "下列文句裡「」中的詞語，何者不是運用「借代」修辭手法？", "options": ["星分異軫，地接「衡廬」", "居「廟堂」之高則憂其民", "紅顏棄軒冕，「白首」臥松雲", "有「龍泉」之利，乃可以議於割斷", "潯陽地僻無音樂，終歲不聞「絲竹」聲"], "answer": 0, "neg": false}, {"year": 105, "num": 13, "category": "國學常識", "stem": "下列有關於《詩經》的敘述，何者正確？", "options": ["網羅戰國以前五、六百年之間的作品", "《詩經》三百零五篇是孔子及弟子共同編訂的", "《詩經》的體裁是「賦、比、興」，因為它是廟堂裡的樂曲", "《詩經》裡有許多是只有樂曲，沒有詞句的詩歌，稱之「笙詩」", "《詩經》傳至漢朝，傳經者有四家，現今以《毛詩》保存最完整"], "answer": 4, "neg": false}, {"year": 105, "num": 14, "category": "國學常識", "stem": "下列有關韓愈的敘述，何者正確？", "options": ["唐代古文運動的創始者", "在思想上發揚儒家學說，排斥黃、老思想", "與宋代蘇軾同為古文運動代表，世稱「韓蘇」", "柳宗元曾撰文稱讚韓愈「文起八代之衰，道濟天下之溺」", "他作〈師說〉一文，目的在糾正中唐士大夫恥於相師的缺失"], "answer": 4, "neg": false}, {"year": 105, "num": 15, "category": "國學常識", "stem": "古人的「名」與「字」，常有對應之關係，下列各選項的對應關係，何者和「韓愈字退之」相同？", "options": ["諸葛亮字孔明", "張飛字翼德", "端木賜字子貢", "孔丘字仲尼", "曾鞏字子固"], "answer": 2, "neg": false}, {"year": 105, "num": 16, "category": "詩詞鑑賞", "passage": "袁枚〈馬嵬〉：「莫唱當年長恨歌，人間亦自有銀河，石壕村中夫妻別，淚比長生殿上多」", "stem": "從詩的內容來推斷，袁枚抱持何種觀點看待唐玄宗與楊貴妃的愛情故事？", "options": ["實用觀點", "批判觀點", "欣賞觀點", "感懷觀點", "惋惜觀點"], "answer": 1, "neg": false}, {"year": 105, "num": 17, "category": "字詞釋義", "stem": "「狂馬不釋其策，操弓不反於檠」意涵是：", "options": ["人須時加約束鞭策", "良馬良弓難尋", "亂世須用嚴刑峻罰", "物各有性，勉強不得", "清者自清，濁者自濁"], "answer": 0, "neg": false}, {"year": 105, "num": 18, "category": "字詞釋義", "stem": "下列文句中的「而」字，何者和「盡吾志也，而不能至者」的「而」字意義相同？", "options": ["其進愈難，「而」其見愈奇", "人「而」無信，不知其可", "念高危，則思謙沖「而」自牧", "至於幽暗昏惑，「而」無物以相之", "先帝創業未半，「而」中道崩殂"], "answer": 4, "neg": false}, {"year": 105, "num": 19, "category": "詩詞鑑賞", "passage": "「湖水因為風的存在／蕩起的層層線條／就像相思的信箋卻飄不進伊人的信箱」；「風景被情侶們的傘／裝飾著／我再也沒有理由說／『今天的天氣真好』／又該如何約你／約你／漫步在雨絲情愁的江南」", "stem": "以上詩句，作者的詩題為〈有愛的日子〉，請你根據文意選出適合的副標：", "options": ["初戀", "熱戀", "失戀", "依戀", "別戀"], "answer": 0, "neg": false}, {"year": 105, "num": 20, "category": "閱讀測驗", "stem": "《論語》子曰：「君子之於天下也，無適也，無莫也，義之與比」，這段文句和下列有關孔子行誼的記述，何者最切合？", "options": ["子之所慎：齊、戰、疾", "子不語：怪、力、亂、神", "子曰：己所不欲，勿施於人", "子絕四：毋意、毋必、毋固、毋我", "子貢曰：夫子溫、良、恭、儉、讓以得之"], "answer": 3, "neg": false}, {"year": 105, "num": 21, "category": "閱讀測驗", "stem": "曾國藩曾說：「天可補，海可填，南山可移。日月既往，不可復追」這段話是在強調何者的重要？", "options": ["知所進退", "立定志向", "用功讀書", "培養勇氣", "把握時間"], "answer": 4, "neg": false}, {"year": 105, "num": 22, "category": "閱讀測驗", "passage": "由右麓逾謝公嶺，渡一澗，循澗西行，即靈峰道也。一轉山腋，兩壁峭立亙天，危峰亂疊，如削如攢，如駢筍，如挺芝，如筆之卓，如襆之欹。洞有口如卷幕者，潭有碧如澄靛者。雙鸞、五老，接翼聯肩。如此里許，抵靈峰寺。", "src": "明‧徐弘祖〈遊雁宕山日記〉", "stem": "由文中所敘，可見靈峰道上的風景特色是：", "options": ["山氣日夕佳，飛鳥相與還", "山靄蒼蒼望轉迷，心凝形釋", "山陰道上奇景多，目不暇給", "橫看成嶺側成峰，遠近高低各不同", "山窮水盡疑無路，柳暗花明又一村"], "answer": 2, "neg": false}, {"year": 105, "num": 23, "category": "詩詞鑑賞", "passage": "「鼓聲三下紅旗開，兩龍躍出浮水來，棹影斡波飛萬劍，鼓聲劈浪鳴千雷。」", "stem": "根據這首詩的意象，所敘寫的應該是哪個季節？", "options": ["暮春", "孟夏", "仲夏", "季夏", "初秋"], "answer": 2, "neg": false}, {"year": 105, "num": 24, "category": "文意排序", "passage": "下面是余光中的現代詩〈秦俑〉：「鎧甲未解，雙手猶緊緊地握住／甲、向兩千年前的沙場奔去 乙、如果鉦鼓突然間敲起 丙、你會立刻轉身嗎？立刻 丁、我看不見的弓箭或長矛／去加入一行行一列列的同袍？」", "stem": "請依文意正確排列出文句：", "options": ["丁乙甲丙", "乙丙甲丁", "丙乙丁甲", "丁乙丙甲", "乙丙丁甲"], "answer": 3, "neg": false}, {"year": 105, "num": 25, "category": "字詞釋義", "stem": "〈鄭伯克段于鄢〉一文引《詩經》曰：「孝子不匱，永錫爾類」，此句中「錫」字的意義，與下列哪一個選項相符？", "options": ["賜予", "幫助", "堅固", "延續", "記載"], "answer": 0, "neg": false}, {"year": 105, "num": 26, "category": "閱讀測驗", "passage": "袁哲生〈秀才的手錶〉一文嘗言：「每個人的身體裡面原本都有一只手錶，這是我從火炎仔身上驗證得到的道理。」", "stem": "請問以下選項，何者不適合做為此言注腳？", "options": ["「光陰者，百代之過客，而浮生若夢，為歡幾何？」(李白〈春夜宴桃李園序〉)", "「廬山庵裡曉燈前，籠鳥檻猿俱未死，人間相見是何年？」(白居易〈與元微之書〉)", "「朝飛暮倦，雲霞翠軒；雨絲風片，煙波畫船——錦屏人忒看的這韶光賤。」《牡丹亭‧驚夢》", "「春江潮水連海平，海上明月共潮生。灩灩隨波千萬里，何處春江無月明！」(張若虛〈春江花月夜〉)", "「儂今葬花人笑癡，他日葬儂知是誰？試看春殘花漸落，便是紅顏老死時。一朝春盡紅顏老，花落人亡兩不知！」《紅樓夢‧黛玉葬花詞》"], "answer": 3, "neg": false}, {"year": 105, "num": 27, "category": "字詞釋義", "stem": "下列各選項的「舉」字，何者和「舉世皆濁我獨清」的「舉」字意義相同？", "options": ["「舉」進士第一名", "「舉」手投足", "「舉」棋不定", "「舉」身疼痛", "「舉」一反三"], "answer": 3, "neg": false}, {"year": 105, "num": 28, "category": "閱讀測驗", "passage": "黃山自古有「怪石、冬雪、溫泉、奇松、雲海」五絕，以下節選徐霞客〈遊黃山日記〉的文章片段，依序配對五絕勝景。", "stem": "請選出不吻合的描寫：", "options": ["穿石罅而上，亂石危綴間，搆木為室", "石峯環夾，其中石級為積雪所平，一望如玉", "時凝寒未解，而湯氣鬱然，水泡池底汨汨起，氣本香冽", "高者不盈丈，低僅數寸，平頂短鬣，盤根虯幹，愈短愈老，愈小愈奇", "俯窺其陰，則亂峯列岫，爭奇並起。蓮花、雲門諸峯，爭奇競秀，穿石而出，撩繞衣裾"], "answer": 4, "neg": false}, {"year": 105, "num": 29, "category": "詩詞鑑賞", "passage": "下列詩詞，具有季節景物的描寫：甲、梅子留酸軟齒牙，芭蕉分綠與窗紗；乙、蔞蒿滿地蘆芽短，正是河豚欲上時；丙、寒蟬淒切，對長亭晚，驟雨初歇；丁、一年好景君須記，最是橙黃橘綠時。", "stem": "請依春夏秋冬時序排列，正確的選項是：", "options": ["乙甲丙丁", "甲乙丙丁", "丙丁甲乙", "乙甲丁丙", "乙丁甲丙"], "answer": 0, "neg": false}, {"year": 105, "num": 30, "category": "詩詞鑑賞", "stem": "王國維《人間詞話》說：「『紅杏枝頭春意鬧』，著一『鬧』字而境界全出。」從宋朝張先〈天仙子〉的「沙上并禽池上瞑，雲破月來花弄影」中，也可以找出哪一個同樣精彩的字？", "options": ["并", "瞑", "破", "來", "弄"], "answer": 4, "neg": false}, {"year": 105, "num": 31, "category": "字詞釋義", "stem": "「長幼不比肩」的「比」，與下列哪一個選項中的「比」字意思相同？", "options": ["「比」比皆是", "人「比」黃花瘦", "貨「比」三家不吃虧", "在天願做「比」翼鳥", "有功之生也，孺人「比」乳他人加健"], "answer": 3, "neg": false}, {"year": 105, "num": 32, "category": "字音", "stem": "下列各組「」中的讀音，何者兩兩相同？", "options": ["「踅」身就走／空谷「跫」音", "三更畫「舫」／年齡相「仿」", "蹧「蹋」糧食／房屋坍「塌」", "烘「焙」麵包／「培」育人才", "「朔」風野大／「塑」像逼真"], "answer": 1, "neg": false}, {"year": 105, "num": 33, "category": "閱讀測驗", "passage": "過去科學家認為鐘乳石紋一年長一層，如某些地區雨水夏多冬少，影響石洞滴下的水量，水多時碳酸鈣含量高、長出石層厚，含量少則薄，一層紋為一冬夏輪替，類似樹輪。可是台大地質學系教授用「鈾釷定年法」，藉由放射性物質衰變來判定時間間隔的方法發現，某些年鐘乳石「多輪」，一年長多圈紋路，有時又「少輪」，幾年才長一圈紋，和季節循環無關，並非規律的一年一圈。少輪可能因當時為乾季、石洞中沒水，多輪則代表氣候變化劇烈，乾濕度不定。", "src": "聯合報〈台大教授：鐘乳石紋非一年一層〉(節錄)", "stem": "由上文所述，可見由鐘乳石紋：", "options": ["可判斷其存在的時間", "可了解其地質的內涵", "可觀察氣候變化狀態", "可確切掌握氣候乾濕度", "可推測當地空氣清新度"], "answer": 2, "neg": false}, {"year": 105, "num": 34, "category": "閱讀測驗", "passage": "越巫自詭善驅鬼物。人病，立壇場，鳴角振鈴，跳擲叫呼，為胡旋舞，禳之。病幸已，饌酒食，持其貲去，死則諉以他故，終不自信其術之妄。恆誇人曰：「我善治鬼，鬼莫敢我抗。」\n惡少年慍其誕，瞷其夜歸，分五六人棲道旁木上，相去各里所，候巫過，下砂石擊之。巫以為真鬼也，即旋其角，且角且走，心大駭，首岑岑加重，行不知足所在。稍前，駭頗定，木間砂亂下如初。又旋而角，角不能成音，走愈急。復至前，復如初，手慄氣懾，不能角，角墜；振其鈴，既而鈴墜，惟大叫以行。行聞履聲及葉鳴、谷響，亦皆以為鬼，號求救於人，甚哀。\n夜半 , "answer": 3, "neg": false}, {"year": 106, "num": 49, "category": "閱讀測驗", "passage": "牆頭草對風信標說：「人們常常指責我們風吹兩邊倒，其實風來的時候，你們比誰都轉得快，可是人們對你們卻不加非議；這未免太不公平了。」\n「不！」風信標回答說：「辨明風向，是我們的職責。只要略有風聲，立即準確地指明風向，讓人們有所警覺，採取措施，是有好處的。可是你們呢？當微風初起，你們搖搖晃晃，模模糊糊地靜觀局勢，到真正風來的時候即望風而靡。這和指明風向，怎麼能夠混為一談呢？」", "src": "黃瑞雲〈牆頭草和風信標〉", "stem": "從本文可以看出，「牆頭草」最有可能比喻哪一種人？", "options": ["自私自利，依附權勢", "和光同塵，頭角崢嶸", "崇尚自由，追求理想", "逃避現實，畏首畏尾", "驕傲自大，自鳴得意"], "answer": 0, "neg": false}, {"year": 106, "num": 50, "category": "詞語成語", "passage": "（同第49題短文，黃瑞雲〈牆頭草和風信標〉）", "stem": "下列哪一個詞語與「牆頭草」的涵義最不相關？", "options": ["隨波逐流", "隨聲附和", "隨風轉舵", "隨方就圓", "飛蓬隨風"], "answer": 3, "neg": false}, {"year": 107, "num": 1, "category": "詩詞鑑賞", "stem": "「盤飧市遠無兼味，樽酒家貧只舊醅」並未使用「因為」、「所以」，但前後兩句仍各表達出一種因果關係。閱讀下列詩句，其中文義並未具有此關係的選項是：", "options": ["海內存知己，天涯若比鄰", "不才明主棄，多病故人疏", "野曠天低樹，江清月近人", "竹喧歸浣女，蓮動下漁舟", "草枯鷹眼疾，雪盡馬蹄輕"], "answer": 0, "neg": false}, {"year": 107, "num": 2, "category": "國學常識", "stem": "祝賀大學同學診所開業，下列題辭何者不恰當？", "options": ["功侔相業", "祕傳金匱", "業紹陶朱", "扁鵲復生", "方列千金"], "answer": 2, "neg": false}, {"year": 107, "num": 3, "category": "閱讀測驗", "passage": "度支員外郎宋迪工畫，尤善為平遠山水。往歲小窰村陳用之善畫，迪見其畫山水，謂用之曰：「汝畫信工，但少天趣。」用之深伏其言，曰：「常患其不及古人者，正在于此。」迪曰：「此不難耳，汝當先求一敗牆，張絹素訖，倚之敗牆之上，朝夕觀之。觀之既久，隔素見敗牆之上，高平曲折，皆成山水之象。心存目想：高者為山，下者為水；坎者為谷，缺者為澗；顯者為近，晦者為遠。神領意造，恍然見其有人禽草木飛動往來之象，了然在目。則隨意命筆，默以神會，自然境皆天就，不類人為，是謂活筆。」用之自此畫格進。", "src": "宋‧沈括《夢溪筆談‧書畫》", "stem": "有關此文的說明，下列敘述何者正確？", "options": ["學藝需溫故知新，熟能生巧", "學藝當置身自然，方得與浩氣俱，與造物者遊", "學藝有如觀想，再加上人工造作，真積力久則入", "學藝如觀山水之勢，需因時制宜，則自然心領神會", "學藝通過心存目想，心手轉化，由畫家造化之功，達畫藝自然天趣"], "answer": 4, "neg": false}, {"year": 107, "num": 4, "category": "閱讀測驗", "passage": "（同第3題短文，《夢溪筆談‧書畫》）", "stem": "依照上文，宋迪論述了繪畫藝術創作的具體過程，若分為三個階段，依序應為：", "options": ["心中之象—山水之象—筆下之象", "山水之象—心中之象—筆下之象", "眼中之象—手中之象—胸中之象", "山水之象—筆下之象—心中之象", "胸中之象—眼中之象—手中之象"], "answer": 1, "neg": false}, {"year": 107, "num": 5, "category": "閱讀測驗", "passage": "（同第3題短文，《夢溪筆談‧書畫》）", "stem": "根據上文，有關「活筆」的意涵，何者恰當？", "options": ["山水畫不宜近觀，只可遠眺", "特別重視筆墨線條，可奪造化之功", "作品不類人為，隨意命筆，畫境天成", "以絹素倚貼敗牆，獲得心存目想山水之 ": 4, "neg": false}, {"year": 108, "num": 16, "category": "閱讀測驗", "passage": "鴉渴，見巨瓶置於庭心，趨而飲之。水積其半，而瓶口小，不受啄。鴉啣小石填之，石滿而水上溢，乃救其渴。凡物，需之深者，巧始出。", "src": "林紓譯《伊索寓言》", "stem": "故事中這隻口渴的烏鴉，最後用什麼方法喝到水？", "options": ["將巨瓶翻倒", "將巨瓶啄破", "銜石頭打破瓶", "銜小石到瓶中", "等下雨水溢出"], "answer": 3, "neg": false}, {"year": 108, "num": 17, "category": "閱讀測驗", "passage": "（同第16題短文，林紓譯《伊索寓言》）", "stem": "這則寓言的寓意：「需之深者，巧始出」，意思與下列何者最為相近？", "options": ["飢則食，渴則飲", "小不忍，亂大謀", "窮則變，變則通", "雲從龍，風從虎", "半瓶水，響噹噹"], "answer": 2, "neg": false}, {"year": 108, "num": 18, "category": "字詞釋義", "stem": "《中庸》：「君子戒慎乎其所不睹，恐懼乎其所不聞。莫見乎隱，莫顯乎微，故君子慎其獨也。」句中的「慎其獨」意思是：", "options": ["在孤獨時特別害怕", "在家居時備感孤獨", "在獨處時行為謹慎", "在外出時行事獨立", "在團體中個性孤僻"], "answer": 2, "neg": false}, {"year": 108, "num": 19, "category": "字詞釋義", "stem": "《天工開物‧膏物序言》：「天道平分晝夜，而人工繼晷以襄事，豈好勞而惡逸哉？使織女燃薪，書生映雪，所濟成何事也？」句中的「繼晷以襄事」是指：", "options": ["日以繼夜地工作", "只有在白天工作", "只有在夜晚工作", "從早到晚不工作", "織布讀書後工作"], "answer": 0, "neg": false}, {"year": 108, "num": 20, "category": "閱讀測驗", "passage": "猩猩人面能言笑，血以赭罽，色終始不渝。嗜酒喜屐，人以所嗜陳野外而聯絡之，伏伺其旁。猩猩見之，知為餌己，遂斥詈其人姓名，若祖父姓名，又且相戒毋墮奴輩計中，攜儔唾罵而去。去後復顧，因相謂曰：「盍試嘗之！」既而染指知味，則冥然忘夙戒，相與沾濡徑醉，相喜笑，取屐加足。伏發，往往顛連頓仆，掩群無遺。", "src": "姚鎔〈蜀封溪之猩猩〉", "stem": "下列關於本文內容的解說，最適當的是：", "options": ["知為餌己：是指人們把猩猩當成誘餌", "斥詈其人姓名：指猩猩大聲責罵人們", "若祖父姓名：意即如果祖父有姓有名", "盍試嘗之：意指為何要嘗試穿上草屐", "冥然忘夙戒：指人們忘了勸猩猩戒酒"], "answer": 1, "neg": false}, {"year": 108, "num": 21, "category": "閱讀測驗", "passage": "（同第20題短文，姚鎔〈蜀封溪之猩猩〉）", "stem": "下列何者，最適合用來說明故事中猩猩的行為：", "options": ["本性難移，惡習難戒", "暴虎馮河，死而無悔", "驕傲自大，愛慕虛榮", "瞻前顧後，生性狡詐", "性情急躁，喜怒無常"], "answer": 0, "neg": false}, {"year": 108, "num": 22, "category": "閱讀測驗", "passage": "夫不敢議法者，眾庶也；以死守者，有司也；因時變法者，賢主也。是故有天下七十一聖，其法皆不同。非務相反也，時勢異也。故曰：良劍期乎斷，莫期乎鏌鋣；良馬期乎千里，莫期乎驥驁。夫成功名者，此先王之千里也。\n楚人有涉江者，其劍自舟中墜於水，遽契其舟，曰：「是吾劍之所從墜。」舟止，從其所契者入水求之。舟已行矣，而劍不行；求劍若此，不亦惑乎？以故法為其國，與此同。時已徙矣，而法不徙，以此為治，豈不難哉！", "src": "《呂氏春秋‧察今》", "stem": "根據上文，古代聖王的法令都不相同，其原因是：", "options": ["故意標新立異", "為了樹立威嚴", "避免有司死守", "時代局勢不同", "地理環境有別"], "answer": 3, "neg": false}, {"year": 108, "num": 23, "category": "字詞釋義", "passage": "（同第22題短文，《呂氏春秋‧察今》）", "stem": "「其劍自舟中墜於水，遽契其舟」中的「契其舟」，意思是：", "options": ["對船上的乘客聲明", "要求船夫訂立契約", "從船邊鑿洞來觀察", "把劍賣給船上商人", "在船上刻痕做記號"], "answer": 4, "neg": false}, {"year": 108, "num": 24, "category": "閱讀測驗", "passage": "（同第22題短文，《呂氏春秋‧察今》）", "stem": "下列關於本文主旨的敘述，何者最適當？", "options": ["庶民不該議論法令", "法令應當與時俱進", "賢主知道謹守法令", "良劍易得良馬難尋", "涉江乘舟不應攜劍"], "answer": 1, "neg": false}, {"year": 108, "num": 25, "category": "修辭文法", "stem": "〈虯髯客傳〉：「隋煬帝之幸江都也，命司空楊素守西京。素驕貴，又以時亂，天下之權重望崇者，莫我若也。」句中的「莫我若」意思同於：", "options": ["我莫若", "我若莫", "莫若我", "若我莫", "若莫我"], "answer": 2, "neg": false}, {"year": 108, "num": 26, "category": "國學常識", "stem": "李醫師的中醫診所即將開業，如果想贈他匾額，下列選項何者不適合作為匾額上的題辭？", "options": ["德業長昭", "壽人壽世", "肱傳三折", "方列千金", "功侔相業"], "answer": 0, "neg": false}, {"year": 108, "num": 27, "category": "字形", "stem": "下列選項何者沒有錯別字？", "options": ["這次資訊展，廠商無不使出渾身解數吸引顧客，展覽場處處人聲頂沸", "一個負責的政論家，必須對政府的施政提出鍼貶，督促政府不斷改進", "鐵路地下化後，橫跨鐵路兩邊的陸橋已全數拆除，疏解了壅塞的交通", "良醫首重醫德，若能視病如親，痌瘝在報，必能受人衷心感激與敬愛", "數年後故地重遊，雖然景物依舊，但物事人非，真令人不禁廢然長嘆"], "answer": 2, "neg": false}, {"year": 108, "num": 28, "category": "詞語成語", "stem": "下列各選項三個成語皆為負面意義的是：", "options": ["吳下阿蒙／為虎作倀／胡越一家", "蜀犬吠日／楚囚對泣／深文周內", "殺雞取卵／草滿囹圄／竭澤而漁", "完璧歸趙／郢書燕說／杞人憂天", "楚材晉用／倜儻不群／海不揚波"], "answer": 1, "neg": false}, {"year": 108, "num": 29, "category": "字詞釋義", "stem": "「三日入廚下，洗手作羹湯；未諳姑食性，先遣小姑嘗。」句中「未諳姑食性」的「姑」字，意思與下列何者相同？", "options": ["堂分「姑」娘", "婦「姑」勃谿", "「姑」舅作親", "小「姑」獨處", "三「姑」六婆"], "answer": 1, "neg": false}, {"year": 108, "num": 30, "category": "修辭文法", "stem": "司馬光〈訓儉示康〉：「君子寡欲，則不役於物，可以直道而行。」句中「則不役於物」是「就不被外物役使」之意，屬「被動句」。下列「」中的詞句也屬於「被動句」的選項是：", "options": ["鋤耰棘矜，「非銛於鉤戟長鎩也」", "損民以益讎，「內自虛而外樹怨於諸侯」", "「賢者不能學於遠，乃學於近」，故以聖人為師", "晉侯、秦伯圍鄭，「以其無禮於晉」，且貳於楚也", "山川相繆，鬱乎蒼蒼，「此非孟德之困於周郎者乎」"], "answer": 4, "neg": false}, {"year": 108, "num": 31, "category": "閱讀測驗", "stem": "大抵遊說的方法，不外乎動之以情、曉之以理、誘之以利、威之以勢等。下列所引文句，最接近「動之以情」的選項是：", "options": ["既東封鄭，又欲肆其西封，若不闕秦，將焉取之", "若舍鄭以為東道主，行李之往來，共其乏困，君亦無所害", "且君嘗為晉君賜矣，許君焦、瑕，朝濟而夕設版焉！君之所知也", "伏惟聖朝以孝治天下，凡在故老，猶蒙矜育；況臣孤苦，特為尤甚", "非秦者去，為客者逐。然則是所重者在乎色樂珠玉，而所輕者在乎人民也"], "answer": 3, "neg": false}, {"year": 108, "num": 32, "category": "閱讀測驗", "stem": "《荀子•性惡》：「今人之性惡，必將待師法然後正，得禮義然後治。」下列可與上段文字意涵相互印證的是：", "options": ["行衢道者不至，事兩君者不容", "吾嘗終日而思矣，不如須臾之所學也", "施薪若一，火就燥也；平地若一，水就溼也", "無冥冥之志者，無昭昭之明；無惛惛之事者，無赫赫之功", "木直中繩，輮以為輪，其曲中規，雖有槁暴，不復挺者，輮使之然也"], "answer": 4, "neg": false}, {"year": 108, "num": 33, "category": "修辭文法", "stem": "描述一件事物時，轉換其原來性質，化成另一種本質截然不同的事物，加以形容描述的修辭技巧，叫作「轉化」。下列不屬於此類修辭技巧的選項是：", "options": ["鯈魚出遊從容，是魚樂也", "波滔滔兮來迎，魚鄰鄰兮媵予", "風徘徊於桂椒之間，翱翔於激水之上", "世溷濁而莫余知兮，吾方高馳而不顧", "若顛木之有由櫱，天其永我命于茲新邑"], "answer": 4, "neg": false}, {"year": 108, "num": 34, "category": "國學常識", "stem": "下列關於各機關處理公務時，所採用的公文程式類別，何者正確？", "options": ["上級機關對所屬下級機關有所指示時使用「令」", "總統與立法院、監察院公文往復時使用「書函」", "下級機關對上級機關有所請求或報告時使用「呈」", "機關長官對所屬有所指示或交辦時使用「手令或手諭」", "各機關就主管業務或依據法令規定，向公眾或特定之對象宣布周知時使用「報告」"], "answer": 3, "neg": false}, {"year": 108, "num": 35, "category": "詞語成語", "stem": "「五十步笑百步」一語與下列臺灣俗諺，何者意思最相近？", "options": ["龜笑鼈無尾", "食若牛，做若龜", "牛牽到北京也是牛", "細漢偷挽瓠，大漢偷牽牛", "日頭赤焱焱，隨人顧性命"], "answer": 0, "neg": false}, {"year": 108, "num": 36, "category": "閱讀測驗", "stem": "劉熙載《藝概•文概》：「周秦間諸子之文，雖純駁不同，皆有箇自家在內。後世為文者，於彼於此，左顧右盼，以當眾人之意，宜亦諸子所深恥歟！」最符合上文主旨的選項是：", "options": ["抄襲前人作品是可恥的行為", "周秦諸子主張各異，互不相服", "為文應廣納眾說，以求左右逢源", "文章當求表現自我面目，不可一味迎合世俗", "後世為文者多慎選諸子的論述，以印證己見"], "answer": 3, "neg": false}, {"year": 108, "num": 37, "category": "詩詞鑑賞", "stem": "周夢蝶〈角度〉：「戰士說，為了防衛和攻擊／詩人說，為了美／你看，那水牛頭上的雙角／便這般莊嚴而娉婷的誕生了」，下列選項何者最能涵蓋全詩主旨？", "options": ["戰士堅持己見，做事有原則", "詩人認為，萬物靜觀皆自得", "水牛頭上雙角，蘊含自然美", "處世要圓融，應當沒有主見", "多元化社會，人人要有雅量"], "answer": 4, "neg": false}, {"year": 108, "num": 38, "category": "閱讀測驗", "stem": "李白曾在〈代壽山答孟少府移文書〉中說：「事君之道成，榮親之義畢，然後與陶朱留侯，浮五湖，戲滄洲。」從內容推敲，下列選項何者最貼近李白當時的心境或想法？", "options": ["看破紅塵", "憤世嫉俗", "功成身退", "落魄失志", "熱衷功名"], "answer": 2, "neg": false}, {"year": 108, "num": 39, "category": "閱讀測驗", "stem": "「閒中不放過，忙處有受用；靜中不落空，動處有受用；暗中不欺隱，明處有受用。」關於這段話的寓意，下列何者最適切？", "options": ["原其初心，觀其末路", "未雨綢繆，有備無患", "一念之差，失之千里", "事之成敗，必由小生", "動靜合宜，用心體道"], "answer": 1, "neg": false}, {"year": 108, "num": 40, "category": "閱讀測驗", "passage": "生命之美不在目的，而在歷程。為一個崇高的理想全力以赴，原是件神聖的事，但萬不可忽略了生命的內涵包含了別的意義。一個只顧低頭趕路的人，永遠領略不到沿途的風光。", "src": "杏林子〈歷程〉", "stem": "下文寓意，與下列選項何者最貼近？", "options": ["精益求精，更上層樓", "活在當下，品味人生", "君子慎始，不忘初心", "永恆的美才値得追求", "靜海造就不出好水手"], "answer": 1, "neg": false}, {"year": 108, "num": 41, "category": "國學常識", "stem": "如果讓古人根據自己的經驗和主張作一場專題講座，下列各選項的配對組合，最不恰當的是：", "options": ["請老子談「清靜無為，自然樂活」的人生哲學", "請孔子談「名正言順，風行草偃」的政治哲學", "請韓非論「廢除死刑，尊重人權」的思想主張", "請李斯談「觀鼠定志，掌握契機」的人生態度", "請荀子論「學以化性，隆禮終聖」的修身哲學"], "answer": 2, "neg": false}, {"year": 108, "num": 42, "category": "閱讀測驗", "stem": "王國維《人間詞話》云：「尼采謂：『一切文學，余愛以血書者。』後主之詞，真所謂以血書者也。」其中「以血書」的意思為何？", "options": ["融入真實情感", "用筆蘸血書寫", "文思出神入化", "充滿血性氣概", "書中血淚交迸"], "answer": 0, "neg": false}, {"year": 108, "num": 43, "category": "閱讀測驗", "stem": "下列關於孔子思想的詮釋，敘述最適當的是：", "options": ["「好行小慧」：是孔子對仁者的期許", "「德不孤，必有鄰」：勉勵人修養道德", "「道不同，不相為謀」：意謂人各有志，不須勉強對方迎合自己", "「夫子之道，忠恕而已矣」：所謂的「忠」就是推己及人，「恕」就是竭盡心力", "「名不正，則言不順；言不順，則事不成」：意謂為政之道，首先必須講求信用"], "answer": 1, "neg": false}, {"year": 108, "num": 44, "category": "詩詞鑑賞", "stem": "下列詩句所描寫的對象，何者為「柳」？", "options": ["枝枝倚檻照池水，粉薄香殘恨不勝。占得早芳何所利，與他霜雪助威稜", "灞岸晴來送別頻，相偎相倚不勝春。自家飛絮猶無定，爭解垂絲絆路人", "不受塵埃半點侵，竹籬茅舍自甘心。只因誤識林和靖，惹得詩人說到今", "暖氣潛催次第春，梅花已謝杏花新。半開半落閒園裡，何異榮枯世上人", "颯颯西風滿院栽，蕊寒香冷蝶難來。他年我若為青帝，報與桃花一處開"], "answer": 1, "neg": false}, {"year": 108, "num": 45, "category": "詩詞鑑賞", "stem": "蘇軾〈定風波〉：「莫聽穿林打葉聲，何妨吟嘯且徐行。竹杖芒鞋輕勝馬，誰怕？一簑煙雨任平生。料峭春風吹酒醒，微冷，山頭斜照卻相迎。回首向來蕭瑟處，歸去，也無風雨也無晴。」結句「也無風雨也無晴」採用象徵手法來表達作者當下的感悟，下列選項何者最貼近其感悟？", "options": ["人生到處都有溫暖", "了悟人生虛幻如夢", "心境更加孤高自許", "不再有追逐名利之心", "超脫於順逆得失之外"], "answer": 4, "neg": false}, {"year": 108, "num": 46, "category": "詩詞鑑賞", "stem": "或謂「唐詩」和「宋詩」之別在於：唐詩重抒情，擅用以景托情的表現方式；宋詩重哲理，以理趣見長，多寫日常生活，有「散文化」或「口語化」的傾向。若依上述的分別，下列詩句最具有「宋詩」風格的選項是：", "options": ["雲淡風輕近午天，傍花隨柳過前川。時人不識余心樂，將謂偷閒學少年", "寒雨連江夜入吳，平明送客楚山孤。洛陽親友如相問，一片冰心在玉壺", "兩箇黃鸝鳴翠柳，一行白鷺上青天。窗含西嶺千秋雪，門泊東吳萬里船", "走馬西來欲到天，辭家見月兩回圓。今夜不知何處宿，平沙萬里絕人煙", "琵琶起舞換新聲，總是關山舊別情。撩亂邊愁聽不盡，高高秋月照長城"], "answer": 0, "neg": false}, {"year": 108, "num": 47, "category": "閱讀測驗", "passage": "父親去世之後，我替他整理東西，有一件老棉襖，我想扔了，媽媽不肯，她拿去，將它洗乾淨，從裡子上剪下一小塊，縫在她衣服的胸口部位。她做這些事，一句話也沒說；我默默看她做，也一句話沒說，可是那感覺非常好。", "src": "張曉風〈猶在〉", "stem": "依照下文的描述，可看出作者母親對父親的情感是：", "options": ["貌合神離", "濃烈難捨", "輕淡無味", "含蓄深摯", "若有還無"], "answer": 3, "neg": false}, {"year": 108, "num": 48, "category": "閱讀測驗", "passage": "曾子曰：「孝有三：大孝尊親，其次不辱，其下能養。」公明儀問於曾子曰：「夫子可謂孝乎？」曾子曰：「是何言與！是何言與！君子之所謂孝者，先意承志，諭父母於道。參直養者也，安能為孝乎？」\n曾子曰：「身者，親之遺體也。行親之遺體，敢不敬乎？故居處不莊，非孝也；事君不忠，非孝也；蒞官不敬，非孝也；朋友不信，非孝也；戰陳無勇，非孝也。五者不遂，災及乎身，敢不敬乎？故烹熟鮮香，嘗而進之，非孝也，養也。君子之所謂孝者，國人皆稱願焉，曰：『幸哉！有子如此！』所謂孝也。」", "src": "《禮記‧祭義》", "stem": "本文主旨為何？", "options": ["陳說行孝的先後次序", "舉述行孝的具體效果", "闡發大孝的內涵意義", "介紹曾子的孝親方式", "探究必須行孝的原因"], "answer": 2, "neg": false}, {"year": 108, "num": 49, "category": "字詞釋義", "passage": "（同第48題短文，《禮記‧祭義》）", "stem": "「參直養者也，安能為孝乎？」句中「直」字的意思與下列何者相同？", "options": ["為官寫書，受「直」以養老母", "魏之武卒不可以「直」秦之銳士", "恨人間情是何物，「直」教生死相許", "雖千里不敢易也，豈「直」五百里哉", "其為氣也，至大至剛，以「直」養而無害"], "answer": 3, "neg": false}, {"year": 108, "num": 50, "category": "閱讀測驗", "passage": "（同第48題短文，《禮記‧祭義》）", "stem": "由本文可知，曾子認為孝的極致應是：", "options": ["光宗耀祖", "居處莊敬", "先意承志", "慎終追遠", "無忝所生"], "answer": 0, "neg": false}, {"year": 109, "num": 1, "category": "字音", "stem": "下列常見詞語「」內的字，讀音皆正確的選項是：\n甲、長「吁」短歎：ㄒㄩ 乙、樂透彩「券」：ㄐㄩㄢˋ 丙、劍拔「弩」張：ㄋㄨˊ\n丁、浪費公「帑」：ㄊㄤˇ 戊、「正」月初一：ㄓㄥ 己、天衣無「縫」：ㄈㄥˊ", "options": ["甲丙丁", "甲丁戊", "乙丙己", "乙戊己", "丙丁戊"], "answer": 1, "neg": false}, {"year": 109, "num": 2, "category": "字形", "stem": "下列選項，用字完全正確的是：", "options": ["新型冠狀病毒肆謔全球，已逾數萬人死亡，同時重創世界經濟發展", "面對武漢肺炎，與其沮咒病毒，不如勤加洗手，卻實做好個人衛生", "防疫期間，囤積口罩哄抬價格的行為，已觸患傳染病防治法之規定", "能曲突徙薪、超前部署，是台灣防疫工作獲得高度成效的關鍵之一", "刻意隱匿病情、四處散播病毒的人，真是罪無可換，應當處以重刑"], "answer": 3, "neg": false}, {"year": 109, "num": 3, "category": "國學常識", "stem": "下列詞語，可代稱「月亮」的共有幾個？\n金烏、玄兔、姮娥、冰輪、望舒、皓魄、嬋娟、玉蟾", "options": ["三個", "四個", "五個", "六個", "七個"], "answer": 4, "neg": false}, {"year": 109, "num": 4, "category": "字詞釋義", "stem": "陶淵明〈歸去來辭〉：「景翳翳以將入，撫孤松而盤桓。」下列選項中之「景」字，何者與此句「景」字意思相同？", "options": ["朱光馳北陸，浮「景」忽西沉", "懷雜道轉迥，尋異「景」不延", "「景」物紛為異，人情賴此同", "張組眺倒「景」，列筵矚歸潮", "青春易蹉跎，晚「景」看淒涼"], " ns": ["征夫懷遠路，夙駕上危巒。獨掩窮途淚，長歌行路難", "綠江深見底，高浪直翻空。慣是湖邊住，舟輕不畏風", "精衛銜微木，將以填滄海。刑天舞干鏚，猛志固常在", "年高須告老，名遂合退身。少時共嗤誚，晚歲多因循", "馴擾將無懼，翻飛幸不猜。甘從上林裡，飲啄自徘徊"], "answer": 2, "neg": false}, {"year": 109, "num": 26, "category": "國學常識", "stem": "下列關於天人關係的敍述，依序應為哪一位先秦諸子的看法？\n甲、天行有常，不為堯存，不為桀亡。應之以治則吉，應之以亂則凶\n乙、天地不仁，以萬物為芻狗；聖人不仁，以百姓為芻狗\n丙、盡其心者，知其性也。知其性則知天矣。存其心，養其性，所以事天也", "options": ["荀子、楊朱、莊子", "荀子、老子、孟子", "墨子、楊朱、孟子", "墨子、老子、莊子", "墨子、楊朱、莊子"], "answer": 1, "neg": false}, {"year": 109, "num": 27, "category": "字形", "stem": "下列選項，用字完全正確的是：", "options": ["她的談吐風采，及優雅大方的姿態，讓在座的女士都相形見拙", "對手傲慢的態度，讓大家同仇敵慨，立誓用亮眼的業績出一口氣", "他每天吃消夜，油炸甜食都不忌口，想當然耳會有三高的健康警訊", "人應努力成長學習，若是傭傭碌碌，即使活得長久，也只是虛度此生", "同學在課堂上分享的故事，不僅讓大家覺得獲益豐富，也十分奈人尋味"], "answer": 2, "neg": false}, {"year": 109, "num": 28, "category": "國學常識", "stem": "下列關於先秦諸子的發展與影響，敘述正確的是：", "options": ["孔子以「仁」為其學說核心，對夏商周三代都產生了重大影響", "老莊學說主張「自然、無為」，影響力及貢獻極大，與儒家並稱顯學", "墨子主張「兼相愛、交相利」，反對一切戰爭，在立場上與儒家對立", "法家包括商鞅的「術」、申不害的「勢」與慎到的「法」，而由韓非集其大成", "縱橫家在戰國時期，以縱橫捭闔之策遊說諸侯，張儀、鄒衍都是著名的謀士"], "answer": 2, "neg": false}, {"year": 109, "num": 29, "category": "閱讀測驗", "passage": "張岱〈自題小像〉：「功名邪？落空。富貴邪？如夢。忠臣邪？怕痛。鋤頭邪？怕重。著書二十年邪？而僅堪覆甕。之人邪，有用莫用？」", "stem": "有關文中的作家處境，最適當的描述是：", "options": ["晴耕雨讀，安貧樂道", "自我嘲諷，一事無成", "棄文務農，悔不當初", "落魄狼狽，賣文維生", "面對抉擇，茫然無措"], "answer": 1, "neg": false}, {"year": 109, "num": 30, "category": "詞語成語", "passage": "范仲淹〈嚴先生祠堂記〉：「微先生不能成光武之大，微光武豈能遂先生之高哉？而使貪夫廉，懦夫立，是大有功於名教也。」", "stem": "范仲淹形容漢光武帝與嚴光之間的關係，下列詞語最適合用來形容的是：", "options": ["相得益彰", "伯仲之間", "唇亡齒寒", "雙雄競秀", "推心置腹"], "answer": 0, "neg": false}, {"year": 109, "num": 31, "category": "閱讀測驗", "passage": "子曰：「衣敝縕袍，與衣狐貉者立，而不恥者，其由也與！不忮不求，何用不臧？」子路終身誦之。子曰：「是道也，何足以臧？」", "src": "《論語•子罕》", "stem": "根據本文，下列解釋正確的是：", "options": ["「與衣狐貉者立，而不恥者」：子路不齒與穿著狐貉皮襖的人站在一起", "「不忮不求」：孔子提醒子路，不要因自卑反而表現自大", "「何用不臧」：孔子批評子路這種行為是不善的", "「終身誦之」：子路藉由記誦孔子的話，時時糾正自己不當的行為", "「是道也，何足以臧」：孔子認為這是很基本的道理，不值得稱道"], "answer": 4, "neg": false}, {"year": 109, "num": 32, "category": "字詞釋義", "passage": "然必至草堂，而後浣花有專名，則以少陵浣花居在焉耳。\n行三四里為青羊宮，溪時遠時近。竹柏蒼然，隔岸陰森者盡溪，平望如薺。水木清華，神膚洞達。自宮以西，流匯而橋者三，相距各不半里。舁夫云通灌縣，或所云「江從灌口來」是也。\n人家住溪左，則溪蔽不時見，稍斷則復見溪。如是者數處，縛柴編竹，頗有次第。橋盡，一亭樹道左，署曰「緣江路」。過此則武侯祠。祠前跨溪為板橋一，覆以水檻，乃睹「浣花溪」題榜。過橋，一小洲橫斜插水間如梭，溪周之，非橋不通。置亭其上，題曰「百花潭水」。由此亭還度橋，過梵安寺，始為杜工部祠。像頗清古，不必求肖，想當爾爾。", "src": "節錄自鍾惺〈浣花溪記〉", "stem": "下列「」中的字，意思前後相同的是：", "options": ["則「以」少陵浣花居在焉耳╱君子不「以」言舉人，不以人廢言", "隔岸陰森者「盡」溪╱寡人之於國也，「盡」心焉耳矣", "則溪蔽不「時」見╱天不再與，「時」不久留", "一亭「樹」道左╱終身之計，莫如「樹」人", "「乃」睹浣花溪題榜╱問今是何世，「乃」不知有漢，無論魏晉"], "answer": 0, "neg": false}, {"year": 109, "num": 33, "category": "閱讀測驗", "passage": "（同第32題短文，鍾惺〈浣花溪記〉）", "stem": "有關上文的說明，最適當的是：", "options": ["本文是作者溯溪而行所見之景色", "此溪之名稱由來和杜甫的居室有關", "本文主要是採用視覺、聽覺交互描寫", "溪水時見時隱是因為樹木繁茂擋住視線", "作者對杜甫祠堂中的畫像粗劣頗有微詞"], "answer": 1, "neg": false}, {"year": 109, "num": 34, "category": "國學常識", "passage": "（同第32題短文，鍾惺〈浣花溪記〉）", "stem": "下列對聯中歌詠的人物，與文中「武侯祠」所供俸的人物相同的是：", "options": ["一對二表三分鼎╱六出七縱八陣圖", "讀孔子遺書惟愛春秋一部╱存漢家正統豈容吳魏三分", "二帝蒙塵，淚血千秋含激憤╱一生完節，清風萬古仰忠貞", "剛正不阿，留得正氣沖霄漢╱幽愁發憤，鑄成信史照塵寰", "氣備四時，與天地日月鬼神合其德╱教垂萬世，繼堯舜禹湯文武作之師"], "answer": 0, "neg": false}, {"year": 109, "num": 35, "category": "國學常識", "stem": "下列有關祝賀的題辭，搭配正確的是：", "options": ["輸巧婁明╱工廠", "陶朱媲美╱藝廊", "秘傳金匱╱餐廳", "左圖右史╱政界", "高軒蒞止╱法界"], "answer": 0, "neg": false}, {"year": 109, "num": 36, "category": "文意排序", "passage": "下列乃龔鼎孳為北京某劇樓題寫的一副對聯：\n甲、五萬春花如夢裡 乙、看遍翠暖珠香 丙、曾睡崑崙\n丁、大千秋色在眉頭 戊、記得丁歌甲舞 己、重遊瞻部", "stem": "正確的順序應是：", "options": ["甲乙丙丁戊己", "甲戊己丁乙丙", "丁乙己甲戊丙", "丁戊丙甲乙己", "丁乙丙甲戊己"], "answer": 2, "neg": false}, {"year": 109, "num": 37, "category": "修辭文法", "stem": "下列文句，不屬於誇飾法的是：", "options": ["舳艫千里，旌旗蔽空", "西北有高樓，上與白雲齊", "瞋目視項王，頭髮上指，目眥盡裂", "一封朝奏九重天，夕貶潮陽路八千", "貧賤則懾於飢寒，富貴則流於逸樂，遂營目前之務，而遺千載之功"], "answer": 4, "neg": false}, {"year": 109, "num": 38, "category": "閱讀測驗", "passage": "〈武帝求茂材異等詔〉：「蓋有非常之功，必待非常之人。故馬或奔踶而致千里，士或有負俗之累而立功名。夫泛駕之馬，跅弛之士，亦在御之而已。其令州郡察吏民有茂材異等，可爲將相及使絕國者。」", "stem": "下列選項何者與漢武帝所下詔書內容不符？", "options": ["對任內的功業有廣大願景", "對自己的管理方式深具信心", "敢用特立獨行、標新立異的人", "對「才能」的重視遠勝於「德行」", "有才之人仍須歷練，否則恐致亡國"], "answer": 4, "neg": false}, {"year": 109, "num": 39, "category": "詩詞鑑賞", "passage": "王灣〈次北固山下〉：「客路青山下，行舟綠水前。潮平兩岸闊，風正一帆懸。海日生殘夜，江春入舊年。鄉書何處達？歸雁洛陽邊。」", "stem": "詩歌常以洗鍊的文句描寫景物，下列選項何者與本詩所述不符？", "options": ["旅行時在船上所見之景", "當時應該屬於漲潮時分", "以逆風向前來暗喻心境", "夜將盡時太陽冉冉升起", "春天宣告轉眼又過一年"], "answer": 2, "neg": false}, {"year": 109, "num": 40, "category": "閱讀測驗", "passage": "提起我們花橋榮記，那塊招牌是響噹噹的。當然，我是指從前桂林水東門外花橋頭，我們爺爺開的那家米粉店。黃天榮的米粉，桂林城裏，誰人不知？那個不曉？爺爺是靠賣馬肉米粉起家的，兩個小錢一碟，一天總要賣百把碟，晚來一點，還吃不著呢。", "src": "白先勇〈花橋榮記〉", "stem": "有關本文中老闆娘的這段話，下列最適合的描述是：", "options": ["對現今事業有成的志得意滿", "對爺爺祖孫情誼的懷念追憶", "對無法重回過去榮光的感傷", "對往日風光回憶的自信驕傲", "對未能習得祖傳手藝的懊悔"], "answer": 3, "neg": false}, {"year": 109, "num": 41, "category": "文意排序", "passage": "但我總會記得一些什麼吧，崩解的意識像是秋日的□，一會兒盪到我的眼前，還看得不夠真切，再一會又擺回心底的黑暗處。我記得童年老家穀倉的□，轉身，卻發現穀倉裡空無一人。我尋遍所有的角落，直到夜幕低垂，放聲哭了一場。我一遍一遍□當年被遺棄的感覺。", "src": "呂政達〈最慢板〉", "stem": "依據文意，□內最適合填入的詞語是：", "options": ["鞦韆╱大風吹╱回味", "鞦韆╱捉迷藏╱溫習", "鞦韆╱捉迷藏╱回味", "翹翹板╱捉迷藏╱回味", "翹翹板╱大風吹╱溫習"], "answer": 1, "neg": false}, {"year": 109, "num": 42, "category": "文意排序", "passage": "這以後，父親白日裡勞動，\n甲、幾年後，父親在那些上了中學的同學尚未畢業以前\n乙、取得日政下「高小政教員」的文官資格\n丙、通過了檢定考試\n丁、夜夜挑燈苦讀，凌晨始休", "src": "陳映真〈父親〉", "stem": "請依文意選出最適當的排序：", "options": ["甲乙丙丁", "乙丁甲丙", "乙甲丁丙", "丁甲丙乙", "丁乙丙甲"], "answer": 3, "neg": false}, {"year": 109, "num": 43, "category": "閱讀測驗", "passage": "有野趣而不知樂者，樵牧是也；有果蓏而不及嘗者，菜傭牙販是也；有花木而不能享者，達官貴人是也。古之名賢，獨淵明寄興，往往在桑麻松菊、田野籬落之間。東坡好種植，能手接花木。此得之性生，不可得而強也。強之，□授以花史，□艴然擲而去之。□果性近而復好焉，請相與偃曝於林間，諦看花開花落，□與千萬年興亡盛衰之轍何異？雖謂二十一史盡在左編一史中可也。", "src": "陳繼儒〈花史跋〉（注：《花史》，書名，即《花史左編》）", "stem": "上文中的□，依序應為：", "options": ["將、便、若、雖", "便、若、雖、將", "若、將、雖、便", "雖、將、若、便", "雖、若、便、將"], "answer": 3, "neg": false}, {"year": 109, "num": 44, "category": "閱讀測驗", "passage": "（同第43題短文，陳繼儒〈花史跋〉）", "stem": "關於本文主旨，最適當的選項是：", "options": ["勿因利益當前，而忽略了自然之美", "鼓勵效法陶潛與東坡，享受田園之樂", "環境能改變人的氣性，應多與大自然接觸", "讀二十一史不如讀花史，更能明白萬物興變", "擁有與自然契合的靈性，才可品味山林間的野趣"], "answer": 4, "neg": false}, {"year": 109, "num": 45, "category": "國學常識", "stem": "下列成語，非出自先秦諸子的是：", "options": ["齊人之福", "巧言令色", "殺身成仁", "雞鳴狗盜", "為淵驅魚"], "answer": 3, "neg": false}, {"year": 109, "num": 46, "category": "字音", "stem": "下列「」中的字，讀音前後相同的是：", "op er": 1, "neg": true}, {"year": 110, "num": 25, "category": "國學常識", "stem": "下列著名詩句，依作者時代先後排序應是：\n甲、獨坐幽篁裡，彈琴復長嘯。深林人不知，明月來相照。\n乙、羈鳥戀舊林，池魚思故淵。開荒南野際，守拙歸園田。\n丙、風急天高猿嘯哀，渚清沙白鳥飛回。無邊落木蕭蕭下，不盡長江滾滾來。", "options": ["甲乙丙", "甲丙乙", "乙甲丙", "丙乙甲"], "answer": 2, "neg": true}, {"year": 110, "num": 26, "category": "閱讀測驗", "passage": "夫兵形象□，□之行避高而趨下，兵之形避實而擊虛；□因地而制行，兵因敵而制勝。故兵無常勢，□無常形。能＿＿＿＿而取勝者，謂之神。（《孫子兵法》）", "stem": "依據上文，□內的詞應是：", "options": ["氣", "雲", "水", "風"], "answer": 2, "neg": true}, {"year": 110, "num": 27, "category": "閱讀測驗", "passage": "（同第26題短文，《孫子兵法》）", "stem": "依據上文，＿＿＿＿內的取勝之道應是：", "options": ["我虛敵實", "因敵變化", "以逸待勞", "使敵自至"], "answer": 1, "neg": true}, {"year": 110, "num": 28, "category": "閱讀測驗", "passage": "楊朱之友曰季梁。季梁得疾，十日大漸。其子環而泣之，請醫。季梁謂楊朱曰：「吾子不肖如此之甚，汝奚不為我歌以曉之？」楊朱歌曰：「天其弗識，人胡能覺？匪祐自天，弗孽由人。我乎汝乎！其弗知乎！醫乎巫乎！其知之乎？」其子弗曉終謁三醫。一曰矯氏，二曰俞氏，三曰盧氏，診其所疾。矯氏謂季梁曰：「汝寒溫不節，虛實失度，病由飢飽色欲。精慮煩散，非天非鬼，雖漸，可攻也。」季梁曰：「眾醫也，亟屏之！」俞氏曰：「女始則胎氣不足，乳湩有餘。病非一朝一夕之故，其所由來漸矣，弗可已也。」季梁曰：「良醫也，且食之！」盧氏曰：「汝疾不由天，亦不由人，亦不由鬼。稟生受形，既有制之者矣，亦有知之者矣，藥石其如汝何？」季梁曰：「神醫也，重貺遣之！」俄而季梁之疾自瘳。（《列子‧力命》）", "stem": "依據上文，下列敘述最適當的是：", "options": ["楊朱受季梁之託，提示季梁之子尋醫治病的最佳途徑", "關於季梁的主要病因，矯氏認為在後天，俞氏認為在先天", "對於如何醫治季梁，矯氏、俞氏均建議投藥，盧氏則不以為然", "季梁對生命的看法與盧氏契合，故重金延請盧氏繼續為他調養身體"], "answer": 1, "neg": true}, {"year": 110, "num": 29, "category": "閱讀測驗", "passage": "（同第28題短文，《列子‧力命》）", "stem": "下列文句，最符合季梁觀點的是：", "options": ["養生者不足以當大事，惟送死可以當大事", "君子生則敬養，死則敬享，思終身弗辱也", "富以苟，不如貧以譽；生以辱，不如死以榮", "生生死死，非物非我，皆命也，智之所無奈何"], "answer": 3, "neg": true}, {"year": 110, "num": 30, "category": "閱讀測驗", "passage": "孔子東游，見兩小兒辯鬭。問其故，一兒曰：「我以日始出時去人近，而日中時遠也。」一兒以日初出遠，而日中時近也。一兒曰：「日初出大如車蓋，及日中，則如盤盂，此不為遠者小而近者大乎？」一兒曰：「日初出滄滄涼涼，及其日中，如探湯，此不為近者熱而遠者涼乎？」孔子不能決也。兩小兒笑曰：「孰為汝多知乎？」（《列子‧湯問》）", "stem": "下列關於上文結尾的解說，最適當的是（前者為孔子在兩小兒辯鬪後所表露的態度，後者為「兩小兒笑曰」所表露的態度）：", "options": ["深藏若虛，故不說破／自信坦率，機敏直言", "深藏若虛，故不說破／自恃才高，不肯讓步", "疑信參半，不加妄論／自信坦率，機敏直言", "疑信參半，不加妄論／自恃才高，不肯讓步"], "answer": 2, "neg": true}, {"year": 110, "num": 31, "category": "閱讀測驗", "passage": "（同第30題短文，《列子‧湯問》兩小兒辯日）", "stem": "關於上文「故事寫作方式」的①、②兩項推論，最適當的研判是：\n①作者寫這個故事時，對兩小兒辯鬪的問題已確知答案。\n②作者以孔子映襯兩小兒，可見孔子具智者形象。", "options": ["①、②皆正確", "①正確，②錯誤", "①缺乏研判資訊，②正確", "①缺乏研判資訊，②錯誤"], "answer": 2, "neg": true}, {"year": 110, "num": 32, "category": "閱讀測驗", "passage": "抵達時已經夜間十點，市街的攤販亮起燈泡，光暈昏昏，任何事物都顯得親切美好。我向蹲坐在黃槐樹下的老婆婆購買洋蔥煎蛋。老婆婆熟練地操持鍋鏟。反手撿拾散落一地的枯葉，當作盛皿。她隨即讀出我眼裡的□□。她吐口唾沫在枯葉上，抓起抹布使勁擦拭，直到肉眼看不見葉面的塵土，再盛上煎蛋，工整切為小塊。這份心意，我只能滿懷感激。\n事先聯繫過的旅行社位於火車站附近。老闆先是說預定好的車票必須換成另一班次，又說往瓦拉那西的鋪位難拿，要額外付費。我試著講理，試著找出付訖且遠高於實際票價的單據，試著釐清契約和人情，試著講述全球市場的重要性，終於我們找到最有效的溝通模式，就是各自以不合文法的英語對空咆哮。我趁其不意搶過車票，匆匆前往火車站，完全沒想到身處異地可能發生的危險。（林志豪〈異地眾生〉）", "stem": "依據上文，□□內最適合填入的詞語是：", "options": ["憐憫", "疑慮", "失望", "好奇"], "answer": 1, "neg": true}, {"year": 110, "num": 33, "category": "閱讀測驗", "passage": "（同第32題短文，林志豪〈異地眾生〉）", "stem": "依據上文，「我只能滿懷感激」的「心意」是指老婆婆：", "options": ["嘗試回應作者的情緒", "填飽遠途旅客的飢餓", "撿拾落葉以充當器皿", "豐富旅程的新鮮經驗"], "answer": 0, "neg": true}, {"year": 110, "num": 34, "category": "閱讀測驗", "passage": "（同第32題短文，林志豪〈異地眾生〉）", "stem": "依據上文，關於作者和老闆之間發生的事，敘述最適當的是：", "options": ["作者最終未付差額，也成功獲取車票", "購買車票出差錯，老闆嘗試協助解決", "英文無法溝通，造成購票過程的失誤", "雙方藉討價還價，試圖達成票價協議"], "answer": 0, "neg": true}, {"year": 110, "num": 35, "category": "詩詞鑑賞", "passage": "【甲】華清今已冷香肌，別有溫泉沸四時。十里藍田融雪液，幾家丹井吐煙絲。地經秋雨真浮海，人悟春風此浴沂。好景蘭陽吟不盡，了應湯谷沁詩脾。（陳淑均〈蘭陽八景──湯圍溫泉〉）\n【乙】浴罷溫泉百慮空，酒樓茶館芰荷風。晚來山色斜陽暝，人在舞雩歸詠中。（李逢時〈井樓門外洗場〉）", "stem": "關於甲、乙二詩，敘述最適當的是：", "options": ["甲詩敘寫戶外溫泉，乙詩敘寫室內溫泉", "甲詩敘寫溫泉秋景，乙詩敘寫溫泉夜景", "「沸四時」意謂四季泡湯皆宜，「芰荷風」意謂夏季泡湯最佳", "「沁詩脾」意謂有助暢敘幽情，「百慮空」意謂使人忘憂自得"], "answer": 3, "neg": true}, {"year": 110, "num": 36, "category": "詩詞鑑賞", "passage": "（同第35題甲、乙二詩）", "stem": "「華清今已冷香肌」、「人在舞雩歸詠中」均用典故，典故涉及的人物分別是：", "options": ["西施、曾點", "西施、顏淵", "楊貴妃、曾點", "楊貴妃、顏淵"], "answer": 2, "neg": true}, {"year": 110, "num": 37, "category": "閱讀測驗", "passage": "木之有癭，石之有鸜鵒眼，皆病也。然是二物者卒以此見貴於世，非世人之貴病也，病則奇，奇則至，至則傳。天隨生有言，木病而後怪，不怪不能傳其形；文病而後奇，不奇不能駭於俗。吾每與圓熟之人處，則膠舌不能言；與鶩時者處，則唾；與迂癖者，則忘；至於歌謔巧捷之長，無所不處，亦無所不忘。蓋小病則小佳，大病則大佳，而世乃以不如己為予病，果予病乎？亦非吾病憐彼病也，天下之病者少，而不病者多，多者吾不能與為友，將從其少者觀之。（張大復〈病〉）", "stem": "上文呈現的作者審美傾向，最接近於：", "options": ["蒹葭倚玉", "貴古賤今", "目無下塵", "標新取異"], "answer": 3, "neg": true}, {"year": 110, "num": 38, "category": "閱讀測驗", "passage": "（同第37題短文，張大復〈病〉）", "stem": "依據上文，關於作者不願意交的朋友，說明最適當的是：", "options": ["圓熟之人：處世靈活練達的宗教人士", "鶩時者：同步於潮流的跟隨者", "迂癖者：對自己的嗜好夸夸其談的人", "歌謔巧捷之長：長袖善舞的倡優歌妓"], "answer": 1, "neg": true}, {"year": 110, "num": 39, "category": "閱讀測驗", "passage": "（同第37題短文，張大復〈病〉）", "stem": "依據上文，下列關於作者對「病」的抒發，最適當的是：", "options": ["以天下奇石怪木為典範，願意效仿以顯自身獨特", "文人相輕乃自古之必然，毋須將此視為性格缺失", "以自身生命經驗扭轉主流看法，凸顯個性的重要", "奇癖者固可自顯特殊，但何妨稍從眾而更顯不凡"], "answer": 2, "neg": true}, {"year": 110, "num": 40, "category": "閱讀測驗", "passage": "【甲】不寐天將曉，心勞轉似灰。蚊吟頻到耳，鼠鬪競緣臺。戶闇知蟾落，林喧覺雨來。馬嘶朝客過，知是禁門開。（韋莊〈不寐〉）\n【乙】失眠類型：入睡困難型（躺上床超過30分鐘，方能入眠）；續睡困難型（一開始能入睡，但容易中斷，醒後要花30分鐘以上，才能再次入眠）；過早醒來型（一開始能入睡，也不易中斷，但在距天亮尚久時便醒來，且無法再入眠）。失眠程度：短暫失眠（狀況未達一週）；短期失眠（狀況持續一週至一個月）；慢性失眠（狀況持續一個月以上）。\n【丙】衛氣日行於陽，夜行於陰，厥氣客於臟腑，則衛氣行於陽，不得入於陰。行於陽則陽氣盛，陽氣盛則陽蹺滿，不得入於陰則陰氣虛，故目不瞑。衛氣留於陰，不得行於陽。留於陰則陰氣盛，陰氣盛則陰蹺滿，不得行於陽則陽氣虛，故目閉。（《類證治裁‧不寐論治》）", "stem": "依據甲詩，不屬於作者失眠時的視聽感受是：", "options": ["耳邊蚊子低鳴", "目視月光消失", "聽聞馬匹經過", "瞥見宮門開啟"], "answer": 3, "neg": true}, {"year": 110, "num": 41, "category": "閱讀測驗", "passage": "（同第40題甲詩與乙表）", "stem": "下列關於韋莊失眠的①、②兩項推論，若依據甲詩所敘寫的經驗與乙表，最適當的研判是：\n①除了整晚沒閤眼外，失眠類型頗像「過早醒來型」。\n②失眠程度不只是「短期失眠」，極可能為「慢性失眠」。", "options": ["①、②皆明顯錯誤", "①大致合理，②明顯錯誤", "①大致合理，②缺乏研判資訊", "①缺乏研判資訊，②大致合理"], "answer": 2, "neg": true}, {"year": 110, "num": 42, "category": "閱讀測驗", "passage": "（同第40題丙文，《類證治裁‧不寐論治》）", "stem": "若韋莊因夜晚失眠向醫師求診，依據丙文，醫師應會指出主要原因在於「衛氣」：", "options": ["日行於陽", "夜行於陰", "日不行於陽", "夜不行於陰"], "answer": 3, "neg": true}, {"year": 110, "num": 43, "category": "閱讀測驗", "passage": "靳豪，其先本三晉人。唐時有靳恒者，知開封府，居官有能名，民愛之，因家焉。後世有豪者，北宋時居東京之顯仁坊，隱居市藥，每日設漿於肆，以濟行者。宣和間，有二道者，日飲於靳氏，靳氏事之，歲餘不懈，因曰：吾試若耳。若長者，子孫當有厚報。因書數語授之，言訖不見。視其所授，則秘方也，試之小兒，奇驗。高宗南渡，扈蹕至武林，遂世為太醫。數傳至從謙，為御直翰林醫官，賜敕特晉三階，出內府百子圖賜之，命以所居巷為百子圖巷。（《古今圖書集成‧醫部全錄》）", "stem": "依據上文，靳氏開始擔任御醫的時間是：", "options": ["晉代", "唐代", "北宋", "南宋"], "answer": 3, "neg": true}, {"year": 110, "num": 44, "category": "閱讀測驗", "passage": "（同第43題短文，《古今圖書集成‧醫部全錄》靳豪）", "stem": "依據上文，下列關於靳豪的敘述，最適當的是：", "options": ["崇佛道而濟貧困", "開藥坊而成巨富", "遇奇人而得秘方", "通百病而撰醫書"], "answer": 2, "neg": true}, {"year": 110, "num": 45, "category": "閱讀測驗", "passage": "（同第43題短文，《古今圖書集成‧醫部全錄》靳豪）", "stem": "上文述及「百子圖」，主要是為了強調靳氏：", "options": ["具家學淵源", "受皇室榮寵", "常造福鄉里", "獻生男妙法"], "answer": 1, "neg": true}, {"year": 110, "num": 46, "category": "閱讀測驗", "passage": "陳蓮河的診金也是一元四角。但前回的名醫的臉是圓而胖的，他卻長而胖了：這一點頗不同。還有用藥也不同。前回的名醫是一個人還可以辦的，這一回卻是一個人有些辦不妥帖了，因為他一張藥方上，總兼有一種特別的丸散和一種奇特的藥引。蘆根和經霜三年的甘蔗，他就從來沒有用過。最平常的是「蟋蟀一對」，旁註小字道：「要原配，即本在一窠中者。」似乎昆蟲也要貞節，續弦或再醮，連做藥資格也喪失了。但這差使在我並不為難，走進百草園，十對也容易得，將它們用線一縛，活活地擲入沸湯中完事。然而還有「平地木十株」呢，這可誰也不知道是甚麼東西了，問藥店，問鄉下人，問賣草藥的，問老年人，問讀書人，問木匠，都只是搖搖頭，臨末才記起了那遠房的叔祖，愛種一點花木的老人，跑去一問，他果然知道，是生在山中樹下的一種小樹，能結紅子如小珊瑚珠的，普通都稱為「老弗大」。「踏破鐵鞋無覓處，得來全不費功夫。」藥引尋到了，然而還有一種特別的丸藥：敗鼓皮丸。這「敗鼓皮丸」就是用打破的舊鼓皮做成；水腫一名鼓脹，一用打破的鼓皮自然就可以克伏他。清朝的剛毅因為憎恨「洋鬼子」，預備打他們，練了些兵稱作「虎神營」，取虎能食羊、神能伏鬼的意思，也就是這道理。可惜這一種神藥，全城中只有一家出售的，離我家就有五里，但這卻不像平地木那樣，必須暗中摸索了，陳蓮河先生開方之後，就懇切詳細地給我們說明。\n「我有一種丹，」有一回陳蓮河先生說，「點在舌上，我想一定可以見效。因為舌乃心之靈苗……。價錢也並不貴，只要兩塊錢一盒……。」我父親沉思了一會，搖搖頭。\n「我這樣用藥還會不大見效，」有一回陳蓮河先生又說，「我想，可以請人看一看，可有甚麼冤愆……。醫能醫病，不能醫命，對不對？自然這也許是前世的事……。」我的父親沉思了一會，搖搖頭。\n凡國手，都能夠起死回生的，我們走過醫生的門前，常可以看見這樣的匾額。現在是讓步一點了，連醫生自己也說道：「西醫長於外科，中醫長於內科。」但是S城那時不但沒有西醫，並且誰也還沒有想到天下有所謂西醫，因此無論甚麼，都只能由軒轅、岐伯的嫡派門徒包辦。軒轅時候是巫醫不分的，所以直到現在，他的門徒就還見鬼，而且覺得「舌乃心之靈苗」。這就是中國人的「命」，連名醫也無從醫治的。不肯用靈丹點在舌頭上，又想不出「冤愆」來，自然，單吃了一百多天的「敗鼓皮丸」有甚麼用呢？依然打不破水腫，父親終於躺在床上喘氣了。還請一回陳蓮河先生，這回是特拔，大洋十元。他仍舊泰然的開了一張方，但已停止敗鼓皮丸不用，藥引也不很神妙了，所以只消半天，藥就煎好，灌下去，卻從口角上回了出來。從此我便不再和陳蓮河先生周旋，只在街上有時看見他坐在三名轎夫的快轎裡飛一般擡過；聽說他現在還康健，一面行醫，一面還做了中醫甚麼學報，正在和「只長於外科的西醫」奮鬥哩。（魯迅〈父親的病〉）", "stem": "依據上文，關於「陳蓮河」與「前回的名醫」的敘述，最適當的是：", "options": ["陳蓮河既會看診開藥方，也略通命理之學", "前回的名醫用的藥引，尚可不假他人之力蒐羅", "陳蓮河外出看診會帶助手，前回的名醫則沒有助手", "前回的名醫與陳蓮河診金一樣，但醫術不如陳蓮河高明"], "answer": 1, "neg": true}, {"year": 110, "num": 47, "category": "閱讀測驗", "passage": "（同第46題短文，魯迅〈父親的病〉）", "stem": "上文提及「虎神營」的用意是：", "options": ["解釋「敗鼓皮」被取為藥材的荒謬設想", "說明「敗鼓皮丸」具有神奇療效的原理", "指出當時醫界因仇視洋人而更守舊迷信", "凸顯陳蓮河為力抗西醫而使用稀見藥材"], "answer": 0, "neg": true}, {"year": 110, "num": 48, "category": "閱讀測驗", "passage": "（同第46題短文，魯迅〈父親的病〉）", "stem": "關於上文陳蓮河的形象塑造，解說最適當的是：", "options": ["透過在蟋蟀旁批注「要原配，即本在一窠中者」，暗示陳蓮河極講究藥材的真偽", "透過對作者說「我想，可以請人看一看，可有甚麼冤愆」，暗示陳蓮河黔驢技窮", "透過「從此我便不再和陳蓮河先生周旋」，暗示陳蓮河劍走偏鋒，玄奧難以理喻", "透過「一面行醫，一面還做了中醫甚麼學報」的描述，暗示陳蓮河深明中醫肯綮"], "answer": 1, "neg": true}, {"year": 110, "num": 49, "category": "閱讀測驗", "passage": "讀《莊子》者，撮其勝韻、超然名利之外者，代不乏人；而申韓之書，得其信賞必罰者，亦足以強主而尊朝廷，即醇正如諸葛，亦手寫之以進後主，何嘗以意見少駁，遂盡廢之哉？夫六經洙泗之書，粱肉也。世之食粱肉太多者，亦能留滯而成痞，故治者以大黃、蜀豆瀉其積穢，然後脾胃復而無病，九賓之筵、雞豚羊魚相繼而進，至於海錯，若江珧柱之屬，弊吻裂舌，而人思一快朵頤。則謂公之書為消積導滯之書可；謂世間一種珍奇，不可無一不可有二之書亦可。特其出之也太早，故觀者之成心不化，而指摘生焉。（袁中道〈李溫陵傳〉）", "stem": "上文提及《莊子》、申韓之書，主要是為了強調：", "options": ["善讀書者，自能發顯書的精髓", "書中經典，光芒總是歷久彌新", "觀書有道，應選擇合乎性情者", "著書立說，難免囿於當時所見"], "answer": 0, "neg": true}, {"year": 110, "num": 50, "category": "閱讀測驗", "passage": "（同第49題短文，袁中道〈李溫陵傳〉）", "stem": "依據上文，最符合文意的敘述是：", "options": ["李溫陵公之書指責六經洙泗之書食古不化", "六經洙泗之書因李溫陵公註解而義理大明", "世人多視李溫陵公之書為獨一無二之奇珍", "讀六經洙泗之書者可藉李溫陵公之書消滯"], "answer": 3, "neg": true}, {"year": 111, "num": 1, "category": "字音", "stem": "下列各組詞語「」內的字，讀音全部相同的是：", "options": ["穿「窬」之盜／瑕不掩「瑜」／年「逾」古稀", "「毗」鄰而居／「庇」蔭子孫／「蚍」蜉撼樹", "「屹」立不搖／孜孜矻「矻」／銀貨兩「訖」", "水流「湍」急／苟延殘「喘」／「耑」此奉達"], "answer": 0, "neg": true}, {"year": 111, "num": 2, "category": "字形", "stem": "下列詞語，用字全部正確的選項是：甲、趨之若鶩 乙、怦然心動 丙、海市蜄樓 丁、偃苗助長 戊、以偏蓋全 己、口乾舌燥", "options": ["甲乙己", "甲丙丁", "乙丙戊", "丁戊己"], "answer": 0, "neg": true}, {"year": 111, "num": 3, "category": "字形", "stem": "下列文句，用字完全正確的是：", "options": ["學問貴在實用，理論知識和實務經驗兩者應該要相輔相乘，不可偏廢", "迂腐而不知變通，排斥新科技新觀念，會被視為不合時宜的冬哄先生", "一場豪大雨中，村民家當全被土石流掩埋，各各餐風宿露，苦不堪言", "武陵農場賞櫻活動，如火如荼地展開；人群紛至踏來，擠得水洩不通"], "answer": 2, "neg": true}, {"year": 111, "num": 4, "category": "文意排序", "passage": "古代的□□／現代的車站／都和離別同一家族／都在□□裡。我緩緩地揮手／你急急地折柳／此後相思便堅持要跟你□□而去／而傾盆大雨吵著欲陪我走完這一生。", "stem": "下列新詩中的□□，依次最適合分別填入：", "options": ["陽關／淚水／奔赴", "陽關／風雨／聯袂", "灞橋／淚水／聯袂", "灞橋／風雨／奔赴"], "answer": 2, "neg": true}, {"year": 111, "num": 5, "category": "詞語成語", "stem": "下列各組詞語，意思最不相近的是：", "options": ["室如懸磬／食前方丈", "喧賓奪主／太阿倒持", "披荊斬棘／篳路藍縷", "尸祝代庖／越官侵職"], "answer": 0, "neg": true}, {"year": 111, "num": 6, "category": "閱讀測驗", "stem": "下列四人自訂的座右銘，根據內容推測各人志向，何者最有可能錯誤？\n甲、但願蒼 歸隱的意願"], "answer": 2, "neg": true}, {"year": 111, "num": 15, "category": "國學常識", "passage": "唐宣宗李忱詩：「綴玉聯珠六十年，誰教冥路作詩仙。浮雲不繫名□□，造化無為字□□。童子解吟長恨曲，胡兒能唱琵琶篇。文章已滿行人耳，一度思卿一愴然。」", "stem": "詩中□□分別是詩人的名與字。請問唐宣宗的詩中所稱的詩仙是：", "options": ["李白", "杜甫", "白居易", "李商隱"], "answer": 2, "neg": true}, {"year": 111, "num": 16, "category": "閱讀測驗", "passage": "臣聞：求木之長者，必固其根本；欲流之遠者，必浚其泉源；思國之安者，必積其德義。源不深而望流之遠，根不固而求木之長，德不厚而思國之安，臣雖下愚，知其不可，而況於明哲乎？人君當神器之重，居域中之大，將崇極天之峻，永保無疆之休。不念居安思危，戒奢以儉，德不處其厚，情不勝其欲，斯亦伐根以求木茂，塞源而欲流長也。（魏徵〈諫太宗十思疏〉）", "stem": "這段文字的主旨是：", "options": ["國君應注重農田水利，用心於厚植國家實力", "國君肩負重任應厚積德義，以永保社稷安存", "國君能使百姓安康富足，才能永保無疆之休", "國君如果不知節制情欲，終必導致國家覆亡"], "answer": 1, "neg": true}, {"year": 111, "num": 17, "category": "閱讀測驗", "passage": "研究指出：人格特質從幼年到老年基本上一樣，關鍵期出現在小學一年級……分析發現：年輕時愛說話的人，常表現出熱愛知識、說話流暢、試圖掌控局面，和展現成人般的較高智慧。而語言不流暢的兒童，則愛找人諮商，面對困難會放棄努力，處理人際關係能力欠佳。適應力較強的兒童，中年時會感到生活愉悅、說話流暢和熱愛知識……易於衝動的兒童，成人後常會大聲說話、興趣廣泛和高談闊論；而相反的兒童，成人後則可能會膽小害怕、與人保持距離、且缺乏安全感。(改寫自聯合報)", "stem": "根據上文，下列敘述正確的是：", "options": ["說話不流暢的兒童，長大後面對挫折的耐受力較佳", "適應力較強的兒童，長大後說話流暢喜愛找人諮商", "容易衝動的兒童，成人後缺乏與人溝通協調的能力", "不輕易衝動的兒童，長大後較膽小不願主動接觸人"], "answer": 3, "neg": true}, {"year": 111, "num": 18, "category": "閱讀測驗", "passage": "（同第17題短文，人格特質研究一文）", "stem": "本文旨在說明：", "options": ["性格會隨年齡而變化", "老師的評語影響性格", "性格深受環境的影響", "人的性格可由小見大"], "answer": 3, "neg": true}, {"year": 111, "num": 19, "category": "閱讀測驗", "passage": "吉祥圖案，顧名思義是表現出吉祥美好主題內容的圖案裝飾紋樣……早在遙遠的新石器時期，我們的祖先……在彩陶上就出現了植物魚鳥等形象……商周青銅器上的龍鳳紋樣……唐宋以後，由於城市的繁榮……繪畫及工藝裝飾上湧現出眾多的吉祥題材……特別是明清以來吉祥圖案大量出現於民間生活之中，無論在婚嫁壽辰慶典的布置上，在日常的建築裝飾、服裝鞋帽花樣、食品製造、陶木家具圖案方面都被廣泛使用，特別在木版年畫及民間剪紙中更為豐富集中而蔚為大觀。(節錄自李晉宏《中國藝術圖案》)", "stem": "根據上文，下列敘述正確的是：", "options": ["吉祥圖案早在史前時代便已經出現", "商周時期多魚鳥圖案以祈加官晉爵", "高官及富商較民眾更喜愛吉祥圖案", "唐宋時期吉祥圖案大量湧現在民間"], "answer": 0, "neg": true}, {"year": 111, "num": 20, "category": "閱讀測驗", "passage": "（同第19題短文，李晉宏《中國藝術圖案》）", "stem": "根據上文，吉祥圖案並未出現在：", "options": ["彩色陶器上", "文學書籍中", "食品造型上", "剪紙藝術中"], "answer": 1, "neg": true}, {"year": 111, "num": 21, "category": "閱讀測驗", "passage": "虎之力，於人不啻倍也。虎利其爪牙，而人無之，又倍其力也。則人之食於虎也，無怪矣。 : 111, "num": 29, "category": "字詞釋義", "stem": "與「不足掛齒」的「不足」，意思相同的選項是：", "options": ["斷長續短，損有餘，益「不足」", "公與吾同心，天下「不足」平也", "章邯已破項梁軍，則以為楚地兵「不足」憂", "愚「不足」與謀智，坎井之蛙，不可與語東海之樂"], "answer": 2, "neg": true}, {"year": 111, "num": 30, "category": "詩詞鑑賞", "passage": "天朗氣清日亭午，閒吟散食步廊廡。耳根彷彿隱雷鳴，又似波濤風激怒。濤聲乍過心猶疑，忽詫棟樑能動移。頃刻釜甑欲破裂，霎時身體若籠篩。（林占梅）", "stem": "這首詩是在描寫：", "options": ["地震", "颱風", "海嘯", "雷雨"], "answer": 0, "neg": true}, {"year": 111, "num": 31, "category": "國學常識", "stem": "子曰：「志於□，據於□，依於□，游於□。」（《論語》）以上□，依次最適合分別填入：", "options": ["道／德／仁／藝", "道／德／藝／仁", "德／道／仁／藝", "德／道／藝／仁"], "answer": 0, "neg": true}, {"year": 111, "num": 32, "category": "詞語成語", "stem": "下列臺灣俗諺，意思最貼近「距成事還很遙遠」的是：", "options": ["一丈差九尺", "甘蔗無雙頭甜", "相命無褒，食水都無", "上山看山勢，入門看人意"], "answer": 0, "neg": true}, {"year": 111, "num": 33, "category": "國學常識", "stem": "以下哪個選項是道家的主張？", "options": ["孩提之童，無不知愛其親者；及其長也，無不知敬其兄也", "智慧出，有大偽；六親不和，有孝慈；國家昏亂，有忠臣", "父母之愛不足以教子，必待州部之嚴刑者，民固驕於愛、聽於威矣", "諸侯各愛其國，不愛異國，故攻異國以利其國，天下之亂物具此而已"], "answer": 1, "neg": true}, {"year": 111, "num": 34, "category": "國學常識", "stem": "關於公文與書信的常識，下列敘述正確的是：", "options": ["「敬啟」是用於信封的啟封詞", "「家慈」在書信中用以尊稱別人的母親", "上行函，期望語通常用「請鑒核」、「請核備」", "公文函中的「主旨」、「說明」、「辦法」三者缺一不可"], "answer": 2, "neg": true}, {"year": 111, "num": 35, "category": "文意排序", "passage": "人類的言語都是相對、充滿變化的，\n甲、它是絕對的究竟真實\n乙、因此，永恆的「道」是不可說的\n丙、因為它不是人能用言語表達的相對之物\n丁、如果某樣東西永恆不變，人根本不可能認識\n不可說，甚至不可思議，但是非存在不可。（《傅佩榮細說老子》）", "stem": "依據文意，上列文句的正確排序應是：", "options": ["甲乙丁丙", "乙甲丁丙", "丙丁乙甲", "丁乙丙甲"], "answer": 3, "neg": true}, {"year": 111, "num": 36, "category": "閱讀測驗", "passage": "三藏正往前行，忽見一座高山，峰插碧空，真個是摩星礙日。長老心中害怕，叫悟空道：「你看前面這山十分高峭，但不知有路通行否？」行者笑道：「師父說那裡話，自古道：『___________』，豈無通達之理？可放心前去。」（改寫自《西遊記》）", "stem": "上文___________內，最適合填入的文句是：", "options": ["山中人自正，路險心亦平", "青山遮不住，畢竟東流去", "山高自有客行路，水深自有渡船人", "不識廬山真面目，只緣身在此山中"], "answer": 2, "neg": true}, {"year": 111, "num": 37, "category": "閱讀測驗", "passage": "既為草，可為食可為藥，是蟲友亦是大地溫床。我生長的年代在里巷常民眼裡，隨手抓把雞屎藤紅糖熬汁，可驅風寒療治感冒。「上山採蘼蕪」是生活，蘼弱繁蕪的草是有故事的。當今，經營園藝的園主，面對非園藝物種一律斬草除根殺無赦……雖說拈花不離惹草，同樣是植物，怎如是天壤之差。（凌拂〈草鳴呦呦〉）", "stem": "依據上文，敘述最適當的是：", "options": ["草就是藥，兩者無法區分", "文學書寫，可使草有故事", "園藝主人，都是愛草之人", "拈花與惹草，本難以兩全"], "answer": 1, "neg": true}, {"year": 111, "num": 38, "category": "閱讀測驗", "passage": "光是說一隻蒼蠅吧，一隻僅令人聯想到不潔、污穢的醜陋生物，在莒哈絲和佩索亞眼中，蒼蠅讓他們窺見了身與生的奧義：莒哈絲曾目睹一隻蒼蠅如何從掙扎步入死亡……這場沒人留意的死亡過程，莒哈絲屏息凝視，進而思索蒼蠅之死不若犬馬之亡，既不引人悲憫，亦無人記憶。佩索亞則從一隻停在墨水瓶上的綠頭大蒼蠅，揣想在上帝和魔鬼眼中，自己恐怕也不過是隻閃亮蒼蠅，不知何時會飛來一柄拍扁自身的權杖。（改寫自李欣倫《此身》）", "stem": "依據上文，敘述最適當的是：", "options": ["莒哈絲反思的是，為何自己不曾留意過蒼蠅死亡的過程", "佩索亞想像自己在上帝眼中，可能如蒼蠅般緲小與無常", "兩人均透過目睹蒼蠅死亡，體會到了身體與生命的奧秘", "兩人均認為以不悲不喜的態度面對死亡，才能保有平靜"], "answer": 1, "neg": true}, {"year": 111, "num": 39, "category": "閱讀測驗", "passage": "像所有人一樣：一旦跳進激烈的河流中，除了盡量讓自己浮起來之外，已經沒辦法思考其他的事，只能被冰泠的速度撕裂，或被帶到不知名的地方。", "stem": "依據上文，最符合文中所形容的處境是：", "options": ["天寒地凍，只能快速離去", "水火無情，只能獨善其身", "除去死亡，只能流離他處", "思緒停歇，只能以拖待變"], "answer": 2, "neg": true}, {"year": 111, "num": 40, "category": "詩詞鑑賞", "passage": "甲、解落三秋葉，能開二月花。過江千尺浪，入竹萬竿斜。\n乙、垂緌飲清露，流響出疏桐。居高聲自遠，非是藉秋風。", "stem": "以上兩詩歌詠的對象分別是：", "options": ["風／蟬", "風／燕", "柳／蟬", "柳／燕"], "answer": 0, "neg": true}, {"year": 111, "num": 41, "category": "閱讀測驗", "passage": "良醫能行其針藥，使方術驗者，遇未死之人，得未死之病也。如命窮病困，則雖扁鵲末如之何？夫命窮病困之不可治，猶夫亂民之不可安也。（《論衡》）", "stem": "依據上文，最符合上文意旨的是：", "options": ["人定勝天，操之在我", "生死有時，無法強求", "良醫濟世，義所當為", "諱疾忌醫，終成大害"], "answer": 1, "neg": true}, {"year": 111, "num": 42, "category": "字詞釋義", "passage": "孔子曰：「良藥苦於口而利於病，忠言逆於耳而利於行。湯、武以□□而昌，桀、紂以□□而亡。君無爭臣，父無爭子，兄無爭弟，士無爭友，無其過者，未之有也。」（《孔子家語》）", "stem": "依據上文，□□應分別填入：", "options": ["咻咻／惶惶", "唯唯／諤諤", "惶惶／咻咻", "諤諤／唯唯"], "answer": 3, "neg": true}, {"year": 111, "num": 43, "category": "閱讀測驗", "passage": "（同第42題短文，《孔子家語》）", "stem": "依據上文，孔子主要強調的是：", "options": ["上醫醫國，中醫醫人", "見利思義，讓而不爭", "居安思危，有備無患", "諮諏善道，察納雅言"], "answer": 3, "neg": true}, {"year": 111, "num": 44, "category": "國學常識", "passage": "若必廉士而後可用，則齊桓其何以霸世！今天下得無有被褐懷玉而釣於渭濱者乎？又得無有盜嫂受金而未遇無知者乎？二三子其佐我明揚仄陋，唯□是舉，吾得而用之。（曹操〈求賢令〉）", "stem": "上文中分別暗用三位古人作為典故，依文章次序應是：", "options": ["姜尚／管仲／張良", "姜尚／管仲／陳平", "管仲／姜尚／張良", "管仲／姜尚／陳平"], "answer": 3, "neg": true}, {"year": 111, "num": 45, "category": "閱讀測驗", "passage": "（同第44題短文，曹操〈求賢令〉）", "stem": "依據上文，推測曹操所謂「唯□是舉」，□應是：", "options": ["才", "孝", "德", "廉"], "answer": 0, "neg": true}, {"year": 111, "num": 46, "category": "字詞釋義", "passage": "鄭國名醫，姓秦名緩，字越人，寓於齊之盧村，因號盧醫。少時開邸舍，有長桑君來寓，秦緩知其異人，厚待之，不責其直。長桑君感之，授以神藥，以上池水服之，眼目如鏡，暗中能見鬼物，雖人在隔牆，亦能見之，以此視人病症，五臟六腑，無不洞燭，特以診脈為名耳。古時有個扁鵲，與軒轅黃帝同時，精於醫藥。人見盧醫手段高強，遂比之古人，亦號為扁鵲。（《東周列國志》）", "stem": "下列哪個選項中的「以」字，與「以此視人病症」的「以」，意思相同？", "options": ["墨漿「以」大器貯，備濡染也", "治世之音安「以」樂，其政和", "古人思炳燭夜遊，良有「以」也", "張父大悅，「以」富媳必多粧奩，可增歲入"], "answer": 0, "neg": true}, {"year": 111, "num": 47, "category": "閱讀測驗", "passage": "（同第46題短文，《東周列國志》長桑君授藥一段）", "stem": "依據上文，敘述正確的是：", "options": ["長桑君長居於盧村，故外界稱其為盧醫", "長桑君能見人五臟，其醫術與扁鵲相似", "秦緩醫術高明，實因其手段承襲自黃帝", "秦緩之所以能成為醫生，是因服過神藥"], "answer": 3, "neg": true}, {"year": 111, "num": 48, "category": "閱讀測驗", "passage": "（同第46題短文，《東周列國志》長桑君授藥一段）", "stem": "依據上文，最符合文意的敘述是：", "options": ["人會生病是因為鬼物作崇", "若能醫於未病之時則更佳", "長桑君雖擅醫術卻不正直", "秦緩其實並不善長於診脈"], "answer": 3, "neg": true}, {"year": 111, "num": 49, "category": "閱讀測驗", "passage": "許裔宗名醫若神，人謂之曰：「何不著書，以貽將來？」裔宗曰：「醫乃意也，在人思慮。又脈候幽玄，甚難別。意之所解，口莫能宣。古之名手，唯是別脈。脈既精別，然後識病。病之於藥，有正相當者，唯須用一味，直攻彼病，即立可愈。今不能別脈，莫識病原，以情億度，多安藥味……以此療病，不亦疎乎！脈之深趣，既不可言，故不能著述。」（《太平廣記》）", "stem": "依據上文，何者不是許裔宗認為一般醫生的缺點：", "options": ["只能空談藥學理論", "辨別脈候不夠精準", "未能真正識得病因", "用多種藥以求偶中"], "answer": 0, "neg": true}, {"year": 111, "num": 50, "category": "閱讀測驗", "passage": "（同第49題短文，《太平廣記》許裔宗一文）", "stem": "依據上文，許裔宗不願著書的原因是：", "options": ["醫道甚難，自認尚未完全精通", "雖掌握別脈之訣，但難以落筆", "過往思慮太甚，以致心力交瘁", "謙虛自持，不願意被虛名所擾"], "answer": 1, "neg": true}, {"year": 112, "num": 1, "category": "詞語成語", "stem": "下列選項中的詞語，皆可用來表示「富裕顯達」的是：", "options": ["肥馬輕裘、鮮車怒馬", "金玉滿堂、咳唾成珠", "錦心繡口、錦衣玉食", "室如懸磬、千金市骨"], "answer": 0, "neg": true}, {"year": 112, "num": 2, "category": "字形", "stem": "下列文句，用字完全正確的是：", "options": ["夏蟬是最聒躁的族群，愛在午後此起彼落地長嘶", "經過大家的集思廣意，終於共同擬定了班級公約", "村上春樹的小說膾炙人口，風靡盛況仍歷久不衰", "這棟大樓不論外觀或內部裝潢，都十分美輪美煥"], "answer": 2, "neg": true}, {"year": 112, "num": 3, "category": "字詞釋義", "stem": "下列各組「」中字義最相近的選項是：", "options": ["食無求飽，「居」無求安／「居」物致富，與湯分之", "作一詩，「將」來吾看／「將」在外，軍令有所不受", "兔「走」觸株，折頸而死／行「走」江湖，怡然自得", "群「季」俊秀，皆為惠連／伯歌「季」舞，讌樂以喜"], "answer": 3, "neg": true}, {"year": 112, "num": 4, "category": "字詞釋義", "passage": "鄉村風景秀麗，民風淳厚，宛如世外桃源。放眼望去，青山綠水，□□其間，彷彿置身圖畫中。□□傾聽，那仙樂般的鳥叫蟲鳴，馬上為你滌去市聲的喧囂和□□的煩憂，令人有羽化登仙的□□。", "stem": "句中□□內的文字，依序最合適填入的是：", "options": ["徜徉／側耳／塵世／快感", "惶惶／專注／城市／境界", "徘徊／專心／寧神／趣味", "躊躇／掩耳／人事／感觸"], "answer": 0, "neg": true}, {"year": 112, "num": 5, "category": "詞語成語", "stem": "下列文句「」中的成語，使用正確的是：", "options": ["世界棒球經典賽上，兩隊「分庭抗禮」，勝負已見分曉", "自古以來字體多所轉變，「三豕涉河」之誤，屢見不鮮", "全球國際形勢「一日三秋」，經濟成長率往往出人意表", "為博得面試官的青睞，他特別「被髮纓冠」地打扮一番"], "answer": 1, "neg": true}, {"year": 112, "num": 6, "category": "國學常識", "stem": "下列對聯，最適合用來張貼在中醫藥店的是：", "options": ["深明佐使君臣禮，遠萃東西南北財", "日月光華常復旦，神仙眷屬總長生", "冬至乾坤添沴氣，春回大地復生機", "金屋暖風迎子燕，華堂春日詠倉庚"], "answer": 0, "neg": true}, {"year": 112, "num": 7, "category": "閱讀測驗", "stem": "「有時候我們很想力求上進，但卻忽略了鬆開那條代表著我們所有毛病和缺點的繩子。」上文指出了人們容易具有的缺點，下列最接近其所指的是：", "options": ["積非成是", "闇於自見", "得過且過", "師心自用"], "answer": 1, "neg": true}, {"year": 112, "num": 8, "category": "國學常識", "stem": "儒家與道家由於思想上的不同，對「水」的體悟亦有所不同，下列敘述出自道家的是：", "options": ["天下莫柔弱於水，而攻堅強者莫之能勝", "知者樂水，仁者樂山；知者動，仁者靜；知者樂，仁者壽", "民之於仁也，甚於水火。水火，吾見蹈而死者矣，未見蹈仁而死者也", "飯疏食飲水，曲肱而枕之，樂亦在其中矣。不義而富且貴，於我如浮雲"], "answer": 0, "neg": true}, {"year": 112, "num": 9, "category": "閱讀測驗", "passage": "子貢曰：「紂之不善，不如是之甚也。是以君子惡居下流，天下之惡皆歸焉。」", "stem": "依據上文，子貢認為眾人對紂王為惡的評論最吻合的是：", "options": ["恰如其分", "惡意中傷", "言過其實", "深中肎綮"], "answer": 2, "neg": true}, {"year": 112, "num": 10, "category": "閱讀測驗", "passage": "溫水煮青蛙效應，是十九世紀末康乃爾大學的學生，使用青蛙做了一個實驗，而提出的一個人生理論……第一組學生將青蛙直接丟入滾水裡，青蛙會在接觸水面時立刻躍起生還；另外一組對照組則是將青蛙放在冷水裡，用小火慢慢加熱，起初青蛙在水中怡然自得地游來游去，當水溫加熱到一定程度，青蛙意識到危險時，卻全身無力，欲躍無力，最終死於鍋底。", "stem": "這個實驗主要提示了我們應該要：", "options": ["面對災害，從容應對", "順應環境，隨緣自在", "謹小慎微，自立自強", "洞察機先，居安思危"], "answer": 3, "neg": true}, {"year": 112, "num": 11, "category": "國學常識", "passage": "劉勰《文心雕龍•宗經》言及五經的內容和性質：「夫（1）惟談天，入神致用……（2）實記言，而訓詁茫昧，通乎爾雅，則文意曉然。（3）主言志，詁訓同書……（4）以立體，據事制範……（5）辨理，一字見義……」", "stem": 書與生命書寫〉）", "stem": "依據上文，作者之所以在二手書店有所懷想，最可能是因為：", "options": ["現代人不喜歡閱讀書籍", "自己寫作功力不如前輩", "出版書籍過程十分艱辛", "書籍代表了過往的印記"], "answer": 3, "neg": true}, {"year": 112, "num": 27, "category": "閱讀測驗", "passage": "班超……為人有大志，不修細節。然內孝謹，居家常執勤苦，不恥勞辱。有口辯，而涉獵書傳……家貧，常為官傭書以供養，久勞苦，嘗輟業投筆，嘆曰：「大丈夫無他志略，猶當效傅介子、張騫立功異域，以取封侯，安能久事筆研間乎？」左右皆笑之。超曰：「小子安知壯士志哉！」其後行詣相者，曰：「祭酒，布衣諸生耳，而當封侯萬里之外。」……相者指曰：「生燕頷虎頸，飛而食肉，此萬里侯相也。」（《後漢書．班超傳》）", "stem": "根據上文內容推敲，下列對話若發生在古代，其稱謂有誤的是：", "options": ["班母：「外子曾經擔任徐縣縣令，是個好父母官」", "班固：「舍弟胸有大志，不拘細節，但奉母至孝」", "班超好友：「班超！聽聞你將遠行是欲前往何方」", "班超：「家兄將前往洛陽赴任，吾與家慈將隨行」"], "answer": 2, "neg": true}, {"year": 112, "num": 28, "category": "詞語成語", "passage": "（同第27題短文，《後漢書．班超傳》）「左右皆笑之」，班超回答：「小子安知壯士志哉！」", "stem": "下列最適合用來形容此情景的是：", "options": ["燕雀豈知鴻鵠之志", "瞠乎其後難望項背", "扶搖直上平步青雲", "見賢思齊力爭上游"], "answer": 0, "neg": true}, {"year": 112, "num": 29, "category": "閱讀測驗", "passage": "（同第27題短文，《後漢書．班超傳》）", "stem": "根據上文，下列選項敘述正確的是：", "options": ["班超口才很好，又喜歡鑽研書籍與傳記", "班超因家中貧窮，曾賣書給官府以維生", "班超嘗拜謁丞相，深受丞相認同與勉勵", "算命先生早預知，班超日後能功成名就"], "answer": 3, "neg": true}, {"year": 112, "num": 30, "category": "國學常識", "stem": "唐代孫思邈在發展其醫學理論與實務時，最不可能參考的是：", "options": ["《莊子》", "《靈樞》", "《本草綱目》", "《傷寒雜病論》"], "answer": 2, "neg": true}, {"year": 112, "num": 31, "category": "字音", "stem": "下列各組詞語「」內的字，前後讀音相同的是：", "options": ["不「忮」不求／「歧」路亡羊", "官「僚」主義／眼花「撩」亂", "「遯」跡山林／「豚」骨拉麵", "「惴」慄不安／苟延殘「喘」"], "answer": 1, "neg": true}, {"year": 112, "num": 32, "category": "字詞釋義", "stem": "下列「故」字的解釋與《論語‧為政》：「溫故而知新，可以為師矣。」中的「故」字，意思相同的是：", "options": ["「故」弄玄虛", "吐「故」納新", "明知「故」犯", "無緣無「故」"], "answer": 1, "neg": true}, {"year": 112, "num": 33, "category": "國學常識", "stem": "將外語翻譯為中文時，譯詞往往有不同的構詞方式，如「拷貝」是純粹的音譯，而「坦克車」則是在音譯詞「坦克」的基礎上，後面再加表示該事物類別的語素「車」。以下與「坦克車」翻譯方式類似的是：", "options": ["巧克力", "歐巴馬", "馬拉松", "踢踏舞"], "answer": 3, "neg": true}, {"year": 112, "num": 34, "category": "國學常識", "stem": "關於下列兩則題辭的用法，說明最適當的是：\n甲、祝賀好友父親八十大壽，可用「福壽全歸」作為頌辭\n乙、祝賀好友開設中醫診所，可用「望隆盧扁」作為賀辭", "options": ["甲、乙皆正確", "甲、乙皆錯誤", "甲正確乙錯誤", "甲錯誤乙正確"], "answer": 3, "neg": true}, {"year": 112, "num": 35, "category": "文意排序", "passage": "有些事是好希望／你能知道的\n（甲）但我不肯說\n（乙）是我親手繫的\n（丙）就像是有些結\n（丁）你從來也不會聽\n／卻只是希望／由你來解（陳繁齊：〈不說〉）", "stem": "依據文意，上列文句正確的排序應是：", "options": ["甲丁丙乙", "乙甲丙丁", "丙乙甲丁", "丁丙乙甲"], "answer": 0, "neg": true}, {"year": 112, "num": 36, "category": "閱讀測驗", "passage": "在《紅樓夢》第十回中，張太醫看了秦可卿的脈息後，對賈蓉說：「看得尊夫人這脈息：左寸沉數，左關沉伏，右寸細而無力，右關虛而無神。其左寸沉數者，乃心氣虛而生火……右寸細而無力者，乃肺經氣分太虛……心氣虛而生火者，應現經期不調，夜間不寐……肺經氣分太虛者，頭目不時眩暈，寅卯間必然自汗，如坐舟中。脾土被肝木克制者，必然不思飲食，精神倦怠，四肢酸軟……」", "stem": "依據上文，張太醫判斷秦可卿「心」與「肺」的狀況，分別是依據：", "options": ["右寸／左寸", "左寸／右寸", "右關／左關", "左關／右關"], "answer": 1, "neg": true}, {"year": 112, "num": 37, "category": "閱讀測驗", "passage": "（同第36題短文，《紅樓夢》張太醫診秦可卿一段）", "stem": "以下何者不是張太醫推論秦可卿具有的病症：", "options": ["手腳無力", "食欲不振", "清晨出汗", "沒有月經"], "answer": 3, "neg": true}, {"year": 112, "num": 38, "category": "閱讀測驗", "passage": "秋末到冬末，一年也只有這段時間才會吃白帶魚……中部人吃白帶魚喜歡刷掉表層的銀脂，甚至流傳銀脂有毒……但如果只說銀脂有毒，那就是痛風了……但春天哪是吃台灣白帶魚的日子。春風一吹，白帶魚孵卵，清明一到，白帶魚腹部寄生蟲叢生。況且，煮白帶魚鍋得用大尾的白帶魚，在台中的市場遍尋一公斤上的台灣白帶魚，好難好難。(改寫自林楷倫：〈濃白或赤紅的帶魚湯〉)", "stem": "文中認為春天不適合吃白帶魚的原因不包括：", "options": ["不易買到大的白帶魚", "正值白帶魚孵卵時節", "魚腹部有較多寄生蟲", "銀脂易引發痛風反應"], "answer": 3, "neg": true}, {"year": 112, "num": 39, "category": "閱讀測驗", "passage": "（同第38題短文，林楷倫〈濃白或赤紅的帶魚湯〉）", "stem": "依據上文，對於白帶魚相關敘述有誤的是：", "options": ["臺灣中部有白帶魚銀脂有毒的傳聞", "舊時以煎白帶魚方式來防止其腐敗", "作者想吃白帶魚鍋是因受韓劇影響", "春天時東南亞會空運白帶魚來台灣"], "answer": 1, "neg": true}, {"year": 112, "num": 40, "category": "閱讀測驗", "passage": "「西洋料理」和「洋食」這兩個詞，日文的漢字和中文一模一樣……西洋料理指的是德國、法國、英國等歐洲國家的飲食……因為西洋料理強調正統，最好能從料理的母國原封不動地將味道、服務和用餐方式都搬到日本來。所以「洋食」不能算是西洋料理的另一種說法，而是在西洋料理的影響下，在日本產生轉變後的西式料理。可樂餅、咖哩飯、日式豬排飯，被稱為「三大洋食」……柳田國男在《明治大正史．世相篇》指出：「洋食從吃法到做法，都是我們自己的東西。」(改寫自胡川安：《和食古早味》)", "stem": "依據上文，對「西洋料理」和「洋食」的敘述有誤的是：", "options": ["兩者從字面意義而言，中文與日文漢字意思相同", "在二十世紀初，西洋料理與洋食的意思並不相同", "判斷是否為正統西洋料理，味道並非是唯一標準", "洋食完全出自於日本，與外國食物根本沒有關係"], "answer": 3, "neg": true}, {"year": 112, "num": 41, "category": "閱讀測驗", "passage": "（同第40題短文，胡川安《和食古早味》）", "stem": "依據上文，最不可能出現在「迎賓館」菜單中的是：", "options": ["德國豬腳", "日式豬排飯", "法國油封鴨", "英國炸魚薯條"], "answer": 1, "neg": true}, {"year": 112, "num": 42, "category": "閱讀測驗", "passage": "甲、酸先入肝，肺絡脾經均可及。黑能走血，腸紅嗽疾久堪醫。因其溫澀之功，虛痢可療汗可斂。\n乙、生於水而性不沾水，故亦能治水也。凡夏月之物，皆能解暑，況葉之輕浮在上，邊有舒散之意哉！\n丙、味純甘，性平，微溫，皮黃肉赤，心脾藥也。專能補養心脾營血。", "stem": "閱讀以上三則文句，推斷其所描述的食物（藥材）依序最可能是：", "options": ["烏梅／龍眼肉／荷葉", "龍眼肉／荷葉／烏梅", "烏梅／荷葉／龍眼肉", "龍眼肉／烏梅／荷葉"], "answer": 2, "neg": true}, {"year": 112, "num": 43, "category": "詩詞鑑賞", "passage": "甲、移舟泊煙渚，日暮客愁新。野曠天低樹，江清月近人。（孟浩然〈宿建德江〉）\n乙、歸山深淺去，須盡丘壑美。莫學武陵人，暫遊桃源裡。（裴迪〈送崔九〉）", "stem": "關於下列二詩，說明最正確的是：", "options": ["兩詩都是因離鄉遠行，故而思念舊友親人", "兩詩中都以白描手法呈現，完全不用典故", "甲詩在寫景狀物的同時，亦營造出孤寂感", "乙詩希望崔九能盡快回到京城，再次相見"], "answer": 2, "neg": true}, {"year": 112, "num": 44, "category": "字詞釋義", "passage": "肝受病，則目不能視；腎受病，則耳不能聽；受病於人所不見，必發於人所共見。故君子欲無得罪於□□，先無得罪於□□。(洪應明：《菜根譚》)", "stem": "依據文意，上文□□依序最適合填入：", "options": ["昭昭／冥冥", "冥冥／昭昭", "碌碌／察察", "察察／碌碌"], "answer": 0, "neg": true}, {"year": 112, "num": 45, "category": "閱讀測驗", "passage": "（同第44題短文，《菜根譚》）", "stem": "依據上文，最切合君子之行的是：", "options": ["己所不欲，勿施於人", "以禮自持，不欺暗室", "見機而作，不須遵常", "與殺不辜，寧失不經"], "answer": 1, "neg": true}, {"year": 112, "num": 46, "category": "閱讀測驗", "passage": "城愈高而沖愈巧，池愈深而梯愈妙，法令明而盜賊多，盟約數而叛亂甚……君臣易位者有矣，父子推刃者有矣，然後忠義制名於危國，孝子收譽於敗家。疾疫起而巫醫貴矣，道德喪而儒墨重矣。", "stem": "對於上文文意，理解最恰當的是：", "options": ["應完備法律條文，以防止犯法之人越來越多", "烹煮小魚，應當使用大火才能保有鮮美味道", "在破敗的家族中，較會激發出人的孝順本心", "在瘟疫流行之際，巫醫的地位與收入也越高"], "answer": 3, "neg": true}, {"year": 112, "num": 47, "category": "閱讀測驗", "passage": "（同第46題短文，城愈高而沖愈巧一段）", "stem": "依據上文推論，作者的主張最接近：", "options": ["儒家", "墨家", "道家", "醫家"], "answer": 2, "neg": true}, {"year": 112, "num": 48, "category": "閱讀測驗", "passage": "孔子曰:「能近取譬，可謂仁之方也已。」夫仁為心性之學，尚不可以無方，況於百家眾藝，可以無方而能善此乎？諸藝之中，醫為尤重……凡病必有症；症者，證也……證必有脈，脈者，臟腑經絡、寒熱虛實所由分也……察脈辨證而方立焉……然而執方醫病，而病不能瘳，甚或反以殺人者，又何以說焉？則以脈候未辨，藥性未明，惑於似而反失其真，知有方而不知方之解故也。(汪昂：《醫方集解‧序》)", "stem": "「能近取譬，可謂仁之方也已。」最恰當的理解是：", "options": ["能夠就近取用藥材，才是好醫生開藥的原則", "能從治療自己開始，才是好醫生行醫的原則", "能從自身去了解別人，可以說是行仁的方法", "以他人失敗作為警譬，可以說是成仁的方法"], "answer": 2, "neg": true}, {"year": 112, "num": 49, "category": "閱讀測驗", "passage": "（同第48題短文，汪昂《醫方集解‧序》）", 汩／一輪／斜掛／炎涼", "盈盈／一輪／高掛／炎涼"], "answer": 1, "neg": true}, {"year": 113, "num": 9, "category": "修辭文法", "stem": "下列選項各句，何者未使用譬喻修辭法？", "options": ["暗戀像炸彈，隨時會爆炸", "人生宛如走馬燈，時時轉不停", "愛情是搖晃的船，在向你靠岸", "我的憤怒中有燧人氏，淚中有大禹"], "answer": 3, "neg": true}, {"year": 113, "num": 10, "category": "詩詞鑑賞", "stem": "下列詩句，就內容所呈現的時辰而言，哪兩者最相近？\n(甲) 曦車日亭午，浮箭未移暉\n(乙) 日夕懷空意，人誰感至精\n(丙) 雲飛星共流，風揚月兼至\n(丁) 晚雲含朔氣，斜照蕩秋光", "options": ["甲丙", "甲丁", "乙丙", "乙丁"], "answer": 3, "neg": true}, {"year": 113, "num": 11, "category": "詩詞鑑賞", "stem": "「一出塞無奈就天高地邈／一把慷慨的琵琶／憑她纖纖的手指／撥撥刮刮／能彈壓幾千里的飛沙？」此詩所吟詠的對象應是古代四大美女中的：", "options": ["西施", "貂蟬", "王昭君", "楊玉環"], "answer": 2, "neg": true}, {"year": 113, "num": 12, "category": "修辭文法", "stem": "律詩的對偶句，其特色是：平仄相反、字數相同、句式一樣、詞性相同。下列選項中，何者符合律詩對偶句的特色？", "options": ["抽刀斷水水更流，舉杯消愁愁更愁", "日暮鄉關何處是，烟波江上使人愁", "兒童相見不相識，笑問客從何處來", "漠漠水田飛白鷺，陰陰夏木囀黃鸝"], "answer": 3, "neg": true}, {"year": 113, "num": 13, "category": "閱讀測驗", "passage": "天真本是這社會極缺乏的品質之一，但一味天真則有變成「無知」的危險。而無知最容易與自私成為結拜兄弟。", "stem": "下列敘述不符合本文意涵的選項是：", "options": ["天真之人比較缺乏知識，而且不明事理", "鼓勵保留心地純真、性情直率的好本質", "做人不可頭腦簡單，以免經常上當被騙", "無知之人經常貪圖個人利益，罔顧他人"], "answer": 0, "neg": true}, {"year": 113, "num": 14, "category": "文意排序", "stem": "依據文意，選出排列順序正確的選項：\n「余讀孔氏書 (甲) 適魯，觀仲尼廟堂車服禮器 (乙) 想見其為人 (丙) 余祗回留之 (丁) 諸生以時習禮其家 不能去云。」", "options": ["甲丙丁乙", "乙甲丁丙", "丙乙甲丁", "丁甲丙乙"], "answer": 1, "neg": true}, {"year": 113, "num": 15, "category": "閱讀測驗", "passage": "我讚楊柳美麗，但其美與牡丹不同，與別的一切花木都不同。楊柳的主要的美點，是其下垂。花木大都是向上發展的，紅杏能長到「出牆」，古木能長到「參天」。向上原是好的，但我往往看見枝葉花果蒸蒸日上，似乎忘記了下面的根，覺得其樣子可惡！你們是靠他養活的，怎麼只管高踞在上面，絕不理睬他呢？(豐子愷〈楊柳〉)", "stem": "依據上文，作者讚楊柳美麗，最主要的原因應是楊柳具有怎樣的美德？", "options": ["飲流懷源", "飲水啜菽", "踏地知根", "老樹盤根"], "answer": 0, "neg": true}, {"year": 113, "num": 16, "category": "閱讀測驗", "passage": "台灣玻璃公司創辦人林玉嘉先生於 2015 年辭世，他生前最自豪的「三不政策」就是--「不做自己不熟悉的事業、不炒股票、不向股東伸手要錢。」他堅持「一人一業」的理念，也不准兒孫做別的產業。(《聯合報》)", "stem": "根據上文，可看出林玉嘉先生的成功祕訣，不包括下列哪一項？", "options": ["能自制", "肯吃苦", "要專注", "不貪心"], "answer": 1, "neg": true}, {"year": 113, "num": 17, "category": "閱讀測驗", "stem": "「與人善言，暖於布帛；傷人之言，深於矛戟。」下列選項，與本文意涵最相近的是：", "options": ["交友貴在真心，若是虛偽造假，遲早被看破", "說話有技巧，話多不如話少，話少不如話好", "善有善報，惡有惡報；不是不報，時候未到", "多懷善意說好話，可以讓世界更加溫馨喜樂"], "answer": 3, "neg": true}, {"year": 113, "num": 18, "category": "國學常識", "stem": "「力拔山兮氣蓋世，時不利兮騅不逝。騅不逝兮可奈何！虞兮虞兮奈若何！」下列選項與本文主角有關的成語是：", "options": ["一鳴驚人", "三顧茅廬", "四面楚歌", "七步成詩"], "answer": 2, "neg": true}, {"year": 113, "num": 19, "category": "詩詞鑑賞", "stem": "古人有「折柳送別」的習俗，故楊柳每每用以代表離愁、離情。下列哪幾句詩中的楊柳，含有「離別愁緒」？\n(甲) 春風知別苦，不遣柳條青\n(乙) 池臺草色遍，宮觀柳條新\n(丙) 交情吾道可，離思柳條新\n(丁) 楊柳散和風，青山澹吾慮", "options": ["甲丙", "乙丁", "甲乙丙", "乙丙丁"], "answer": 0, "neg": true}, {"year": 113, "num": 20, "category": "閱讀測驗", "passage": "如果你要享受寧靜，就不要去做一朵花。免得蜂蝶去騷擾你，頑童去採摘你。當你逐漸凋萎的時候，連你的主人也以厭惡的眼光看你。\n你就安心的做一片平平凡凡的葉子吧！在千萬同儕中，偷偷地抽出嫩芽，悄悄地茁壯，漸漸地獨立，盡你的力量製造營養，滋潤自己，也供應整棵樹的成長，然後在秋天裡，淡淡的染上一抹嫣紅，悠悠地隨風飄落。\n何必去做一朵燦爛的花？哪朵花會有葉子來得耐久呢？\n何必擁有許許多多的花瓣？哪片花瓣有葉子來得結實呢？\n何必去向葉子們炫耀？花朵豈知道，當他凋落後留下的果實，還需要葉子們去滋養。\n如此說來，做一片平凡的葉子，豈非更值得驕傲？（劉墉〈平凡的葉子〉）", "stem": "上文意旨主要在勉勵人：", "options": ["遺世絕俗，獨善其身", "默默奉獻，盡其在我", "櫛風沐雨，勤奮不怠", "安享寧靜，避免紛爭"], "answer": 1, "neg": true}, {"year": 113, "num": 21, "category": "閱讀測驗", "passage": "（承上題〈平凡的葉子〉一文）", "stem": "依據上文，葉子最值得驕傲的地方是：", "options": ["低調樸實，避免蜜蜂蝴蝶無謂的騷擾", "以耐久結實的身軀，抵抗頑童的採摘", "安守本分，悄悄地滋養整棵花樹果實", "在秋天染上一抹嫣紅，瀟灑隨風飄落"], "answer": 2, "neg": true}, {"year": 113, "num": 22, "category": "閱讀測驗", "passage": "昔齊人有欲金者，清旦衣冠而之市，適鬻金者之所，因攫其金而去。吏捕得之。問曰：「人皆在焉，子攫人之金何？」對曰：「取金之時，不見人，徒見金。」(《列子‧說符》)", "stem": "上文是哪一句成語的來源：", "options": ["利令智昏", "心癢難撾", "齊人攫金", "甕中捉鱉"], "answer": 2, "neg": true}, {"year": 113, "num": 23, "category": "閱讀測驗", "passage": "（承上題《列子‧說符》齊人攫金一文）", "stem": "上文主旨，最適合用來勸戒哪一種人？", "options": ["我行我素，目中無人", "上下其手，偷天換日", "勇敢向前，奮不顧身", "利慾薰心，無視法令"], "answer": 3, "neg": true}, {"year": 113, "num": 24, "category": "閱讀測驗", "passage": "宋有澄子者，亡緇衣，求之塗，見婦人衣緇衣，援而弗舍，欲取其衣，曰：「今者我亡緇衣。」婦人曰：「公雖亡緇衣，此實吾所自為也。」澄子曰：「子不如速與我衣：昔吾所亡者紡緇也，今子之衣襌緇也，以襌緇當紡緇，子豈不得哉？」（《呂氏春秋》）", "stem": "依據上文，下列選項敘述不正確的是：", "options": ["澄子在路上尋找丟失的黑色衣服", "澄子誤認婦人所穿緇衣是自己的", "婦人的黑色衣服是她自己縫製的", "由本文可推知紡緇價值高於襌緇"], "answer": 1, "neg": true}, {"year": 113, "num": 25, "category": "閱讀測驗", "passage": "（承上題《呂氏春秋》澄子亡緇衣一文）", "stem": "依據上文內容，最適合用來諷刺那一種人？", "options": ["巧取豪奪", "窮兵黷武", "長袖善舞", "患得患失"], "answer": 0, "neg": true}, {"year": 113, "num": 26, "category": "字音", "stem": "下列各組「」內的字，前後讀音相同的是：", "options": ["邏「輯」／拜「揖」", "手「腕」／歎「惋」", "崩「坍」／「彤」雲", "垂「涎」／「筵」席"], "answer": 1, "neg": true}, {"year": 113, "num": 27, "category": "字形", "stem": "下列文句，用字完全正確的是：", "options": ["大學聯招會剛才宣布，本年度的抱名費不作調整", "他在過去累積了豐富經驗，終成為行業內的專家", "最近的工作壓力讓他倍感煩腦，不知道如何應對", "在這個訊息爆炸的時代，更需要明辯真假的能力"], "answer": 1, "neg": true}, {"year": 113, "num": 28, "category": "詞語成語", "stem": "《紅樓夢》中說賈寶玉因為居住在大觀園中的姐姐迎春出嫁了、林黛玉已死、妙玉失蹤等一連串的變故，因而：「想到《莊子》上的話，虛無縹緲，人生在世，難免□□□□，不禁的大哭起來。」空格中最適合填入的是：", "options": ["光陰荏苒", "風流雲散", "得意忘形", "悲喜交加"], "answer": 1, "neg": true}, {"year": 113, "num": 29, "category": "詞語成語", "stem": "下列文句「」中的詞語，使用正確的是：", "options": ["為了挽救公司，董事長不惜「紆尊降貴」，與大家一起同甘共苦", "家芯在會議上的表現簡直「矯若驚龍」一般，完全沒有展現自信", "嘉俊一再地犯錯，使公司陷入危機，根本是「百折不撓」的結果", "映茹認為這件事應「諱莫如深」，所以努力向大家說明來龍去脈"], "answer": 0, "neg": true}, {"year": 113, "num": 30, "category": "國學常識", "stem": "關於下列兩則題辭的說解，最適當的判斷是：\n(甲)「禹稷精神」是用於慈善事業的題辭，其中「禹稷」指的是大禹與后稷\n(乙)「祕傳金匱」可用於祝賀醫院開業，其中「金匱」是指放針灸之針的盒子", "options": ["甲、乙皆正確", "甲、乙皆錯誤", "甲正確乙錯誤", "甲錯誤乙正確"], "answer": 2, "neg": true}, {"year": 113, "num": 31, "category": "修辭文法", "stem": "「不○不○」的句型至少有兩種意義表述模式，一是屬於承接結構，如「不義不富」，意指「行不義則不富」。另一種則是並列結構，如「不知不覺」，意指「不注意同時也沒覺察」。以下「」中的詞語屬於承接結構的是：", "options": ["他總對錢斤斤計較，是個「不折不扣」的吝嗇鬼", "他為人但求俯仰無愧、「不忮不求」的淡然心境", "他對身旁的事大都「不聞不問」，獨自安靜生活", "他對學生「不憤不啟」，期待他們主動發現問題"], "answer": 3, "neg": true}, {"year": 113, "num": 32, "category": "文意排序", "stem": "依據文意，下列文句正確的排序應是：\n如今這棵桃樹已經是枝葉繁茂，\n(甲) 一陣微風吹來\n(乙) 綠葉映襯著紅花\n(丙) 樹枝透出欄桿在空中搖曳\n(丁) 春天那一朵朵淡粉色的小花掛滿了枝頭\n從樓下看去，就好像一棟房子裡伸出的綠色手掌。", "options": ["甲乙丙丁", "乙丙丁甲", "丙丁甲乙", "丁乙甲丙"], "answer": 3, "neg": true}, {"year": 113, "num": 33, "category": "閱讀測驗", "passage": "「地骨」同時指石頭和枸杞，把石頭算作骨骼是很合理的，兩者一般的嶔崎磊落。喜歡石頭的人都可以把自己看作「摸骨專家」，可以仔細摸一摸大地的支架。可是把枸杞認作地骨不免令人驚奇，想來石頭作地骨取的是「寫實派」手法，枸杞作地骨應是「象徵派」手法。枸杞是一種紅色顆粒的補藥，大概服食後可以讓人有大地一 子，風流天下聞。紅顏棄軒冕，白首臥松雲"], "answer": 2, "neg": true}, {"year": 114, "num": 6, "category": "文意排序", "passage": "沒有人願意終其生平淡，也沒有人願意被人忽視，我們脫離不了欲望的追求，卻也哀嘆生命的早逝。於是，有的人□□□努力，有的人卻茫茫然尋覓；有的人以力行去求證，也有的人只□□□□。其實，生命之價值，不在其久暫，而在其□□；不在其大小，而在其有無。我們常常向遠處空自追求，卻不知一切盡在周遭，有形無形，皆□□□□，就在我們是否吝於去採擷了。", "stem": "依據前文，缺空處依序最適合填入的詞語是：", "options": ["汲汲然／枯坐冥想／盈虛／伸手可掬", "潸潸然／悠然自得／肥瘦／稍縱即逝", "戚戚然／坐以待斃／擁有／貪生怕死", "貿貿然／虛擲光陰／得失／具體而微"], "answer": 0, "neg": true}, {"year": 114, "num": 7, "category": "詞語成語", "stem": "下列文句「」中的成語使用，正確的選項是：", "options": ["老張自退休後「老驥伏櫪」，鎮日含飴弄孫，與世無爭", "在上位者若為圖私利，上下其手，必招致「口碑載道」", "為博得口考官青睞，他今天特別「被髮纓冠」打扮一番", "行文時要謹慎，以免錯用文字，貽人「三豕涉河」之譏"], "answer": 3, "neg": true}, {"year": 114, "num": 8, "category": "修辭文法", "stem": "下列詩句□中的量詞依序應是：（甲）離別幾宵魂耿耿，相思一□髮星星（乙）青絲一□墮雲鬟，金翦刀鳴不忍看（丙）此生飄蕩何時定，一□鴻毛天地中（丁）玉容寂寞淚闌干，梨花一□春帶雨", "options": ["尊、葉、片、枝", "座、葉、片、聲", "尊、綹、縷、聲", "座、綹、縷、枝"], "answer": 3, "neg": true}, {"year": 114, "num": 9, "category": "閱讀測驗", "passage": "往昔之世，有富愚人，痴無所知。到餘富家，見三重樓，高廣嚴麗，軒敞疏朗，心生渴仰，即作是念：「我有財錢，不減於彼，云何頃來而不造作如是之樓？」即喚木匠而問言曰：「解作彼家端正舍不？」木匠答言：「是我所作。」即便語言：「今可為我造樓如彼。」……愚人復言：「我不欲下二重之屋，先可為我作最上屋。」木匠答言：「無有是事。何有不作最下重屋，而得造彼第二之屋？不造第二，云何得造第三重屋？」愚人固言：「我今不用下二重屋，必可為我作最上者。」時人聞已，便生怪笑。", "src": "《百喻經‧三重樓喻》", "stem": "依據本文，下列選項敘述不正確的是：", "options": ["成語「空中樓閣」的典故，即出自於本文", "富愚人雖然有錢，但平庸愚昩，缺乏常識", "工匠技術精良純熟，所造三重樓宏偉壯觀", "富愚人的要求，是任何人都沒辦法完成的"], "answer": 0, "neg": true}, {"year": 114, "num": 10, "category": "閱讀測驗", "passage": "（同第9題短文，《百喻經‧三重樓喻》）", "stem": "本文主旨在說明：", "options": ["富愚人因為自己愚痴，而被木匠譏笑的過程", "人的立足點愈高，愈能看見雄奇瑰麗的景象", "內在的學識涵養，比空有外在財富更為可貴", "凡事都必須從基礎做起，不可妄想一步登天"], "answer": 3, "neg": true}, {"year": 114, "num": 11, "category": "文意排序", "passage": "大學之道，在明明德，在親民，（甲）安而後能慮（乙）定而後能靜（丙）知止而後有定（丁）靜而後能安（戊）在止於至善，慮而後能得。物有本末，事有終始，知所先後則近道矣。", "src": "《大學‧經一章》", "stem": "依據上文文意，排序正確的選項是：", "options": ["乙丁丙甲戊", "丙戊乙丁甲", "丁丙乙甲戊", "戊丙乙丁甲"], "answer": 3, "neg": true}, {"year": 114, "num": 12, "category": "閱讀測驗", "passage": "陶侃任廣州刺史時，嘗出遊，見人持一把未熟稻，侃問：「用此何為？」人云：「行道所見，聊取之耳。」侃大怒曰：「汝既不田，而戲賊人稻！」執而鞭之。是以百姓勤於農殖，家給人足。", "src": "《晉書‧陶侃》", "stem": "依據上文，陶侃大怒的原因，最有可能是他認為持稻之人：", "options": ["折節下士", "暴殄天物", "荒誕不經", "遊手好閒"], "answer": 1, "neg": true}, {"year": 114, "num": 13, "category": "國學常識", "passage": "吾聞竹工云：「竹之為瓦，僅十稔。若重覆之，得二十稔」。噫！吾以至道乙未歲，自翰林出滁上，丙申移廣陵；丁酉又入西掖，戊戌歲除日有齊安之命，己亥閏三月到郡……咸平二年八月十五日記。", "src": "王禹偁〈黃岡竹樓記〉", "stem": "作者於咸平四年逝世，享年四十八歲。依據上文，若以干支紀年，作者逝世之年應是：", "options": ["辛丑", "庚子", "壬寅", "辛卯"], "answer": 0, "neg": true}, {"year": 114, "num": 14, "category": "詩詞鑑賞", "passage": "三十年前／你從柳樹梢頭望我／我正年少／你圓／人也圓\n三十年後／我從椰樹梢頭望你／你是一杯鄉色酒／你滿／鄉愁也滿", "src": "舒蘭〈鄉色酒〉", "stem": "下列選項，最接近本詩情境與意旨的是：", "options": ["思君如滿月，夜夜減清輝", "相逢一尊酒，共結兩鄉愁", "久別湖波綠，相思嶽月圓", "舉頭望明月，低頭思故鄉"], "answer": 3, "neg": true}, {"year": 114, "num": 15, "category": "閱讀測驗", "passage": "李惠任雍州刺史，人有負鹽負薪者，同釋重擔息樹陰。少時，且行，爭一羊皮，各言藉背之物。久未果，遂訟於官。惠遣爭者出，顧州紀綱曰：「以此羊皮可拷知主乎?」群下咸無答者。惠令人置羊皮席上，以杖擊之，見少鹽屑，曰：「得其實矣。」使爭者視之，負薪者乃伏地認罪。", "src": "唐‧李延壽《北史》", "stem": "依據上文，李惠如何判斷羊皮的主人？", "options": ["細致觀察，邏輯推理", "察言觀色，旁敲側擊", "施展神威，讓人伏罪", "嚴刑杖擊，逼供取證"], "answer": 0, "neg": true}, {"year": 114, "num": 16, "category": "詞語成語", "stem": "下列成語含有「求才殷切」意涵的是：（甲）千金市骨（乙）揚葩振藻（丙）虛佐以待（丁）握髮吐哺（戊）和光同塵", "options": ["甲乙丙", "丙丁戊", "甲丙丁", "乙丁戊"], "answer": 2, "neg": true}, {"year": 114, "num": 17, "category": "詞語成語", "stem": "下列選項，各組成語意涵全部屬於正面、讚美的是：", "options": ["沉魚落雁／城狐社鼠", "鸞翔鳳集／如魚得水", "發屋求貍／鶴立雞群", "百鳥朝鳳／封豕長蛇"], "answer": 1, "neg": true}, {"year": 114, "num": 18, "category": "國學常識", "stem": "嚴羽《滄浪詩話》曰：「律詩難於古詩，絕句難於八句；七言律詩難於五言律詩，五言絕句難於七言絕句。」依照上文推斷，嚴羽認為最難創作的近體詩是：", "options": ["五言絕句", "五言律詩", "七言絕句", "七言律詩"], "answer": 0, "neg": true}, {"year": 114, "num": 19, "category": "閱讀測驗", "passage": "臺南有個「秋茂園」，遍植芒果、荔枝，不設關防……任何人的心靈都可能受到外來的傷害，不足為奇，問題是怎樣處理這傷口……成功的人絕不暗傷潛恨，憤世嫉俗，採取摧毀性的報復，恰恰相反，他的遭遇擴大了他的同情心，結果他為這世上增添了美好的事物……我們處理人生的破洞，難道還不及補襪的女郎嗎？", "src": "王鼎鈞《開放的人生‧秋茂園》", "stem": "根據上文，作者認為成功者應具有下列何種精神？", "options": ["感恩圖報", "悲天憫人", "慷慨解囊", "從善如流"], "answer": 1, "neg": true}, {"year": 114, "num": 20, "category": "修辭文法", "passage": "（同第19題短文，王鼎鈞《開放的人生‧秋茂園》）", "stem": "「我們處理人生的破洞，難道還不及補襪的女郎嗎？」文中這句話採用了「激問」修辭技巧，下列選項何者與之相同？", "options": ["籠鳥檻猿俱未死，人間相見是何年", "問余何意棲碧山，笑而不答心自閒", "歲老豈能充上駟，力微當自慎前程", "不知乘月幾人歸，落月搖情滿江樹"], "answer": 2, "neg": true}, {"year": 114, "num": 21, "category": "詞語成語", "passage": "一日，老婆跟我鬧了點彆扭，跑回娘家去了。不久丈人就打來電話，怒火沖天……沒隔幾分鐘，連續有幾條Line發過來……第一條是丈人發的：「小子！剛是故意罵給她們聽的，男人嘛，大度一些，多擔待一點！」……家族中有一懂得調和鼎鼐的長者很重要！", "src": "電子學習報〈可愛的丈人〉", "stem": "根據上文，下列選項何者最適合用來形容丈人的作為？", "options": ["比而不周", "獨當一面", "指桑罵槐", "通權達變"], "answer": 3, "neg": true}, {"year": 114, "num": 22, "category": "閱讀測驗", "passage": "嗜鹽菌，又稱副溶血性弧菌。海水是它的樂園……吃了被嗜鹽菌污染的食品，一般經6〜20小時……患者先是腹痛腹瀉，接著噁心嘔吐；腹痛呈陣發性絞痛……此外，還會出現發熱、脫水、酸中毒、休克、神志不清等中毒症狀……嗜鹽菌還有怕熱、怕酸的致命弱點。", "src": "《A+醫學百科‧嗜鹽菌》", "stem": "根據上文，下列選項何者不是嗜鹽菌食物中毒的症狀？", "options": ["發燒反應", "嚴重腹瀉", "心臟絞痛", "神智不清"], "answer": 2, "neg": true}, {"year": 114, "num": 23, "category": "閱讀測驗", "passage": "（同第22題短文，《A+醫學百科‧嗜鹽菌》）", "stem": "下列敘述與上文相吻合的選項是：", "options": ["烹調魚肉時如確實煮熟，可以預防嗜鹽菌食物中毒", "嗜鹽菌一旦離開海洋，便會失去生命無法繼續生存", "引發急性胃腸炎的罪魁禍首，最常見的就是嗜鹽菌", "嗜鹽菌最喜歡在5%〜6%高鹽濃度的環境中大量繁殖"], "answer": 0, "neg": true}, {"year": 114, "num": 24, "category": "閱讀測驗", "passage": "孫子曰：夫用兵之法，全國為上，破國次之……是故百戰百勝，非善之善者也；不戰而屈人之兵，善之善者也。故上兵伐謀，其次伐交，其次伐兵，其下攻城……故善用兵者，屈人之兵而非戰也，拔人之城而非攻也，毀人之國而非久也，必以全爭於天下。", "src": "《孫子‧謀攻》", "stem": "上文意旨，主要在說明：", "options": ["發動戰爭的心理狀態", "規劃作戰的詳細步驟", "策劃進攻的戰略原則", "攻城略地的必備工具"], "answer": 2, "neg": true}, {"year": 114, "num": 25, "category": "閱讀測驗", "passage": "（同第24題短文，《孫子‧謀攻》）", "stem": "下列選項，何者最符合「善用兵者」的作為？", "options": ["熟悉文韜武略，帶領軍隊百戰百勝", "未經激烈戰爭，而能屈服敵人軍隊", "直接攻城掠地，快速有效殲滅敵方", "採用久戰策略，徹底消滅敵人國家"], "answer": 1, "neg": true}, {"year": 114, "num": 26, "category": "閱讀測驗", "stem": "《論語‧憲問》:「古之學者為己，今之學者為人」，下列選項的闡釋何者適當？", "options": ["古之學者讀書只為一己之利祿著想，今之學者做學問期待廣為人知", "古之學者為提升自己而充實自我，今之學者做學問著眼為眾人服務", "古之學者進德修業在增益自我，今之學者則以學問包裝向他人炫耀", "古之學者讀書純粹渡己，今之學者讀書則擴展至關心民瘼為人忙碌"], "answer": 1, "neg": true}, {"year": 114, "num": 27, "category": "字音", "stem": "下列「」內的讀音寫成國字後，何者兩兩相同？", "options": ["翫歲「ㄎㄞˋ」時／同仇敵「ㄎㄞˋ」", "「ㄈㄣˋ」發圖強／發「ㄈㄣˋ」忘食", "麻木不「ㄖㄣˊ」／泛愛眾而親「ㄖㄣˊ」", "「ㄧㄡ」然自得／出自「ㄧㄡ」谷，遷於喬木"], "answer": 2, "neg": true}, {"year": 114, "num": 28, "category": "修辭文法", "stem": "「用典」常見於古典韻文，藉由事典、語典，達到言簡意賅的效果。下列關於各詩詞「」用典的敘述，不正確的選項是：", "options": ["「天子三章傳，陳王七步才」→用「曹植」的典故", "「馬上琵琶關塞黑」，更長門、翠輦辭金闕→用「王昭君」的典故", "「野老與人爭席罷」，海鷗何事更相疑→用「楊朱向孔子學道」的典故", "「靈均標致高如許，憶生平、既紉蘭佩，更懷椒醑」→用「屈原」的典故"], "answer": 2, "neg": true}, {"year": 114, "num": 29, "category": "詩詞鑑賞", "passage": "相思意已深，白紙書難足。字字苦參商，故要檀郎讀。\n記得約當歸，遠至櫻桃熟。何事菊花時，猶未回鄉曲？", "src": "宋‧陳亞〈生查子·藥名閨情〉", "stem": "詩中巧妙運用藥名的諧音雙關來表達女子的相思之情。下列選項，對詩中藥名與情感的解讀，何者適切？", "options": ["「當歸」指出應該回家的時間點，也隱喻夫君記得當歸補氣安神的功效", "「相思（相思子）」、「意已（薏苡）」表達女子對愛情的猶豫不決，難以下定決心繼續等待", "檀郎讀，一作「檳郎讀」，檳郎亦是中藥名，暗示夫君的冷酷無情不仔細閱讀家書，使她心生怨恨", "「白紙（白芷）」象徵女子寫信訴說相思，而「苦參（中藥名）商」則以參商二星不能相見為喻，傳達長久分離的煎熬"], "answer": 3, "neg": true}, {"year": 114, "num": 30, "category": "詩詞鑑賞", "passage": "（同第29題詞，宋‧陳亞〈生查子·藥名閨情〉）", "stem": "詩中女子回憶曾與心上人約定「當歸」，但至「菊花時」仍不見歸來，這樣的時間對比主要是為了凸顯：", "options": ["說明時間流轉能沖淡分離的痛苦", "時序變換仍不減盼望夫君歸來的真情", "藉由時間推移，表達相思的短暫與容易消散", "用時序的轉變，象徵世事無常，愛情最終將逝去"], "answer": 1, "neg": true}, {"year": 114, "num": 31, "category": "詩詞鑑賞", "passage": "（同第29題詞，宋‧陳亞〈生查子·藥名閨情〉）下片藥名：「當歸」、「遠至（志）」、「櫻桃」、「菊花」、「回鄉（茴香）」", "stem": "詞的下片，使用的藥名……下列選項中，對詩中藥名與其象徵意涵的解讀，何者正確？", "options": ["「櫻桃」象徵女子面若桃花的美貌，而「菊花」則象徵秋天遲暮與感情失落", "「當歸」象徵期盼愛人歸來，而「遠至（志）」則象徵女子內心堅定與忠貞", "「菊花」暗示時間的流逝，「回鄉（茴香）」則展現女子對回鄉生活的嚮往", "「當歸」僅指補血活血的中藥，「菊花」則象徵到深秋季節，思念更加深切"], "answer": 1, "neg": true}, {"year": 114, "num": 32, "category": "詩詞鑑賞", "passage": "有人的地方就有鐘擺／有鐘擺就有心／有心就有夢／有夢就有鐘擺／有鐘擺的地方就有人（林廣〈鐘擺〉）\n一彎弧線，輕柔地／承載天地所有的重負／一條會唱歌的溪流／把一粒一粒頑石／雕成剔透的水晶（林廣〈微笑〉）", "stem": "〈鐘擺〉這首詩透過鐘擺的運動，表達人與時間、夢想之間的關聯。下列選項，何者最能反映詩中的主旨？", "options": ["鐘擺象徵時間的流逝與無可挽回的過去", "鐘擺代表機械式的生活模式，暗喻人對現實的無奈", "鐘擺的反覆運動代表停滯不前，流露人生的徬徨與迷失", "鐘擺擺動是一循環結構，鐘擺是時鐘的心臟，人心與鐘擺的連結是夢想"], "answer": 3, "neg": true}, {"year": 114, "num": 33, "category": "詩詞鑑賞", "passage": "（同第32題，林廣〈鐘擺〉與〈微笑〉）", "stem": "〈微笑〉這首詩運用了豐富的比喻來描寫，下列選項對詩中將「頑石」雕成「水晶」的意涵詮釋，何者貼切？", "options": ["微笑輕柔如弧線，卻具有刻畫歲月的能力", "微笑如溪流歌詠，展現時間帶來的滄桑感", "微笑如一彎溪流，卻具備承擔改變的力量", "微笑重負如風暴，強大到能改變世界現況"], "answer": 2, "neg": true}, {"year": 114, "num": 34, "category": "詩詞鑑賞", "pass
